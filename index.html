<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WAS GARAGE @Je.V.26.1</title>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" id="manifest-link"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: #2a2a2a;
  --border2: #333333;
  --orange: #ff6a00;
  --orange2: #ff8c00;
  --orange-dim: rgba(255,106,0,0.15);
  --orange-glow: rgba(255,106,0,0.08);
  --text: #ffffff;
  --text: #ffffff;
  --text: #ffffff;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --sidebar-w: 240px;
  --header-h: 56px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --font-display: 'Poppins', sans-serif;
  --font-body: 'Poppins', sans-serif;
  --transition: 0.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;height:100%;overflow:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:var(--font-body)}
input,select,textarea{font-family:var(--font-body);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--orange)}
::selection{background:var(--orange-dim);color:var(--orange)}

/* ============================================================
   LAYOUT
   ============================================================ */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;transition:width var(--transition);
  position:relative;z-index:100;
}
#sidebar.collapsed{width:56px}

.sidebar-header{
  height:var(--header-h);
  display:flex;align-items:center;gap:10px;
  padding:0 14px;border-bottom:1px solid var(--border);
  flex-shrink:0;overflow:hidden;
}
.sidebar-logo{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;
}
.sidebar-title{
  font-family:var(--font-display);font-size:17px;font-weight:700;
  color:var(--text);white-space:nowrap;overflow:hidden;
  background:linear-gradient(90deg,var(--orange),var(--orange2),var(--text));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#sidebar.collapsed .sidebar-title,
#sidebar.collapsed .nav-label,
#sidebar.collapsed .nav-group-label{display:none}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group-label{
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;
  padding:12px 16px 4px;white-space:nowrap;overflow:hidden;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  border-radius:0;transition:background var(--transition);
  position:relative;overflow:hidden;
  border-left:3px solid transparent;
  white-space:nowrap;
}
.nav-item:hover{background:var(--bg3);border-left-color:var(--border2)}
.nav-item.active{
  background:var(--orange-dim);border-left-color:var(--orange);
}
.nav-item.active .nav-icon{color:var(--orange)}
.nav-item.active .nav-label{color:var(--orange);font-weight:600}
.nav-icon{font-size:18px;color:var(--text2);flex-shrink:0;width:24px;text-align:center}
.nav-label{font-size:13px;color:var(--text2)}

.sidebar-toggle{
  padding:12px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;
  cursor:pointer;
}
#sidebar.collapsed .sidebar-toggle{justify-content:center}
.sidebar-toggle i{font-size:18px;color:var(--text3);transition:transform var(--transition)}
#sidebar.collapsed .sidebar-toggle i{transform:rotate(180deg)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
#topbar{
  height:var(--header-h);flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
}
.topbar-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-badge{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--bg3);border:1px solid var(--border);
}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.btn-icon{
  width:34px;height:34px;border-radius:var(--radius-sm);
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:18px;transition:all var(--transition);
}
.btn-icon:hover{background:var(--bg4);color:var(--orange);border-color:var(--orange-dim)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px}

/* ============================================================
   PAGES
   ============================================================ */
.page{display:none}
.page.active{display:block}

/* ============================================================
   CARDS & STATS
   ============================================================ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;gap:6px;
  position:relative;overflow:hidden;
  transition:transform var(--transition),border-color var(--transition);
}
.stat-card::before{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:80px;border-radius:50%;
  opacity:0.06;transform:translate(20px,-20px);
}
.stat-card.orange::before{background:var(--orange)}
.stat-card.green::before{background:var(--green)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.stat-icon{font-size:20px;margin-bottom:2px}
.stat-card.orange .stat-icon{color:var(--orange)}
.stat-card.green .stat-icon{color:var(--green)}
.stat-card.blue .stat-icon{color:var(--blue)}
.stat-card.yellow .stat-icon{color:var(--yellow)}
.stat-label{font-size:12px;color:var(--text3);font-weight:500}
.stat-value{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3)}

/* ============================================================
   SECTION HEADER
   ============================================================ */
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:10px;flex-wrap:wrap;
}
.section-hdr h2{
  font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.section-hdr h2 i{color:var(--orange);font-size:20px}
.section-hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;transition:all var(--transition);
  cursor:pointer;border:1px solid transparent;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#fff;border-color:var(--orange);
}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px)}
.btn-outline{
  background:transparent;color:var(--text2);border-color:var(--border2);
}
.btn-outline:hover{background:var(--bg3);color:var(--text);border-color:var(--orange-dim)}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border-color:rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-success{background:rgba(34,197,94,0.15);color:var(--green);border-color:rgba(34,197,94,0.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn i{font-size:15px}

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.table-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);
  gap:10px;flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:6px 10px;
  min-width:200px;
}
.search-box i{color:var(--text3);font-size:15px;flex-shrink:0}
.search-box input{background:transparent;border:none;color:var(--text);font-size:13px;flex:1;min-width:0}
.search-box input::placeholder{color:var(--text3)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{
  padding:10px 12px;text-align:left;
  font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.05em;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  padding:10px 12px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text2);vertical-align:middle;
}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child td{border-bottom:none}
.table-empty{
  text-align:center;padding:40px;
  color:var(--text3);font-size:13px;
}
.table-empty i{font-size:36px;display:block;margin-bottom:8px;color:var(--border2)}

/* ============================================================
   BADGES & TAGS
   ============================================================ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.03em;
}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,106,0,0.3)}
.badge-green{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.badge-red{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.badge-blue{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.25)}
.badge-yellow{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.25)}
.badge-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:1000;display:none;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(4px);
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);width:100%;max-width:560px;
  max-height:90vh;display:flex;flex-direction:column;
  box-shadow:var(--shadow);animation:modalIn 0.2s ease;
}
.modal-lg{max-width:780px}
.modal-xl{max-width:1000px}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text)}
.modal-close{
  width:28px;height:28px;border-radius:var(--radius-sm);
  background:var(--bg3);color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);cursor:pointer;
}
.modal-close:hover{background:rgba(239,68,68,0.2);color:var(--red)}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.modal-footer{
  padding:12px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}

/* ============================================================
   FORMS
   ============================================================ */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-grid-1{display:grid;grid-template-columns:1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:500;color:var(--text2)}
.form-label .req{color:var(--orange)}
.form-input{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:8px 10px;
  color:var(--text);font-size:13px;width:100%;
  transition:border-color var(--transition);
}
.form-input:focus{border-color:var(--orange);background:var(--bg4)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg3)}
.form-hint{font-size:11px;color:var(--text3)}
.form-row{display:flex;gap:10px;align-items:flex-end}
.form-divider{
  grid-column:1/-1;border:none;border-top:1px solid var(--border);
  margin:4px 0;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.dash-card-hdr{
  padding:12px 14px;border-bottom:1px solid var(--border);
  font-family:var(--font-display);font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:8px;color:var(--text);
}
.dash-card-hdr i{color:var(--orange)}
.dash-card-body{padding:14px}

.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:var(--radius-sm);
  background:var(--bg3);border-left:3px solid transparent;
}
.alert-item.warn{border-left-color:var(--yellow)}
.alert-item.danger{border-left-color:var(--red)}
.alert-item.info{border-left-color:var(--blue)}
.alert-icon{font-size:16px;flex-shrink:0}
.alert-item.warn .alert-icon{color:var(--yellow)}
.alert-item.danger .alert-icon{color:var(--red)}
.alert-item.info .alert-icon{color:var(--blue)}
.alert-text{font-size:12px;color:var(--text2);flex:1}
.alert-val{font-size:12px;font-weight:600;color:var(--text)}

/* WO Antrian */
.wo-list{display:flex;flex-direction:column;gap:8px}
.wo-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-sm);
  background:var(--bg3);cursor:pointer;
  transition:background var(--transition);
  border:1px solid var(--border);
}
.wo-item:hover{background:var(--bg4);border-color:var(--orange-dim)}
.wo-no{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--orange);min-width:90px}
.wo-info{flex:1;min-width:0}
.wo-plat{font-size:13px;font-weight:600;color:var(--text)}
.wo-mekanik{font-size:11px;color:var(--text3)}

/* ============================================================
   AUTOCOMPLETE COMPONENT
   ============================================================ */
.ac-wrap{position:relative}
.ac-input{width:100%;padding:8px 36px 8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;transition:border-color var(--transition)}
.ac-input:focus{border-color:var(--orange);outline:none}
.ac-input::placeholder{color:var(--text3)}
.ac-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;display:none;border-radius:4px;line-height:1}
.ac-clear:hover{color:var(--red)}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;z-index:9999;max-height:240px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.4);display:none}
.ac-dropdown.open{display:block}
.ac-item{padding:9px 12px;cursor:pointer;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);transition:background var(--transition);display:flex;align-items:center;gap:8px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.ac-active{background:var(--bg3)}
.ac-item mark{background:rgba(255,106,0,0.25);color:var(--orange);border-radius:2px;padding:0 1px;font-style:normal}
.ac-icon{width:26px;height:26px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ac-main{font-weight:500;line-height:1.3;flex:1}
.ac-sub{font-size:10px;color:var(--text3);margin-top:1px}
.ac-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--bg4);color:var(--text3);white-space:nowrap}
.ac-empty{padding:16px 12px;text-align:center;font-size:12px;color:var(--text3)}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.login-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 40px;
  width: 100%; max-width: 400px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.login-logo {
  text-align: center; margin-bottom: 28px;
}
.login-logo .logo-icon {
  width: 60px; height: 60px;
  background: var(--orange);
  border-radius: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 12px;
}
.login-logo h1 {
  font-family: var(--font-display);
  font-size: 24px; font-weight: 800;
  color: var(--text); margin: 0;
}
.login-logo p { font-size: 12px; color: var(--text3); margin: 4px 0 0; }
.login-field { margin-bottom: 16px; }
.login-field label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.login-field input {
  width: 100%; padding: 11px 14px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-size: 14px;
  transition: border-color var(--transition);
}
.login-field input:focus { border-color: var(--orange); }
.login-btn {
  width: 100%; padding: 12px;
  background: var(--orange); color: #fff;
  border: none; border-radius: 8px;
  font-size: 15px; font-weight: 700;
  font-family: var(--font-display);
  cursor: pointer; letter-spacing: 0.5px;
  transition: background var(--transition);
  margin-top: 4px;
}
.login-btn:hover { background: var(--orange2); }
.login-btn:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }
.login-error {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: var(--red);
  margin-bottom: 14px; display: none;
}
.login-role-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; margin-left: 8px;
}
.role-owner { background: rgba(255,106,0,0.15); color: var(--orange); border: 1px solid rgba(255,106,0,0.3); }
.role-admin { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
/* Nav item tersembunyi untuk role tertentu */
.nav-item.nav-hidden { display: none !important; }
/* Overlay untuk halaman yang tidak boleh diakses */
.access-denied {
  padding: 60px 40px; text-align: center; color: var(--text3);
}
.access-denied i { font-size: 48px; display: block; margin-bottom: 16px; color: var(--red); opacity: 0.5; }
.access-denied h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
.access-denied p { font-size: 13px; }

.nota-preview{
  background:#fff;color:#111;
  padding:16px;border-radius:var(--radius);
  font-family:'Courier New',monospace;font-size:12px;
  max-width:320px;margin:0 auto;
}
.nota-header{text-align:center;margin-bottom:10px}
.nota-header .nama{font-weight:700;font-size:14px}

// SUPABASE CONFIG — Ganti dengan credential Supabase Anda

const SUPABASE_URL = 'https://kfatqgqcfqdsjwfnfdlr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYXRxZ3FjZnFkc2p3Zm5mZGxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0Mjc3MzUsImV4cCI6MjA5NTAwMzczNX0.UtS_1IZucej-zkEjzZEz9KWtzAyDx267wpVtHWP1yWE';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
let isOnline = navigator.onLine;
let currentPage = 'dashboard';

// ============================================================
// AUTH STATE
// ============================================================
let currentUser = null; // { username, role: 'owner'|'admin', nama }

// Halaman eksklusif OWNER (admin tidak bisa akses)
const OWNER_ONLY_PAGES = ['barang','pesanan-beli','pembelian','bayar-hutang','retur-beli','pengaturan','backup-restore','user-management'];

// Label role
const ROLE_LABEL = { owner: 'Owner', admin: 'Admin' };

// ============================================================
// AUTOCOMPLETE — Komponen universal typeahead search
// ============================================================
/**
 * createAC(config) — Buat komponen autocomplete
 * @param {Object} config
 *   containerId : ID elemen container (div)
 *   placeholder : placeholder text
 *   data        : array data atau async function() → array
 *   searchKeys  : array key yang dicari, misal ['nama','no_plat']
 *   renderItem  : function(item) → {icon, main, sub, badge}
 *   onSelect    : function(item) dipanggil saat item dipilih
 *   onClear     : function() dipanggil saat input dikosongkan
 *   minChars    : min karakter sebelum search (default 1)
 *   initialLabel: label awal jika sudah ada nilai terpilih
 */
function createAC(config){
  const wrap = document.getElementById(config.containerId);
  if(!wrap){ console.warn('createAC: container not found:', config.containerId); return null; }

  const minChars = config.minChars ?? 1;
  let _allData   = null;
  let _results   = [];
  let _activeIdx = -1;
  let _selected  = null;
  let _mouseInDD = false; // flag: mouse sedang di dalam dropdown

  // Render HTML
  wrap.className = 'ac-wrap';
  wrap.innerHTML = `
    <input  type="text" class="ac-input"
      placeholder="${config.placeholder||'Ketik untuk mencari...'}"
      autocomplete="off"
      value="${(config.initialLabel||'').replace(/"/g,'&quot;')}"/>
    <button type="button" class="ac-clear" tabindex="-1" title="Hapus">✕</button>
    <div class="ac-dropdown"></div>`;

  const input    = wrap.querySelector('.ac-input');
  const clearBtn = wrap.querySelector('.ac-clear');
  const dd       = wrap.querySelector('.ac-dropdown');

  clearBtn.style.display = config.initialLabel ? 'block' : 'none';

  // ── Ambil data ──────────────────────────────────────────────
  async function getData(){
    if(_allData) return _allData;
    _allData = typeof config.data==='function' ? await config.data() : (config.data||[]);
    return _allData;
  }

  // ── Highlight keyword ───────────────────────────────────────
  function hl(text, kw){
    if(!kw||!text) return text||'';
    const safe = kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return String(text).replace(new RegExp(`(${safe})`,'gi'),'<mark>$1</mark>');
  }

  // ── Pilih item ──────────────────────────────────────────────
  function selectItem(item){
    _selected = item;
    const r = config.renderItem(item);
    // Strip HTML tags untuk nilai input
    const plainText = r.main.replace(/<[^>]+>/g,'');
    input.value = plainText;
    clearBtn.style.display = 'block';
    closeDD();
    if(config.onSelect) config.onSelect(item);
  }

  // ── Buka / tutup dropdown ───────────────────────────────────
  function openDD(){ dd.classList.add('open'); }
  function closeDD(){ dd.classList.remove('open'); _activeIdx=-1; }

  // ── Render hasil pencarian ──────────────────────────────────
  async function doSearch(kw){
    const data = await getData();
    if(!data.length){ dd.innerHTML='<div class="ac-empty">Data kosong</div>'; openDD(); return; }

    const q = kw.toLowerCase().trim();
    _results = data.filter(item =>
      config.searchKeys.some(k => String(item[k]||'').toLowerCase().includes(q))
    ).slice(0,60);

    if(!_results.length){
      dd.innerHTML=`<div class="ac-empty">Tidak ditemukan: "<strong>${kw}</strong>"</div>`;
      openDD(); return;
    }

    _activeIdx = -1;
    dd.innerHTML = _results.map((item,i)=>{
      const r = config.renderItem(item);
      return `<div class="ac-item" data-i="${i}">
        ${r.icon?`<div class="ac-icon">${r.icon}</div>`:''}
        <div style="flex:1;min-width:0;overflow:hidden">
          <div class="ac-main">${hl(r.main,kw)}</div>
          ${r.sub?`<div class="ac-sub">${hl(r.sub,kw)}</div>`:''}
        </div>
        ${r.badge!==undefined?`<span class="ac-badge">${r.badge}</span>`:''}
      </div>`;
    }).join('');

    // Pasang event listener di setiap item — BUKAN onmousedown string
    dd.querySelectorAll('.ac-item').forEach((el,i)=>{
      // mousedown: cegah blur input, pilih item
      el.addEventListener('mousedown', e=>{
        e.preventDefault(); // mencegah input blur sebelum klik selesai
        selectItem(_results[i]);
      });
      el.addEventListener('mouseenter',()=>{
        dd.querySelectorAll('.ac-item').forEach(x=>x.classList.remove('ac-active'));
        el.classList.add('ac-active');
        _activeIdx=i;
      });
    });

    openDD();
  }

  // ── Input events ────────────────────────────────────────────
  input.addEventListener('input', ()=>{
    const kw = input.value;
    clearBtn.style.display = kw ? 'block' : 'none';
    if(!kw){ closeDD(); return; }
    if(kw.length < minChars){ closeDD(); return; }
    _allData = null; // fresh data setiap ketik
    doSearch(kw);
  });

  // Keyboard navigation
  input.addEventListener('keydown', e=>{
    const items = dd.querySelectorAll('.ac-item');
    if(e.key==='ArrowDown'){
      e.preventDefault();
      if(!dd.classList.contains('open') && input.value.length>=minChars){ doSearch(input.value); return; }
      _activeIdx = Math.min(_activeIdx+1, items.length-1);
      items.forEach((el,i)=>el.classList.toggle('ac-active',i===_activeIdx));
      items[_activeIdx]?.scrollIntoView({block:'nearest'});
    } else if(e.key==='ArrowUp'){
      e.preventDefault();
      _activeIdx = Math.max(_activeIdx-1, 0);
      items.forEach((el,i)=>el.classList.toggle('ac-active',i===_activeIdx));
      items[_activeIdx]?.scrollIntoView({block:'nearest'});
    } else if(e.key==='Enter'){
      e.preventDefault();
      if(_activeIdx>=0 && _results[_activeIdx]) selectItem(_results[_activeIdx]);
    } else if(e.key==='Escape'){
      closeDD(); input.blur();
    }
  });

  // Blur: tutup dropdown (mousedown pada item sudah preventDefault, jadi blur tidak terjadi saat klik item)
  input.addEventListener('blur', ()=>{ setTimeout(closeDD, 150); });

  // Focus: tampilkan ulang jika sudah ada input
  input.addEventListener('focus', ()=>{
    if(input.value.length >= minChars) doSearch(input.value);
  });

  // Clear button
  clearBtn.addEventListener('click', ()=>{
    input.value=''; _selected=null; _allData=null; _results=[];
    clearBtn.style.display='none';
    closeDD();
    if(config.onClear) config.onClear();
    input.focus();
  });

  // ── API publik ──────────────────────────────────────────────
  wrap._acReset = (label='')=>{
    input.value=label; _selected=null; _allData=null; _results=[];
    clearBtn.style.display=label?'block':'none';
    closeDD();
  };
  wrap._acSetLabel = (label)=>{
    input.value=label;
    clearBtn.style.display=label?'block':'none';
  };
  wrap._acInvalidateCache = ()=>{ _allData=null; };

  return wrap;
}

// ============================================================
// AUTO-REFRESH SYSTEM
// ============================================================
const AR_INTERVAL_SEC = 30 * 60; // 30 menit dalam detik
let _arTimer      = null;  // interval countdown
let _arSecondsLeft = AR_INTERVAL_SEC;
let _arEnabled    = true;

function formatCountdown(sec){
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateARBadge(){
  const dot      = document.getElementById('ar-dot');
  const label    = document.getElementById('ar-label');
  const countdown= document.getElementById('ar-countdown');
  const badge    = document.getElementById('auto-refresh-badge');
  if(!badge) return;

  if(_arEnabled){
    dot.style.background    = 'var(--green)';
    dot.style.animation     = 'arPulse 2s infinite';
    label.style.color       = 'var(--green)';
    label.textContent       = 'Auto';
    badge.style.borderColor = 'rgba(34,197,94,0.25)';
    badge.style.background  = 'rgba(34,197,94,0.1)';
    badge.title             = 'Auto-refresh aktif — klik untuk matikan';
    countdown.textContent   = formatCountdown(_arSecondsLeft);
  } else {
    dot.style.background    = 'var(--text3)';
    dot.style.animation     = 'none';
    label.style.color       = 'var(--text3)';
    label.textContent       = 'Off';
    badge.style.borderColor = 'rgba(255,255,255,0.1)';
    badge.style.background  = 'rgba(255,255,255,0.05)';
    badge.title             = 'Auto-refresh nonaktif — klik untuk aktifkan';
    countdown.textContent   = '--:--';
  }
}

function startARTimer(){
  if(_arTimer) clearInterval(_arTimer);
  _arSecondsLeft = AR_INTERVAL_SEC;
  updateARBadge();

  _arTimer = setInterval(async ()=>{
    if(!_arEnabled) return;
    _arSecondsLeft--;
    updateARBadge();

    if(_arSecondsLeft <= 0){
      // Saatnya refresh!
      _arSecondsLeft = AR_INTERVAL_SEC;
      updateARBadge();
      await doAutoRefresh();
    }
  }, 1000);
}

async function doAutoRefresh(){
  if(!currentUser) return; // tidak refresh jika belum login
  showToast('🔄 Auto-refresh data...', 'info');
  try{
    await safeInitPage(currentPage);
    const now = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    showToast(`✅ Data diperbarui pukul ${now}`, 'success');
  }catch(e){
    showToast('Gagal auto-refresh', 'error');
  }
}

function toggleAutoRefresh(){
  _arEnabled = !_arEnabled;
  updateARBadge();
  if(_arEnabled){
    _arSecondsLeft = AR_INTERVAL_SEC;
    showToast('Auto-refresh diaktifkan (setiap 30 menit)', 'success');
  } else {
    showToast('Auto-refresh dimatikan', 'info');
  }
}

// Reset countdown saat user ganti halaman (agar tidak refresh saat baru pindah)

    _arSecondsLeft = AR_INTERVAL_SEC;

}


async function doLogin(){
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  if(!username || !password){
    showLoginError('Username dan password wajib diisi');return;
  }

  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Memverifikasi...';
  errEl.style.display='none';

  try{
    // Cari user di tabel app_users
    const{data:users, error}=await db
      .from('app_users')
      .select('*')
      .eq('username', username)
      .eq('aktif', true)
      .single();

    if(error||!users){
      showLoginError('Username tidak ditemukan atau tidak aktif');
      btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> Masuk';return;
    }

    // Verifikasi password (plain text — untuk produksi gunakan bcrypt di Edge Function)
    if(users.password !== password){
      showLoginError('Password salah');
      btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> Masuk';return;
    }

    // Login berhasil
    currentUser = { id:users.id, username:users.username, nama:users.nama||users.username, role:users.role };
    sessionStorage.setItem('autoserv_user', JSON.stringify(currentUser));

    // Catat log login
    try{
      await dbOp('app_login_log','INSERT',{
        id:uid(), user_id:users.id, username:users.username,
        role:users.role, waktu:new Date().toISOString(),
        keterangan:'Login berhasil'
      });
    }catch(e){/* log opsional */}

    startApp();

  }catch(e){
    showLoginError('Gagal menghubungi server: '+e.message);
    btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> Masuk';
  }
}

// OFFLINE / INDEXEDDB
// ============================================================
let idbDb;
function openIDB() {
  return new Promise((res,rej)=>{
    const req = indexedDB.open('autoserv_offline',2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      const oldVer = e.oldVersion;
      if (!d.objectStoreNames.contains('queue')) {
        d.createObjectStore('queue',{keyPath:'id'});
      }
      if (!d.objectStoreNames.contains('cache')) {
        d.createObjectStore('cache',{keyPath:'key'});
      }
      // v2: offline data cache per table
      if (!d.objectStoreNames.contains('tbl_cache')) {
        const tblStore = d.createObjectStore('tbl_cache',{keyPath:'key'});
        tblStore.createIndex('tbl','tbl',{unique:false});
      }
    };
    req.onsuccess = e => { idbDb = e.target.result; res(idbDb); };
    req.onerror = ()=>rej(req.error);
  });
}

async function idbAdd(store, data) {
  return new Promise((res,rej)=>{
    const tx = idbDb.transaction(store,'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbGetAll(store) {
  return new Promise((res,rej)=>{
    const tx = idbDb.transaction(store,'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbDelete(store, key) {
  return new Promise((res,rej)=>{
    const tx = idbDb.transaction(store,'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = ()=>res();
    req.onerror = ()=>rej(req.error);
  });
}

// Queue offline operation
async function queueOp(tabel, operasi, data) {
  await idbAdd('queue', {
    id: uid(), tabel, operasi, data,
    status:'pending', created_at: nowTs()
  });
  // Update offline pending count display
  try {
    const queue = await idbGetAll('queue');
    const pending = queue.filter(q=>q.status==='pending').length;
    const el = document.getElementById('offline-pending');
    if(el) {
      el.style.display = pending>0 ? 'inline' : 'none';
      el.textContent = pending + ' data pending';
    }
    updateSyncBadge();
  } catch(e){}
}

// Supabase call with offline fallback
async function dbOp(tabel, operasi, data) {
  if (isOnline) {
    try {
      let res;
      if (operasi === 'INSERT') res = await db.from(tabel).insert(data).select().single();
      else if (operasi === 'UPDATE') res = await db.from(tabel).update(data.payload).eq('id',data.id).select().single();
      else if (operasi === 'DELETE') res = await db.from(tabel).delete().eq('id',data.id);
      if (res.error) throw res.error;
      return res.data;
    } catch(e) {
      // fallback to queue
      await queueOp(tabel, operasi, data);
      showToast('Disimpan ke antrian offline','info');
      return data.id ? data : {...data, id: uid()};
    }
  } else {
    await queueOp(tabel, operasi, data);
    return data.id ? data : {...data, id: uid()};
  }
}

async function syncOfflineData() {
  if (!isOnline) { showToast('Tidak ada koneksi internet','error'); return; }
  const queue = await idbGetAll('queue');
  const pending = queue.filter(q=>q.status==='pending');
  if (!pending.length) return; // Silent if nothing to sync
  
  // Animate sync button
  const syncIcon = document.getElementById('sync-btn')?.querySelector('i');
  if(syncIcon) syncIcon.style.animation='spin 0.7s linear infinite';
  
  let ok=0, fail=0;
  for (const q of pending) {
    try {
      if (q.operasi==='INSERT') {
        const {error} = await db.from(q.tabel).upsert(q.data, {onConflict:'id',ignoreDuplicates:false});
        if(error) throw error;
      } else if (q.operasi==='UPDATE') {
        const {error} = await db.from(q.tabel).update(q.data.payload).eq('id',q.data.id);
        if(error) throw error;
      } else if (q.operasi==='DELETE') {
        const {error} = await db.from(q.tabel).delete().eq('id',q.data.id);
        if(error) throw error;
      }
      await idbDelete('queue', q.id);
      ok++;
    } catch(e) {
      fail++;
      console.warn('Sync failed for', q.tabel, e.message);
    }
  }
  
  if(syncIcon) syncIcon.style.animation='';
  
  if(ok>0) {
    showToast(`✓ ${ok} data tersinkronisasi ke server`, 'success');
    // Refresh halaman aktif setelah sync, aman via safeInitPage
    setTimeout(()=> safeInitPage(currentPage), 600);
  }
  if(fail>0) showToast(`${fail} data gagal sync — akan dicoba ulang`, 'error');
  
  // Update pending count badge
  updateSyncBadge();
}

async function updateSyncBadge() {
  try {
    const queue = await idbGetAll('queue');
    const pending = queue.filter(q=>q.status==='pending').length;
    const btn = document.getElementById('sync-btn');
    if(!btn) return;
    // Remove old badge
    const old = btn.querySelector('.sync-badge');
    if(old) old.remove();
    if(pending > 0) {
      const badge = document.createElement('span');
      badge.className = 'sync-badge';
      badge.style.cssText = 'position:absolute;top:-4px;right:-4px;background:var(--orange);color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;';
      badge.textContent = pending > 9 ? '9+' : pending;
      btn.style.position = 'relative';
      btn.appendChild(badge);
    }
  } catch(e){}
}

// Online/offline detection
function updateStatus() {
  isOnline = navigator.onLine;
  document.getElementById('status-dot').className = `status-dot ${isOnline?'online':'offline'}`;
  document.getElementById('status-text').textContent = isOnline ? 'Online' : 'Offline';

  }
}

async function loadTable(table, opts={}) {
  const cacheKey = table+'_'+JSON.stringify(opts);
  if (isOnline) {
    try {
      let q = db.from(table).select(opts.select||'*');
      if (opts.eq) Object.entries(opts.eq).forEach(([k,v])=>{ q=q.eq(k,v); });
      if (opts.order) q = q.order(opts.order, {ascending: opts.asc!==false});
      if (opts.limit) q = q.limit(opts.limit);
      const { data, error } = await q;
      if (error) throw error;
      const result = data||[];
      // Cache to IDB for offline use
      try { await idbAdd('tbl_cache',{key:cacheKey,tbl:table,data:result,ts:Date.now()}); } catch(e){}
      return result;
    } catch(e) {
      // Online but query failed - try cache
      return await idbGetTblCache(cacheKey) || [];
    }
  } else {
    // Offline - serve from cache
    const cached = await idbGetTblCache(cacheKey);
    if (cached) return cached;
    return [];
  }
}

async function idbGetTblCache(key) {
  try {
    return new Promise((res,rej)=>{
      const tx = idbDb.transaction('tbl_cache','readonly');
      const req = tx.objectStore('tbl_cache').get(key);
      req.onsuccess = ()=> res(req.result ? req.result.data : null);
      req.onerror = ()=> res(null);
    });
  } catch(e) { return null; }
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function modalHtml(id, title, bodyHtml, size='', footerHtml='') {
  return `
  <div class="modal-overlay" id="${id}" onclick="if(event.target===this)closeModal('${id}')">
    <div class="modal ${size}">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <div class="modal-close" onclick="closeModal('${id}')"><i class="ti ti-x"></i></div>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      ${footerHtml?`<div class="modal-footer">${footerHtml}</div>`:''}
    </div>
  </div>`;
}

function resetFormBarang() {
  ['f-br-id','f-br-kode','f-br-nama','f-br-lokasi'].forEach(i=>{ const el=document.getElementById(i); if(el) el.value=''; });
  ['f-br-stok','f-br-smin'].forEach(i=>{ const el=document.getElementById(i); if(el) el.value='0'; });
  ['f-br-hbeli','f-br-hjual'].forEach(i=>{ const el=document.getElementById(i); if(el) el.value='0'; });
  const kd=document.getElementById('modal-barang'); if(kd) kd.querySelector('.modal-title').textContent='Tambah Barang';
}

function editBarang(b) {
  document.getElementById('f-br-id').value = b.id;
  document.getElementById('f-br-kode').value = b.kode;
  document.getElementById('f-br-nama').value = b.nama;
  document.getElementById('f-br-kategori').value = b.kategori||'';
  document.getElementById('f-br-satuan').value = b.satuan;
  document.getElementById('f-br-hbeli').value = b.harga_beli;
  document.getElementById('f-br-hjual').value = b.harga_jual;
  document.getElementById('f-br-stok').value = b.stok;
  document.getElementById('f-br-smin').value = b.stok_minimum;
  document.getElementById('f-br-lokasi').value = b.lokasi_gudang||'';
  document.getElementById('f-br-aktif').value = String(b.aktif);
  document.querySelector('#modal-barang .modal-title').textContent = 'Edit Barang';
  openModal('modal-barang');
}

async function saveBarang() {
  const id = document.getElementById('f-br-id').value;
  const nama = document.getElementById('f-br-nama').value.trim();
  if (!nama) { showToast('Nama barang wajib diisi','error'); return; }
  let kode = document.getElementById('f-br-kode').value.trim();
  if (!kode) {
    const {count} = await db.from('barang').select('*',{count:'exact',head:true});
    kode = 'BRG'+pad((count||0)+1,5);
  }
  const payload = {
    kode, nama,
    kategori: document.getElementById('f-br-kategori').value,
    satuan: document.getElementById('f-br-satuan').value,
    harga_beli: Number(document.getElementById('f-br-hbeli').value)||0,
    harga_jual: Number(document.getElementById('f-br-hjual').value)||0,
    stok: Number(document.getElementById('f-br-stok').value)||0,
    stok_minimum: Number(document.getElementById('f-br-smin').value)||5,
    lokasi_gudang: document.getElementById('f-br-lokasi').value,
    aktif: document.getElementById('f-br-aktif').value==='true',
  };
  showLoading(true);
  try {
    if (id) await dbOp('barang','UPDATE',{id,payload});
    else await dbOp('barang','INSERT',{id:uid(),...payload});
    closeModal('modal-barang');
    showToast(id?'Barang diperbarui':'Barang ditambahkan');
    await loadBarang();
  } catch(e) { showToast('Gagal menyimpan: '+e.message,'error'); }
  showLoading(false);
}

async function delBarang(id, nama) {
  if (!confirm2(`Hapus barang "${nama}"?`)) return;
  showLoading(true);
  try {
    await dbOp('barang','DELETE',{id});
    showToast('Barang dihapus');
    await loadBarang();
  } catch(e) { showToast('Gagal menghapus','error'); }
  showLoading(false);
}

let _gudangData = [];
window.init_gudang = async function(){
  _gudangData = await loadTable('barang',{order:'nama'});
  renderGudang(_gudangData);
  const tot = _gudangData.length;
  const low = _gudangData.filter(b=>b.stok<=b.stok_minimum&&b.stok>0).length;
  const empty = _gudangData.filter(b=>b.stok<=0).length;
  document.getElementById('gudang-summary').innerHTML = `
    <div class="status-badge"><span class="status-dot" style="background:var(--text3)"></span>${tot} Total Item</div>
    <div class="status-badge" style="border-color:rgba(34,197,94,0.3)"><span class="status-dot" style="background:var(--green)"></span>${tot-low-empty} Stok Aman</div>
    <div class="status-badge" style="border-color:rgba(245,158,11,0.3)"><span class="status-dot" style="background:var(--yellow)"></span>${low} Menipis</div>
    <div class="status-badge" style="border-color:rgba(239,68,68,0.3)"><span class="status-dot" style="background:var(--red)"></span>${empty} Habis</div>`;
};

function renderGudang(data){
  document.getElementById('gudang-grid').innerHTML = data.length ? data.map(b=>`
    <div class="stok-card ${b.stok<=0?'low':b.stok<=b.stok_minimum?'low':'ok'}" onclick="lihatMutasi('${b.id}','${b.nama}')">
      <div class="stok-nama">${b.nama}</div>
      <div class="stok-num">${b.stok}</div>
      <div class="stok-satuan">${b.satuan}</div>
      <div class="stok-min">Min: ${b.stok_minimum} · ${b.kategori||'Umum'}</div>
      ${b.stok<=0?'<div style="margin-top:6px"><span class="badge badge-red">HABIS</span></div>':b.stok<=b.stok_minimum?'<div style="margin-top:6px"><span class="badge badge-yellow">MENIPIS</span></div>':''}
    </div>`).join('') : '<div style="color:var(--text3);text-align:center;padding:40px;grid-column:1/-1">Tidak ada barang</div>';
}

function filterGudang(){
  const kat = document.getElementById('filter-kategori').value;
  const stk = document.getElementById('filter-stok').value;
  let d = [..._gudangData];
  if(kat) d=d.filter(b=>b.kategori===kat);
  if(stk==='low') d=d.filter(b=>b.stok>0&&b.stok<=b.stok_minimum);
  else if(stk==='ok') d=d.filter(b=>b.stok>b.stok_minimum);
  else if(stk==='empty') d=d.filter(b=>b.stok<=0);
  renderGudang(d);
}

async function openKoreksiStok(){

  document.getElementById('f-kor-barang').innerHTML='<option value="">-- Pilih Barang --</option>'+brg.map(b=>`<option value="${b.id}" data-stok="${b.stok}">${b.nama} (Stok: ${b.stok} ${b.satuan})</option>`).join('');
  openModal('modal-koreksi');
}

async function saveKoreksi(){
  const bId=document.getElementById('f-kor-barang').value;
  const jenis=document.getElementById('f-kor-jenis').value;
  const jml=Number(document.getElementById('f-kor-jumlah').value)||0;
  const ket=document.getElementById('f-kor-ket').value;
  if(!bId||!jml){showToast('Lengkapi data koreksi','error');return;}
  showLoading(true);
  try{
    const {data:br}=await db.from('barang').select('stok').eq('id',bId).single();
    const stokBaru=jenis==='masuk'?br.stok+jml:Math.max(0,br.stok-jml);
    await dbOp('barang','UPDATE',{id:bId,payload:{stok:stokBaru}});
    await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:bId,jenis:'koreksi',jumlah:jenis==='masuk'?jml:-jml,stok_sebelum:br.stok,stok_sesudah:stokBaru,referensi_tipe:'manual',keterangan:ket||'Koreksi manual'});
    closeModal('modal-koreksi');showToast('Koreksi stok berhasil');await init_gudang();
  }catch(e){showToast('Gagal koreksi','error');}
  showLoading(false);
}

async function loadPartsFromWO(woId){
  let parts=[];
  try{
    const{data:p1}=await db.from('detail_wo_part').select('*').eq('work_order_id',woId);
    if(p1&&p1.length) parts=p1;
    else{
      const{data:p2}=await db.from('detail_wo_part').select('*').eq('wo_id',woId);
      if(p2) parts=p2;
    }
  }catch(e){}
  _spkItems = parts.map(p=>({
    rowId: 'spki_'+Date.now()+Math.random().toString(36).slice(2),
    nama: p.nama_barang||'', satuan: p.satuan||'pcs',
    jumlah: p.jumlah||1, keterangan: ''
  }));
  renderSPKItems();
}

function updateSPKItem(rowId,field,val){
  const p=_spkItems.find(x=>x.rowId===rowId); if(p) p[field]=val;
}
function removeSPKItem(rowId){
  _spkItems=_spkItems.filter(x=>x.rowId!==rowId); renderSPKItems();
}

async function saveSPK(doCetak=false){
  const no   = document.getElementById('f-spk-no').value.trim();
  const plat = document.getElementById('f-spk-plat').value.trim();
  if(!no){showToast('No. SPK tidak boleh kosong','error');return;}
  if(!plat){showToast('No. Plat wajib diisi','error');return;}
  const id    = document.getElementById('f-spk-id').value || uid();
  const isEdit= !!document.getElementById('f-spk-id').value;
  const woSel = document.getElementById('f-spk-wo');
  const woId  = woSel.value||null;
  const noWo  = woSel.selectedOptions[0]?.dataset?.no||null;

  const payload={
    no_spk          : no,
    tanggal         : document.getElementById('f-spk-tgl').value,
    status          : document.getElementById('f-spk-status').value,
    wo_id           : woId,
    no_wo_ref       : noWo,
    no_plat         : plat,
    merk_tipe       : document.getElementById('f-spk-kend').value,
    nama_pelanggan  : document.getElementById('f-spk-pel').value,
    nama_mekanik    : document.getElementById('f-spk-mek').value,
    keluhan         : document.getElementById('f-spk-keluhan').value,
    diagnosa        : document.getElementById('f-spk-diagnosa').value,
    catatan         : document.getElementById('f-spk-catatan').value,
  };

  showLoading(true);
  try{
    if(isEdit){
      await dbOp('surat_perintah_kerja','UPDATE',{id,payload});
      await db.from('detail_spk').delete().eq('spk_id',id);
    } else {
      await dbOp('surat_perintah_kerja','INSERT',{id,...payload});
    }
    for(let i=0;i<_spkItems.length;i++){
      const p=_spkItems[i]; if(!p.nama) continue;
      await dbOp('detail_spk','INSERT',{id:uid(),spk_id:id,nama:p.nama,satuan:p.satuan,jumlah:p.jumlah,keterangan:p.keterangan,urutan:i});
    }
    closeModal('modal-spk');
    showToast(isEdit?'SPK berhasil diperbarui':'SPK berhasil disimpan','success');
    await loadSPK();
    if(doCetak) await cetakSPKById(id);
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function cetakSPK(){
  await saveSPK(true);
}

async function editSPK(id){
  showLoading(true);
  try{
    const{data:spk}=await db.from('surat_perintah_kerja').select('*').eq('id',id).single();
    showLoading(false);
    if(spk) openModalSPK(spk);
    else showToast('SPK tidak ditemukan','error');
  }catch(e){showLoading(false);showToast('Gagal load SPK','error');}
}

async function delSPK(id,no){
  if(!confirm(`Hapus SPK "${no}"?`))return;
  showLoading(true);
  try{
    await db.from('detail_spk').delete().eq('spk_id',id);
    await db.from('surat_perintah_kerja').delete().eq('id',id);
    showToast('SPK dihapus','success'); await loadSPK();
  }catch(e){showToast('Gagal hapus','error');}
  showLoading(false);
}

  document.getElementById('f-wo-bayar').value='0';

  const modalFooter = document.querySelector('#modal-wo .modal-footer');

  createAC({
    containerId:'ac-wo-pel',
    placeholder:'Ketik nama pelanggan...',
    data: pls,
    searchKeys:['nama','telepon'],
    renderItem: p=>({icon:'👤', main:p.nama, sub:p.telepon||''}),
    onSelect: p=>{
      document.getElementById('f-wo-pel').value=p.id;
      window._woKendFiltered=(window._allKend||[]).filter(k=>k.pelanggan_id===p.id);
      if(!window._woKendFiltered.length) window._woKendFiltered=window._allKend||[];
      const acKend=document.getElementById('ac-wo-kend');
      if(acKend){ acKend._acReset?.(); acKend._acInvalidateCache?.(); }
      document.getElementById('f-wo-kend').value='';
    },
    onClear:()=>{
      document.getElementById('f-wo-pel').value='';
      window._woKendFiltered=window._allKend||[];
      const acKend=document.getElementById('ac-wo-kend');
      if(acKend){ acKend._acReset?.(); acKend._acInvalidateCache?.(); }
      document.getElementById('f-wo-kend').value='';
    }
  });

  // KENDARAAN
  window._woKendFiltered = kends;
  createAC({
    containerId:'ac-wo-kend',
    placeholder:'Ketik no. plat / merk / tipe...',
    data:()=>Promise.resolve(window._woKendFiltered||kends),
    searchKeys:['no_plat','merk','tipe','warna'],
    renderItem:k=>({
      icon:'🚗', main:k.no_plat,
      sub:`${k.merk||''} ${k.tipe||''} ${k.tahun||''}`.trim(),

    }),

    onClear:()=>{ document.getElementById('f-wo-kend').value=''; }

      document.getElementById('ac-wo-pel')._acSetLabel?.(wo.pelanggan.nama);
      document.getElementById('f-wo-pel').value=wo.pelanggan_id||'';
    }
    if(wo.kendaraan?.no_plat){
      const sub=`${wo.kendaraan.merk||''} ${wo.kendaraan.tipe||''}`.trim();
      document.getElementById('ac-wo-kend')._acSetLabel?.(wo.kendaraan.no_plat+(sub?' — '+sub:''));
      document.getElementById('f-wo-kend').value=wo.kendaraan_id||'';
    }
    if(wo.mekanik_id){
      document.getElementById('f-wo-mek').value=wo.mekanik_id;
    }
  }
}

async function editWO(id){
  showLoading(true);
  try{
    const{data:wo}=await db.from('work_order')
      .select('*,kendaraan(no_plat,merk,tipe),pelanggan(nama),mekanik(nama)')
      .eq('id',id).single();
    showLoading(false);
    if(wo) openModalWO(wo);
    else showToast('Data WO tidak ditemukan','error');
  }catch(e){showLoading(false);showToast('Gagal load WO: '+e.message,'error');}
}

function loadKendByPel(){
  const pelId=document.getElementById('f-wo-pel').value;
  const kends=window._allKend||[];
  const filtered=pelId?kends.filter(k=>k.pelanggan_id===pelId):kends;
  document.getElementById('f-wo-kend').innerHTML='<option value="">-- Pilih Kendaraan --</option>'+filtered.map(k=>`<option value="${k.id}">${k.no_plat} - ${k.merk||''} ${k.tipe||''}</option>`).join('');
}

async function addWOPart(){
  if(!window._woBrg) window._woBrg = await loadTable('barang',{eq:{aktif:true},order:'nama'});
  const rowId = 'part_'+Date.now();
  _woParts.push({
    rowId, barang_id:'', nama_barang:'', satuan:'pcs',
    jumlah:1, harga_jual:0, subtotal:0,
    is_non_gudang: false,
    _isNew: true   // ← flag: belum dipilih user, tampilkan dropdown
  });
  renderWOParts();
}

function renderWOParts(){
  const tbody = document.getElementById('body-wo-parts');
  if(!tbody) return;
  const daftarBrg = window._woBrg || [];

  if(!_woParts.length){
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--text3);font-size:12px">
      <i class="ti ti-tool" style="font-size:22px;display:block;margin-bottom:6px"></i>
      Belum ada sparepart — klik Tambah Part</td></tr>`;
    return;
  }

  tbody.innerHTML = _woParts.map(p => {
    const showManual = p.is_non_gudang === true && !p._isNew;
    const adaDiGudang = p.barang_id && daftarBrg.some(b=>b.id===p.barang_id);

    const kolomPart = showManual
      ? `<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
           <span style="font-size:10px;background:rgba(255,165,0,0.15);color:var(--orange);border:1px solid rgba(255,165,0,0.3);border-radius:4px;padding:1px 6px;flex-shrink:0">✏️ Manual</span>
           <button class="btn btn-outline btn-sm" style="padding:1px 6px;font-size:10px" onclick="gantiKeGudangWO('${p.rowId}')">
             <i class="ti ti-arrow-back-up" style="font-size:10px"></i> Ganti Gudang
           </button>
         </div>
         <input type="text" class="form-input" id="nm-${p.rowId}"
           placeholder="Ketik nama part/sparepart..."
           value="${(p.nama_barang||'').replace(/"/g,'&quot;')}"
           oninput="updateWOPart('${p.rowId}','nama_barang',this.value)"
           style="font-size:12px"/>`
      : `<div style="display:flex;flex-direction:column;gap:3px">
           <div id="ac-part-${p.rowId}"></div>
           <button type="button" onclick="setManualWO('${p.rowId}')"
             style="font-size:10px;color:var(--orange);background:rgba(255,106,0,0.08);border:1px dashed rgba(255,106,0,0.3);border-radius:4px;padding:2px 8px;cursor:pointer;text-align:left;width:fit-content">
             ✏️ Input manual (non-gudang)
           </button>
           ${p.nama_barang&&adaDiGudang?`<div style="font-size:10px;color:var(--text3)">📦 ${p.nama_barang} (stok: ${daftarBrg.find(b=>b.id===p.barang_id)?.stok||'?'})</div>`:''}
         </div>`;

    return `<tr id="row-${p.rowId}">
      <td style="min-width:200px">${kolomPart}</td>
      <td><input type="text" class="form-input" id="sat-${p.rowId}"
        value="${p.satuan||'pcs'}" oninput="updateWOPart('${p.rowId}','satuan',this.value)"
        style="font-size:12px"/></td>
      <td><input type="number" min="1" class="form-input"
        value="${p.jumlah||1}" oninput="updateWOPart('${p.rowId}','jumlah',Number(this.value))"
        style="font-size:12px"/></td>
      <td><input type="number" min="0" class="form-input" id="hj-${p.rowId}"
        value="${p.harga_jual||0}" oninput="updateWOPart('${p.rowId}','harga_jual',Number(this.value))"
        style="font-size:12px"/></td>
      <td style="font-family:var(--font-display);font-size:13px;color:var(--orange);white-space:nowrap"
        id="sub-${p.rowId}">${fmt(p.subtotal||0)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="removeWOPart('${p.rowId}')">
        <i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');

  // Inisialisasi autocomplete untuk setiap baris part (non-manual)
  _woParts.forEach(p=>{
    if(p.is_non_gudang && !p._isNew) return; // skip manual
    const containerId=`ac-part-${p.rowId}`;
    if(!document.getElementById(containerId)) return;
    const initLabel = p.nama_barang && !p._isNew ? p.nama_barang : '';
    createAC({
      containerId,
      placeholder:'Ketik nama sparepart / kode...',
      data: daftarBrg,
      searchKeys:['nama','kode','satuan'],
      initialLabel: initLabel,
      renderItem: b=>({
        icon:'📦',
        main: b.nama,
        sub: `${b.satuan||'pcs'} | Harga: ${fmt(b.harga_jual||0)}`,
        badge: `Stok: ${b.stok}`
      }),
      onSelect: b=>{
        const part=_woParts.find(x=>x.rowId===p.rowId);
        if(!part) return;
        part.barang_id=b.id; part.is_non_gudang=false; part._isNew=false;
        part.nama_barang=b.nama; part.satuan=b.satuan||'pcs'; part.harga_jual=b.harga_jual||0;
        const satEl=document.getElementById('sat-'+p.rowId);
        const hjEl =document.getElementById('hj-' +p.rowId);
        if(satEl) satEl.value=b.satuan||'pcs';
        if(hjEl)  hjEl.value =b.harga_jual||0;
        hitungSubtotalWO(p.rowId);
      },
      onClear:()=>{
        const part=_woParts.find(x=>x.rowId===p.rowId);
        if(!part) return;
        part.barang_id=''; part.nama_barang=''; part._isNew=true;
      }
    });
  });
}

function setManualWO(rowId){
  const part=_woParts.find(x=>x.rowId===rowId);
  if(!part) return;
  part.is_non_gudang=true; part._isNew=false; part.barang_id=''; part.nama_barang='';
  renderWOParts();
  setTimeout(()=>{ const nm=document.getElementById('nm-'+rowId); if(nm) nm.focus(); },50);
}

function selectWOPart(sel, rowId){
  const p = _woParts.find(x => x.rowId === rowId);
  if(!p) return;

  if(sel.value === '__manual__'){
    p.barang_id = ''; p.is_non_gudang = true; p._isNew = false;
    p.nama_barang = ''; p.satuan = 'pcs'; p.harga_jual = 0; p.subtotal = 0;
    renderWOParts();
    setTimeout(() => { const nm = document.getElementById('nm-'+rowId); if(nm) nm.focus(); }, 50);

  } else if(sel.value){
    const opt = sel.selectedOptions[0];
    p.barang_id    = sel.value;
    p.is_non_gudang= false;
    p._isNew       = false;
    p.nama_barang  = opt.dataset.nama  || '';
    p.satuan       = opt.dataset.satuan|| 'pcs';
    p.harga_jual   = Number(opt.dataset.harga) || 0;
    // Update field satuan & harga langsung (tanpa re-render dulu agar tidak flicker)
    const satEl = document.getElementById('sat-'+rowId);
    const hjEl  = document.getElementById('hj-'+rowId);
    if(satEl) satEl.value = p.satuan;
    if(hjEl)  hjEl.value  = p.harga_jual;
    hitungSubtotalWO(rowId);
    renderWOParts();

  } else {
    // Kembali ke pilih
    p.barang_id = ''; p.nama_barang = ''; p.is_non_gudang = false; p._isNew = true;
    renderWOParts();
  }
}

function gantiKeGudangWO(rowId){
  const p = _woParts.find(x => x.rowId === rowId);
  if(!p) return;
  p.is_non_gudang = false; p.barang_id = ''; p.nama_barang = ''; p._isNew = true;
  renderWOParts();
}

function updateWOPart(rowId,field,val){
  const p=_woParts.find(x=>x.rowId===rowId);if(!p)return;
  p[field]=val;hitungSubtotalWO(rowId);
}

function hitungSubtotalWO(rowId){
  const p=_woParts.find(x=>x.rowId===rowId);if(!p)return;
  p.subtotal=p.jumlah*p.harga_jual;
  const el=document.getElementById('sub-'+rowId);if(el)el.textContent=fmt(p.subtotal);
  hitungTotalWO();
}

function removeWOPart(rowId){
  _woParts=_woParts.filter(p=>p.rowId!==rowId);
  renderWOParts();hitungTotalWO();
}

function hitungTotalWO(){
  const subPart=_woParts.reduce((a,p)=>a+p.subtotal,0);
  const jasa=Number(document.getElementById('f-wo-jasa')?.value)||0;
  const diskon=Number(document.getElementById('f-wo-diskon')?.value)||0;
  const total=subPart+jasa-diskon;
  const bayar=Number(document.getElementById('f-wo-bayar')?.value)||0;
  if(document.getElementById('f-wo-total')) document.getElementById('f-wo-total').value=total;
  if(document.getElementById('wo-subtotal-part')) document.getElementById('wo-subtotal-part').textContent=fmt(subPart);
  if(document.getElementById('wo-biaya-jasa-val')) document.getElementById('wo-biaya-jasa-val').textContent=fmt(jasa);
}

async function saveWO(cetak=false){
  const kendId=document.getElementById('f-wo-kend').value;
  if(!kendId){showToast('Pilih kendaraan','error');return;}
  const no=document.getElementById('f-wo-no').value.trim();
  if(!no){showToast('No. WO tidak boleh kosong','error');document.getElementById('f-wo-no').focus();return;}
  const existingId = document.getElementById('f-wo-id').value;
  const isEdit = !!existingId;
  const id = existingId || uid();

  const subPart=_woParts.reduce((a,p)=>a+p.subtotal,0);
  const jasa=Number(document.getElementById('f-wo-jasa').value)||0;
  const diskon=Number(document.getElementById('f-wo-diskon').value)||0;
  const total=subPart+jasa-diskon;
  const bayar=Number(document.getElementById('f-wo-bayar').value)||0;
  const sisa=Math.max(0,total-bayar);
  const statusBayar=bayar<=0?'belum':sisa<=0?'lunas':'sebagian';

  const payload={
    no_wo:no, tanggal:document.getElementById('f-wo-tgl').value,
    pelanggan_id:document.getElementById('f-wo-pel').value||null,
    kendaraan_id:kendId, mekanik_id:document.getElementById('f-wo-mek').value||null,
    keluhan:document.getElementById('f-wo-keluhan').value,
    diagnosa:document.getElementById('f-wo-diagnosa').value,
    status:document.getElementById('f-wo-status').value,
    biaya_jasa:jasa, subtotal_part:subPart, diskon, total,
    terbayar:bayar, sisa_piutang:sisa,
    metode_bayar:document.getElementById('f-wo-metode').value,
    status_bayar:statusBayar,
    catatan:document.getElementById('f-wo-catatan').value
  };

  showLoading(true);
  try{
    if(isEdit){
      // ── MODE EDIT ─────────────────────────────────────
      // 1. Update header WO
      await dbOp('work_order','UPDATE',{id, payload});

      // 2. Kembalikan stok dari parts LAMA (yang ada di DB sebelum edit)
      const original = window._woPartsOriginal||[];
      for(const op of original){
        if(op.barang_id && !op.is_non_gudang){
          const{data:br}=await db.from('barang').select('stok').eq('id',op.barang_id).single();
          const stokKembali=(br?.stok||0)+op.jumlah;
          await dbOp('barang','UPDATE',{id:op.barang_id,payload:{stok:stokKembali}});
          await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:op.barang_id,jenis:'masuk',jumlah:op.jumlah,stok_sebelum:br?.stok||0,stok_sesudah:stokKembali,referensi_tipe:'koreksi_wo',referensi_id:id,referensi_no:no,keterangan:'Koreksi edit WO '+no});
        }
      }

      // 3. Hapus semua detail parts lama dari DB (support kedua nama kolom)
      try{ await db.from('detail_wo_part').delete().eq('work_order_id',id); }catch(e){}
      try{ await db.from('detail_wo_part').delete().eq('wo_id',id); }catch(e){}

      // 4. Sesuaikan piutang pelanggan lama jika ada
      const{data:woLama}=await db.from('work_order').select('sisa_piutang,pelanggan_id').eq('id',id).single();
      if(woLama?.sisa_piutang>0 && woLama?.pelanggan_id){
        const{data:pel}=await db.from('pelanggan').select('saldo_piutang').eq('id',woLama.pelanggan_id).single();
        const silaLama=Math.max(0,(pel?.saldo_piutang||0)-(woLama?.sisa_piutang||0));
        await dbOp('pelanggan','UPDATE',{id:woLama.pelanggan_id,payload:{saldo_piutang:silaLama}});
      }
    } else {
      // ── MODE BARU ──────────────────────────────────────
      await dbOp('work_order','INSERT',{id,...payload});
    }

    // 5. Insert semua parts BARU & update stok
    for(const p of _woParts){
      if(!p.nama_barang&&!p.barang_id) continue;
      await dbOp('detail_wo_part','INSERT',{
        id:uid(), work_order_id:id,
        barang_id:p.barang_id||null, nama_barang:p.nama_barang,
        satuan:p.satuan, jumlah:p.jumlah,
        harga_jual:p.harga_jual, subtotal:p.subtotal,
        is_non_gudang:p.is_non_gudang||false
      });
      if(p.barang_id&&!p.is_non_gudang){
        const{data:br}=await db.from('barang').select('stok').eq('id',p.barang_id).single();
        const stokBaru=Math.max(0,(br?.stok||0)-p.jumlah);
        await dbOp('barang','UPDATE',{id:p.barang_id,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:p.barang_id,jenis:'keluar',jumlah:-p.jumlah,stok_sebelum:br?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'service',referensi_id:id,referensi_no:no,keterangan:'Part WO '+no});
      }
    }

    // 6. Update piutang pelanggan BARU
    if(sisa>0 && payload.pelanggan_id){
      const{data:pel}=await db.from('pelanggan').select('saldo_piutang').eq('id',payload.pelanggan_id).single();
      await dbOp('pelanggan','UPDATE',{id:payload.pelanggan_id,payload:{saldo_piutang:(pel?.saldo_piutang||0)+sisa}});
    }


    closeModal('modal-wo');
    showToast(isEdit?'Work Order berhasil diperbarui':'Work Order disimpan','success');
    await loadWO();
    if(cetak){
      const{data:woFull}=await db.from('work_order').select('*,kendaraan(no_plat,merk,tipe,tahun),pelanggan(nama,telepon),mekanik(nama)').eq('id',id).single();
      cetakWO(woFull||{id,...payload}, _woParts);
    }
  }catch(e){showToast('Gagal simpan WO: '+e.message,'error');console.error(e);}
  showLoading(false);
}

async function loadWO(statusFilter='semua'){
  let q=db.from('work_order').select('*,kendaraan(no_plat,merk,tipe),pelanggan(nama),mekanik(nama)').order('tanggal',{ascending:false});
  if(statusFilter&&statusFilter!=='semua') q=q.eq('status',statusFilter);
  const{data}=await q;
  if(!(data||[]).length){
    document.getElementById('body-wo').innerHTML='<tr><td colspan="11" class="table-empty"><i class="ti ti-engine-off"></i>Tidak ada work order</td></tr>';
    return;
  }
  // Load semua parts WO sekaligus — support kolom work_order_id DAN wo_id (data lama)
  const woIds=(data||[]).map(w=>w.id);
  let allParts=[];
  try{
    // Coba dengan work_order_id dulu
    const{data:p1}=await db.from('detail_wo_part')
      .select('work_order_id,wo_id,nama_barang,jumlah,satuan,is_non_gudang')
      .in('work_order_id',woIds);
    if(p1&&p1.length) allParts=p1;
    else {
      // Fallback: coba dengan wo_id (nama kolom lama)
      const{data:p2}=await db.from('detail_wo_part')
        .select('work_order_id,wo_id,nama_barang,jumlah,satuan,is_non_gudang')
        .in('wo_id',woIds);
      if(p2&&p2.length) allParts=p2;
    }
  }catch(e){ allParts=[]; }

  const partsMap={};
  (allParts||[]).forEach(p=>{
    // Support kedua nama kolom
    const wId = p.work_order_id || p.wo_id;
    if(!wId) return;
    if(!partsMap[wId]) partsMap[wId]=[];
    partsMap[wId].push(p);
  });

  document.getElementById('body-wo').innerHTML=(data||[]).map(w=>{
    const parts=partsMap[w.id]||[];
    const namaPart=parts.length
      ? parts.map(p=>`
          <div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px;margin-bottom:2px">
            <span style="font-size:9px;padding:1px 4px;border-radius:3px;flex-shrink:0;
              ${p.is_non_gudang
                ? 'background:rgba(255,106,0,0.12);color:var(--orange)'
                : 'background:rgba(34,197,94,0.12);color:var(--green)'}">
              ${p.is_non_gudang?'✏️':'📦'}
            </span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              ${p.nama_barang}
            </span>
            <span style="color:var(--text3);white-space:nowrap;flex-shrink:0">
              (${p.jumlah} ${p.satuan||'pcs'})
            </span>
          </div>`).join('')
      : '<div style="font-size:11px;color:var(--text3);font-style:italic">Jasa saja</div>';
    return `<tr>
      <td><code style="color:var(--orange);font-size:12px">${w.no_wo}</code></td>
      <td style="white-space:nowrap">${new Date(w.tanggal).toLocaleDateString('id-ID')}</td>
      <td><span style="font-family:var(--font-display);font-size:13px;font-weight:700;background:var(--bg3);padding:2px 7px;border-radius:4px">${w.kendaraan?.no_plat||'-'}</span></td>
      <td>${w.pelanggan?.nama||'Umum'}</td>
      <td>${w.mekanik?.nama||'-'}</td>
      <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text3)">${w.keluhan||'-'}</td>
      <td style="min-width:140px">${namaPart}</td>
      <td style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--orange);white-space:nowrap">${fmt(w.total)}</td>
      <td><span class="badge ${w.status==='selesai'?'badge-green':w.status==='proses'?'badge-orange':'badge-gray'}">${w.status}</span></td>
      <td><span class="badge ${w.status_bayar==='lunas'?'badge-green':w.status_bayar==='sebagian'?'badge-yellow':'badge-red'}">${w.status_bayar}</span></td>
      <td><div style="display:flex;gap:3px">
        <button class="btn btn-primary btn-sm" title="Edit WO" onclick="editWO('${w.id}')"><i class="ti ti-edit"></i> Edit</button>
        <button class="btn btn-outline btn-sm" title="Cetak Nota" onclick="cetakWOById('${w.id}')"><i class="ti ti-printer"></i></button>
        <button class="btn btn-danger btn-sm" title="Hapus" onclick="delWO('${w.id}','${w.no_wo}')"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`;
  }).join('');
}

function filterWO(status,el){
  document.querySelectorAll('#content .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadWO(status);
}

async function delWO(id,no){if(!confirm2(`Hapus WO ${no}?`))return;showLoading(true);try{await dbOp('work_order','DELETE',{id});showToast('WO dihapus');await loadWO();}catch(e){showToast('Gagal','error');}showLoading(false);}

// ── Ubah Status WO ────────────────────────────────────────────

  }

  window._swId = id;
  document.getElementById('sw-no').textContent = no;

  const badgeMap = {
    antri:   { cls: 'badge-gray',   label: 'Antri' },
    proses:  { cls: 'badge-orange', label: 'Proses' },
    selesai: { cls: 'badge-green',  label: 'Selesai' },
    batal:   { cls: 'badge-red',    label: 'Batal' }
  };
  const cur = badgeMap[statusSaat] || { cls: 'badge-gray', label: statusSaat };
  document.getElementById('sw-current').innerHTML =
    '<span class="badge ' + cur.cls + '" style="font-size:13px;padding:4px 12px">' + cur.label + '</span>';

  const statusList = [
    { val: 'antri',   label: 'Antri',   cls: 'badge-gray',   desc: 'Kendaraan menunggu pengerjaan' },
    { val: 'proses',  label: 'Proses',  cls: 'badge-orange', desc: 'Sedang dikerjakan mekanik' },
    { val: 'selesai', label: 'Selesai', cls: 'badge-green',  desc: 'Service selesai, siap diserahkan' },
    { val: 'batal',   label: 'Batal',   cls: 'badge-red',    desc: 'Work order dibatalkan' },
  ];

  document.getElementById('sw-options').innerHTML = statusList.map(s =>
    '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;' +
    'background:' + (s.val===statusSaat?'var(--orange-dim)':'var(--bg3)') + ';' +
    'border:1px solid ' + (s.val===statusSaat?'var(--orange)':'var(--border2)') + ';' +
    'border-radius:var(--radius-sm);cursor:pointer">' +
    '<input type="radio" name="sw-status" value="' + s.val + '" ' + (s.val===statusSaat?'checked':'') + ' style="accent-color:var(--orange)"/>' +
    '<span class="badge ' + s.cls + '" style="min-width:64px;justify-content:center">' + s.label + '</span>' +
    '<span style="font-size:12px;color:var(--text2)">' + s.desc + '</span>' +
    '</label>'
  ).join('');

  openModal('modal-status-wo');
}

async function simpanStatusWO() {
  const sel = document.querySelector('input[name="sw-status"]:checked');
  if (!sel) { showToast('Pilih status terlebih dahulu', 'error'); return; }
  const newStatus = sel.value;
  const id = window._swId;
  showLoading(true);
  try {
    await dbOp('work_order', 'UPDATE', { id, payload: { status: newStatus } });
    closeModal('modal-status-wo');
    showToast('Status WO diubah ke "' + newStatus + '"');
    await loadWO();
  } catch(e) {
    showToast('Gagal menyimpan status', 'error');
  }
  showLoading(false);
}

async function getSettings(){

async function cetakWOById(woId){
