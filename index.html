<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoServ Pro — Bengkel Service Mobil</title>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" id="manifest-link"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --bg4: #222222;
  --border: #2a2a2a;
  --border2: #333333;
  --orange: #ff6a00;
  --orange2: #ff8c00;
  --orange-dim: rgba(255,106,0,0.15);
  --orange-glow: rgba(255,106,0,0.08);
  --text: #f0f0f0;
  --text2: #aaaaaa;
  --text3: #666666;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --sidebar-w: 240px;
  --header-h: 56px;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --font-display: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif;
  --transition: 0.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;height:100%;overflow:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:var(--font-body)}
input,select,textarea{font-family:var(--font-body);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--orange)}
::selection{background:var(--orange-dim);color:var(--orange)}

/* ============================================================
   LAYOUT
   ============================================================ */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;transition:width var(--transition);
  position:relative;z-index:100;
}
#sidebar.collapsed{width:56px}

.sidebar-header{
  height:var(--header-h);
  display:flex;align-items:center;gap:10px;
  padding:0 14px;border-bottom:1px solid var(--border);
  flex-shrink:0;overflow:hidden;
}
.sidebar-logo{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;
}
.sidebar-title{
  font-family:var(--font-display);font-size:17px;font-weight:700;
  color:var(--text);white-space:nowrap;overflow:hidden;
  background:linear-gradient(90deg,var(--orange),var(--orange2),var(--text));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#sidebar.collapsed .sidebar-title,
#sidebar.collapsed .nav-label,
#sidebar.collapsed .nav-group-label{display:none}

.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group-label{
  font-size:10px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.08em;
  padding:12px 16px 4px;white-space:nowrap;overflow:hidden;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  border-radius:0;transition:background var(--transition);
  position:relative;overflow:hidden;
  border-left:3px solid transparent;
  white-space:nowrap;
}
.nav-item:hover{background:var(--bg3);border-left-color:var(--border2)}
.nav-item.active{
  background:var(--orange-dim);border-left-color:var(--orange);
}
.nav-item.active .nav-icon{color:var(--orange)}
.nav-item.active .nav-label{color:var(--orange);font-weight:600}
.nav-icon{font-size:18px;color:var(--text2);flex-shrink:0;width:24px;text-align:center}
.nav-label{font-size:13px;color:var(--text2)}

.sidebar-toggle{
  padding:12px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:flex-end;
  cursor:pointer;
}
#sidebar.collapsed .sidebar-toggle{justify-content:center}
.sidebar-toggle i{font-size:18px;color:var(--text3);transition:transform var(--transition)}
#sidebar.collapsed .sidebar-toggle i{transform:rotate(180deg)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
#topbar{
  height:var(--header-h);flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
}
.topbar-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-badge{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;
  background:var(--bg3);border:1px solid var(--border);
}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.btn-icon{
  width:34px;height:34px;border-radius:var(--radius-sm);
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:18px;transition:all var(--transition);
}
.btn-icon:hover{background:var(--bg4);color:var(--orange);border-color:var(--orange-dim)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px}

/* ============================================================
   PAGES
   ============================================================ */
.page{display:none}
.page.active{display:block}

/* ============================================================
   CARDS & STATS
   ============================================================ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;gap:6px;
  position:relative;overflow:hidden;
  transition:transform var(--transition),border-color var(--transition);
}
.stat-card::before{
  content:'';position:absolute;top:0;right:0;
  width:80px;height:80px;border-radius:50%;
  opacity:0.06;transform:translate(20px,-20px);
}
.stat-card.orange::before{background:var(--orange)}
.stat-card.green::before{background:var(--green)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.stat-icon{font-size:20px;margin-bottom:2px}
.stat-card.orange .stat-icon{color:var(--orange)}
.stat-card.green .stat-icon{color:var(--green)}
.stat-card.blue .stat-icon{color:var(--blue)}
.stat-card.yellow .stat-icon{color:var(--yellow)}
.stat-label{font-size:12px;color:var(--text3);font-weight:500}
.stat-value{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3)}

/* ============================================================
   SECTION HEADER
   ============================================================ */
.section-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:10px;flex-wrap:wrap;
}
.section-hdr h2{
  font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);
  display:flex;align-items:center;gap:8px;
}
.section-hdr h2 i{color:var(--orange);font-size:20px}
.section-hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;transition:all var(--transition);
  cursor:pointer;border:1px solid transparent;white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#fff;border-color:var(--orange);
}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px)}
.btn-outline{
  background:transparent;color:var(--text2);border-color:var(--border2);
}
.btn-outline:hover{background:var(--bg3);color:var(--text);border-color:var(--orange-dim)}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border-color:rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-success{background:rgba(34,197,94,0.15);color:var(--green);border-color:rgba(34,197,94,0.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn i{font-size:15px}

/* ============================================================
   TABLE
   ============================================================ */
.table-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.table-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);
  gap:10px;flex-wrap:wrap;
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:6px 10px;
  min-width:200px;
}
.search-box i{color:var(--text3);font-size:15px;flex-shrink:0}
.search-box input{background:transparent;border:none;color:var(--text);font-size:13px;flex:1;min-width:0}
.search-box input::placeholder{color:var(--text3)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{
  padding:10px 12px;text-align:left;
  font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.05em;
  border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
  padding:10px 12px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text2);vertical-align:middle;
}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child td{border-bottom:none}
.table-empty{
  text-align:center;padding:40px;
  color:var(--text3);font-size:13px;
}
.table-empty i{font-size:36px;display:block;margin-bottom:8px;color:var(--border2)}

/* ============================================================
   BADGES & TAGS
   ============================================================ */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.03em;
}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,106,0,0.3)}
.badge-green{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.badge-red{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.badge-blue{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.25)}
.badge-yellow{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.25)}
.badge-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

/* ============================================================
   MODAL
   ============================================================ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:1000;display:none;align-items:center;justify-content:center;
  padding:20px;backdrop-filter:blur(4px);
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);width:100%;max-width:560px;
  max-height:90vh;display:flex;flex-direction:column;
  box-shadow:var(--shadow);animation:modalIn 0.2s ease;
}
.modal-lg{max-width:780px}
.modal-xl{max-width:1000px}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text)}
.modal-close{
  width:28px;height:28px;border-radius:var(--radius-sm);
  background:var(--bg3);color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);cursor:pointer;
}
.modal-close:hover{background:rgba(239,68,68,0.2);color:var(--red)}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.modal-footer{
  padding:12px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}

/* ============================================================
   FORMS
   ============================================================ */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-grid-1{display:grid;grid-template-columns:1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:500;color:var(--text2)}
.form-label .req{color:var(--orange)}
.form-input{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:8px 10px;
  color:var(--text);font-size:13px;width:100%;
  transition:border-color var(--transition);
}
.form-input:focus{border-color:var(--orange);background:var(--bg4)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg3)}
.form-hint{font-size:11px;color:var(--text3)}
.form-row{display:flex;gap:10px;align-items:flex-end}
.form-divider{
  grid-column:1/-1;border:none;border-top:1px solid var(--border);
  margin:4px 0;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.dash-card-hdr{
  padding:12px 14px;border-bottom:1px solid var(--border);
  font-family:var(--font-display);font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:8px;color:var(--text);
}
.dash-card-hdr i{color:var(--orange)}
.dash-card-body{padding:14px}

.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:var(--radius-sm);
  background:var(--bg3);border-left:3px solid transparent;
}
.alert-item.warn{border-left-color:var(--yellow)}
.alert-item.danger{border-left-color:var(--red)}
.alert-item.info{border-left-color:var(--blue)}
.alert-icon{font-size:16px;flex-shrink:0}
.alert-item.warn .alert-icon{color:var(--yellow)}
.alert-item.danger .alert-icon{color:var(--red)}
.alert-item.info .alert-icon{color:var(--blue)}
.alert-text{font-size:12px;color:var(--text2);flex:1}
.alert-val{font-size:12px;font-weight:600;color:var(--text)}

/* WO Antrian */
.wo-list{display:flex;flex-direction:column;gap:8px}
.wo-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--radius-sm);
  background:var(--bg3);cursor:pointer;
  transition:background var(--transition);
  border:1px solid var(--border);
}
.wo-item:hover{background:var(--bg4);border-color:var(--orange-dim)}
.wo-no{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--orange);min-width:90px}
.wo-info{flex:1;min-width:0}
.wo-plat{font-size:13px;font-weight:600;color:var(--text)}
.wo-mekanik{font-size:11px;color:var(--text3)}

/* ============================================================
   NOTA PRINT
   ============================================================ */
.nota-preview{
  background:#fff;color:#111;
  padding:16px;border-radius:var(--radius);
  font-family:'Courier New',monospace;font-size:12px;
  max-width:320px;margin:0 auto;
}
.nota-header{text-align:center;margin-bottom:10px}
.nota-header .nama{font-weight:700;font-size:14px}
.nota-divider{border:none;border-top:1px dashed #aaa;margin:8px 0}
.nota-row{display:flex;justify-content:space-between;gap:4px;margin-bottom:2px;font-size:11px}
.nota-row .label{flex:1}
.nota-row .val{text-align:right;white-space:nowrap}
.nota-total{font-weight:700;font-size:12px;border-top:1px dashed #aaa;padding-top:4px;margin-top:4px}
.nota-footer{text-align:center;margin-top:10px;font-size:10px;color:#666}

@media print{
  body * { visibility: hidden !important; }
  #print-area, #print-area * { visibility: visible !important; }
  #print-area {
    position: fixed !important; left: 0; top: 0;
    width: 80mm; margin: 0; padding: 8px;
    background: #fff !important; color: #000 !important;
  }
}
@media print and (min-width: 100mm) {
  #print-area { width: 210mm; }
}

/* ============================================================
   GUDANG — Stok Cards
   ============================================================ */
.stok-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.stok-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;
  transition:border-color var(--transition),transform var(--transition);
  cursor:pointer;
}
.stok-card:hover{border-color:var(--orange-dim);transform:translateY(-2px)}
.stok-card.low{border-color:rgba(239,68,68,0.4)}
.stok-card.ok{border-color:var(--border)}
.stok-nama{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.3}
.stok-num{
  font-family:var(--font-display);font-size:26px;font-weight:700;
  line-height:1;
}
.stok-card.low .stok-num{color:var(--red)}
.stok-card.ok .stok-num{color:var(--green)}
.stok-satuan{font-size:11px;color:var(--text3)}
.stok-min{font-size:10px;color:var(--text3);margin-top:4px}

/* ============================================================
   LOADING / TOAST
   ============================================================ */
#toast{
  position:fixed;bottom:24px;right:24px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast-item{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:10px 14px;
  font-size:13px;color:var(--text);
  box-shadow:var(--shadow);animation:toastIn 0.2s ease;
  display:flex;align-items:center;gap:8px;min-width:200px;
  pointer-events:auto;border-left:3px solid;
}
.toast-item.success{border-left-color:var(--green)}
.toast-item.error{border-left-color:var(--red)}
.toast-item.info{border-left-color:var(--blue)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

#loading-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);
  z-index:8000;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(2px);
}
#loading-overlay.active{display:flex}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--border2);border-top-color:var(--orange);
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============================================================
   OFFLINE INDICATOR
   ============================================================ */
#offline-bar{
  background:linear-gradient(90deg,rgba(239,68,68,0.9),rgba(220,38,38,0.9));
  color:#fff;font-size:12px;font-weight:500;
  padding:6px 20px;text-align:center;display:none;
  align-items:center;justify-content:center;gap:8px;
}
#offline-bar.show{display:flex}

/* ============================================================
   TABS
   ============================================================ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{
  padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;
  white-space:nowrap;transition:all var(--transition);
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ============================================================
   TRANSAKSI DETAIL TABLE (input item)
   ============================================================ */
.trx-items{width:100%;margin-bottom:10px}
.trx-items th{background:var(--bg3);padding:7px 8px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase}
.trx-items td{padding:5px 4px;vertical-align:middle}
.trx-items input,.trx-items select{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius-sm);padding:5px 7px;
  color:var(--text);font-size:12px;width:100%;
}
.trx-items input:focus,.trx-items select:focus{border-color:var(--orange)}
.trx-total-row{
  display:flex;justify-content:flex-end;gap:20px;
  background:var(--bg3);padding:10px 12px;border-radius:var(--radius-sm);

let idbDb;
function openIDB() {
  return new Promise((res,rej)=>{
    const req = indexedDB.open('autoserv_offline',2);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      const oldVer = e.oldVersion;
      if (!d.objectStoreNames.contains('queue')) {
        d.createObjectStore('queue',{keyPath:'id'});
      }
      if (!d.objectStoreNames.contains('cache')) {
        d.createObjectStore('cache',{keyPath:'key'});
      }
      // v2: offline data cache per table
      if (!d.objectStoreNames.contains('tbl_cache')) {
        const tblStore = d.createObjectStore('tbl_cache',{keyPath:'key'});
        tblStore.createIndex('tbl','tbl',{unique:false});
      }
    };
    req.onsuccess = e => { idbDb = e.target.result; res(idbDb); };
    req.onerror = ()=>rej(req.error);
  });
}

async function idbAdd(store, data) {
  return new Promise((res,rej)=>{
    const tx = idbDb.transaction(store,'readwrite');
    const req = tx.objectStore(store).put(data);
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbGetAll(store) {
  return new Promise((res,rej)=>{
    const tx = idbDb.transaction(store,'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = ()=>res(req.result);
    req.onerror = ()=>rej(req.error);
  });
}
async function idbDelete(store, key) {
  return new Promise((res,rej)=>{
    const tx = idbDb.transaction(store,'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = ()=>res();
    req.onerror = ()=>rej(req.error);
  });
}

// Queue offline operation
async function queueOp(tabel, operasi, data) {
  await idbAdd('queue', {
    id: uid(), tabel, operasi, data,
    status:'pending', created_at: nowTs()
  });
  // Update offline pending count display
  try {
    const queue = await idbGetAll('queue');
    const pending = queue.filter(q=>q.status==='pending').length;
    const el = document.getElementById('offline-pending');
    if(el) {
      el.style.display = pending>0 ? 'inline' : 'none';
      el.textContent = pending + ' data pending';
    }
    updateSyncBadge();
  } catch(e){}
}

// Supabase call with offline fallback
async function dbOp(tabel, operasi, data) {
  if (isOnline) {
    try {
      let res;
      if (operasi === 'INSERT') res = await db.from(tabel).insert(data).select().single();
      else if (operasi === 'UPDATE') res = await db.from(tabel).update(data.payload).eq('id',data.id).select().single();
      else if (operasi === 'DELETE') res = await db.from(tabel).delete().eq('id',data.id);
      if (res.error) throw res.error;
      return res.data;
    } catch(e) {
      // fallback to queue
      await queueOp(tabel, operasi, data);
      showToast('Disimpan ke antrian offline','info');
      return data.id ? data : {...data, id: uid()};
    }
  } else {
    await queueOp(tabel, operasi, data);
    return data.id ? data : {...data, id: uid()};
  }
}

async function syncOfflineData() {
  if (!isOnline) { showToast('Tidak ada koneksi internet','error'); return; }
  const queue = await idbGetAll('queue');
  const pending = queue.filter(q=>q.status==='pending');
  if (!pending.length) return; // Silent if nothing to sync
  
  // Animate sync button
  const syncIcon = document.getElementById('sync-btn')?.querySelector('i');
  if(syncIcon) syncIcon.style.animation='spin 0.7s linear infinite';
  
  let ok=0, fail=0;
  for (const q of pending) {
    try {
      if (q.operasi==='INSERT') {
        const {error} = await db.from(q.tabel).upsert(q.data, {onConflict:'id',ignoreDuplicates:false});
        if(error) throw error;
      } else if (q.operasi==='UPDATE') {
        const {error} = await db.from(q.tabel).update(q.data.payload).eq('id',q.data.id);
        if(error) throw error;
      } else if (q.operasi==='DELETE') {
        const {error} = await db.from(q.tabel).delete().eq('id',q.data.id);
        if(error) throw error;
      }
      await idbDelete('queue', q.id);
      ok++;
    } catch(e) {
      fail++;
      console.warn('Sync failed for', q.tabel, e.message);
    }
  }
  
  if(syncIcon) syncIcon.style.animation='';
  
  if(ok>0) {
    showToast(`✓ ${ok} data tersinkronisasi ke server`, 'success');
    // Refresh current page after sync
    if(window[`init_${currentPage.replace(/-/g,'_')}`]) {
      setTimeout(()=>{ try{ window[`init_${currentPage.replace(/-/g,'_')}`](); } catch(e){} }, 500);
    }
  }
  if(fail>0) showToast(`${fail} data gagal sync — akan dicoba ulang`, 'error');
  
  // Update pending count badge
  updateSyncBadge();
}

async function loadTable(table, opts={}) {
  const cacheKey = table+'_'+JSON.stringify(opts);
  if (isOnline) {
    try {
      let q = db.from(table).select(opts.select||'*');
      if (opts.eq) Object.entries(opts.eq).forEach(([k,v])=>{ q=q.eq(k,v); });
      if (opts.order) q = q.order(opts.order, {ascending: opts.asc!==false});
      if (opts.limit) q = q.limit(opts.limit);
      const { data, error } = await q;
      if (error) throw error;
      const result = data||[];
      // Cache to IDB for offline use
      try { await idbAdd('tbl_cache',{key:cacheKey,tbl:table,data:result,ts:Date.now()}); } catch(e){}
      return result;
    } catch(e) {
      // Online but query failed - try cache
      return await idbGetTblCache(cacheKey) || [];
    }
  } else {
    // Offline - serve from cache
    const cached = await idbGetTblCache(cacheKey);
    if (cached) return cached;
    return [];
  }
}

async function idbGetTblCache(key) {
  try {
    return new Promise((res,rej)=>{
      const tx = idbDb.transaction('tbl_cache','readonly');
      const req = tx.objectStore('tbl_cache').get(key);
      req.onsuccess = ()=> res(req.result ? req.result.data : null);
      req.onerror = ()=> res(null);
    });
  } catch(e) { return null; }
}

    const totalPiut2 = [...(piut2||[]),...(piutWo2||[])].reduce((a,r)=>a+Number(r.sisa_piutang),0);
    if(totalPiut2>0) alerts.push({type:'warn',icon:'ti-coin',text:'Piutang belum lunas',val:fmt(totalPiut2)});
    // Hutang supplier
    const { data: hutang } = await db.from('pembelian').select('sisa_hutang').gt('sisa_hutang',0);
    const totalHutang = (hutang||[]).reduce((a,r)=>a+Number(r.sisa_hutang),0);
    if(totalHutang>0) alerts.push({type:'info',icon:'ti-truck',text:'Hutang ke supplier',val:fmt(totalHutang)});
    // Pengeluaran bulan ini (opsional - tabel mungkin belum ada)
    try {
      const m1 = today().slice(0,7)+'-01';
      const { data: opex } = await db.from('pengeluaran').select('nominal').gte('tanggal',m1).lte('tanggal',today());
      const totalOpex = (opex||[]).reduce((a,r)=>a+Number(r.nominal),0);
      if(totalOpex>0) alerts.push({type:'warn',icon:'ti-cash',text:'Pengeluaran bulan ini',val:fmt(totalOpex)});
    } catch(e2) { /* tabel belum ada, skip */ }
    const alertHtml = alerts.length ? alerts.map(a=>`
      <div class="alert-item ${a.type}">
        <i class="ti ${a.icon} alert-icon"></i>
        <span class="alert-text">${a.text}</span>
        <span class="alert-val">${a.val}</span>
      </div>`).join('') : '<div style="color:var(--text3);font-size:13px;text-align:center;padding:20px"><i class="ti ti-check" style="font-size:24px;display:block;margin-bottom:6px;color:var(--green)"></i>Semua baik-baik saja!</div>';
    document.getElementById('dash-alerts').innerHTML = alertHtml;
  } catch(e) { console.error('dash-alerts:',e); }
};

function resetFormBarang() {
  ['f-br-id','f-br-kode','f-br-nama','f-br-lokasi'].forEach(i=>{ const el=document.getElementById(i); if(el) el.value=''; });
  ['f-br-stok','f-br-smin'].forEach(i=>{ const el=document.getElementById(i); if(el) el.value='0'; });
  ['f-br-hbeli','f-br-hjual'].forEach(i=>{ const el=document.getElementById(i); if(el) el.value='0'; });
  const kd=document.getElementById('modal-barang'); if(kd) kd.querySelector('.modal-title').textContent='Tambah Barang';
}

function editBarang(b) {
  document.getElementById('f-br-id').value = b.id;
  document.getElementById('f-br-kode').value = b.kode;
  document.getElementById('f-br-nama').value = b.nama;
  document.getElementById('f-br-kategori').value = b.kategori||'';
  document.getElementById('f-br-satuan').value = b.satuan;
  document.getElementById('f-br-hbeli').value = b.harga_beli;
  document.getElementById('f-br-hjual').value = b.harga_jual;
  document.getElementById('f-br-stok').value = b.stok;
  document.getElementById('f-br-smin').value = b.stok_minimum;
  document.getElementById('f-br-lokasi').value = b.lokasi_gudang||'';
  document.getElementById('f-br-aktif').value = String(b.aktif);
  document.querySelector('#modal-barang .modal-title').textContent = 'Edit Barang';
  openModal('modal-barang');
}

async function saveBarang() {
  const id = document.getElementById('f-br-id').value;
  const nama = document.getElementById('f-br-nama').value.trim();
  if (!nama) { showToast('Nama barang wajib diisi','error'); return; }
  let kode = document.getElementById('f-br-kode').value.trim();
  if (!kode) {
    const {count} = await db.from('barang').select('*',{count:'exact',head:true});
    kode = 'BRG'+pad((count||0)+1,5);
  }
  const payload = {
    kode, nama,
    kategori: document.getElementById('f-br-kategori').value,
    satuan: document.getElementById('f-br-satuan').value,
    harga_beli: Number(document.getElementById('f-br-hbeli').value)||0,
    harga_jual: Number(document.getElementById('f-br-hjual').value)||0,
    stok: Number(document.getElementById('f-br-stok').value)||0,
    stok_minimum: Number(document.getElementById('f-br-smin').value)||5,
    lokasi_gudang: document.getElementById('f-br-lokasi').value,
    aktif: document.getElementById('f-br-aktif').value==='true',
  };
  showLoading(true);
  try {
    if (id) await dbOp('barang','UPDATE',{id,payload});
    else await dbOp('barang','INSERT',{id:uid(),...payload});
    closeModal('modal-barang');
    showToast(id?'Barang diperbarui':'Barang ditambahkan');
    await loadBarang();
  } catch(e) { showToast('Gagal menyimpan: '+e.message,'error'); }
  showLoading(false);
}

async function delBarang(id, nama) {
  if (!confirm2(`Hapus barang "${nama}"?`)) return;
  showLoading(true);
  try {
    await dbOp('barang','DELETE',{id});
    showToast('Barang dihapus');
    await loadBarang();
  } catch(e) { showToast('Gagal menghapus','error'); }
  showLoading(false);
}

let _gudangData = [];
window.init_gudang = async function(){
  _gudangData = await loadTable('barang',{order:'nama'});
  renderGudang(_gudangData);
  const tot = _gudangData.length;
  const low = _gudangData.filter(b=>b.stok<=b.stok_minimum&&b.stok>0).length;
  const empty = _gudangData.filter(b=>b.stok<=0).length;
  document.getElementById('gudang-summary').innerHTML = `
    <div class="status-badge"><span class="status-dot" style="background:var(--text3)"></span>${tot} Total Item</div>
    <div class="status-badge" style="border-color:rgba(34,197,94,0.3)"><span class="status-dot" style="background:var(--green)"></span>${tot-low-empty} Stok Aman</div>
    <div class="status-badge" style="border-color:rgba(245,158,11,0.3)"><span class="status-dot" style="background:var(--yellow)"></span>${low} Menipis</div>
    <div class="status-badge" style="border-color:rgba(239,68,68,0.3)"><span class="status-dot" style="background:var(--red)"></span>${empty} Habis</div>`;
};

function renderGudang(data){
  document.getElementById('gudang-grid').innerHTML = data.length ? data.map(b=>`
    <div class="stok-card ${b.stok<=0?'low':b.stok<=b.stok_minimum?'low':'ok'}" onclick="lihatMutasi('${b.id}','${b.nama}')">
      <div class="stok-nama">${b.nama}</div>
      <div class="stok-num">${b.stok}</div>
      <div class="stok-satuan">${b.satuan}</div>
      <div class="stok-min">Min: ${b.stok_minimum} · ${b.kategori||'Umum'}</div>
      ${b.stok<=0?'<div style="margin-top:6px"><span class="badge badge-red">HABIS</span></div>':b.stok<=b.stok_minimum?'<div style="margin-top:6px"><span class="badge badge-yellow">MENIPIS</span></div>':''}
    </div>`).join('') : '<div style="color:var(--text3);text-align:center;padding:40px;grid-column:1/-1">Tidak ada barang</div>';
}

function filterGudang(){
  const kat = document.getElementById('filter-kategori').value;
  const stk = document.getElementById('filter-stok').value;
  let d = [..._gudangData];
  if(kat) d=d.filter(b=>b.kategori===kat);
  if(stk==='low') d=d.filter(b=>b.stok>0&&b.stok<=b.stok_minimum);
  else if(stk==='ok') d=d.filter(b=>b.stok>b.stok_minimum);
  else if(stk==='empty') d=d.filter(b=>b.stok<=0);
  renderGudang(d);
}

async function openKoreksiStok(){
  const brg=await loadTable('barang',{order:'nama'});
  document.getElementById('f-kor-barang').innerHTML='<option value="">-- Pilih Barang --</option>'+brg.map(b=>`<option value="${b.id}" data-stok="${b.stok}">${b.nama} (Stok: ${b.stok} ${b.satuan})</option>`).join('');
  openModal('modal-koreksi');
}

async function saveKoreksi(){
  const bId=document.getElementById('f-kor-barang').value;
  const jenis=document.getElementById('f-kor-jenis').value;
  const jml=Number(document.getElementById('f-kor-jumlah').value)||0;
  const ket=document.getElementById('f-kor-ket').value;
  if(!bId||!jml){showToast('Lengkapi data koreksi','error');return;}
  showLoading(true);
  try{
    const {data:br}=await db.from('barang').select('stok').eq('id',bId).single();
    const stokBaru=jenis==='masuk'?br.stok+jml:Math.max(0,br.stok-jml);
    await dbOp('barang','UPDATE',{id:bId,payload:{stok:stokBaru}});
    await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:bId,jenis:'koreksi',jumlah:jenis==='masuk'?jml:-jml,stok_sebelum:br.stok,stok_sesudah:stokBaru,referensi_tipe:'manual',keterangan:ket||'Koreksi manual'});
    closeModal('modal-koreksi');showToast('Koreksi stok berhasil');await init_gudang();
  }catch(e){showToast('Gagal koreksi','error');}
  showLoading(false);
}

async function loadMutasi(){
  const bId=document.getElementById('f-mutasi-barang').value;
  if(!bId)return;
  const dari=document.getElementById('f-mutasi-dari').value;
  const sampai=document.getElementById('f-mutasi-sampai').value;

  const jmlMasuk=(data||[]).filter(m=>m.jumlah>0).reduce((a,m)=>a+m.jumlah,0);
  const jmlKeluar=(data||[]).filter(m=>m.jumlah<0).reduce((a,m)=>a+Math.abs(m.jumlah),0);

    <td>${m.stok_sebelum}</td><td>${m.stok_sesudah}</td>
    <td><span style="font-size:11px;color:var(--text3)">${m.referensi_tipe||'-'}</span>${m.referensi_no?`<br><code style="font-size:11px;color:var(--orange)">${m.referensi_no}</code>`:''}</td>
    <td style="font-size:12px;color:var(--text3)">${m.keterangan||'-'}</td>

let _woParts = [];
window.init_service = async function(){await loadWO();};

async function openModalWO(wo=null){
  _woParts=[];
  document.getElementById('f-wo-id').value='';
  document.getElementById('f-wo-no').value='';
  document.getElementById('f-wo-tgl').value=today();
  document.getElementById('f-wo-keluhan').value='';
  document.getElementById('f-wo-diagnosa').value='';
  document.getElementById('f-wo-jasa').value='0';
  document.getElementById('f-wo-diskon').value='0';
  document.getElementById('f-wo-total').value='0';
  document.getElementById('f-wo-bayar').value='0';
  document.getElementById('f-wo-catatan').value='';
  document.getElementById('f-wo-status').value='antri';

  const [pls,meks,kends]= await Promise.all([
    loadTable('pelanggan',{order:'nama'}),
    loadTable('mekanik',{eq:{aktif:true},order:'nama'}),

  document.getElementById('f-wo-mek').innerHTML='<option value="">-- Pilih Mekanik --</option>'+meks.map(m=>`<option value="${m.id}">${m.nama}</option>`).join('');

  if(!wo){ const no = await autoNo('WO',`work_order`,'no_wo'); document.getElementById('f-wo-no').value=no; }

function loadKendByPel(){
  const pelId=document.getElementById('f-wo-pel').value;
  const kends=window._allKend||[];
  const filtered=pelId?kends.filter(k=>k.pelanggan_id===pelId):kends;
  document.getElementById('f-wo-kend').innerHTML='<option value="">-- Pilih Kendaraan --</option>'+filtered.map(k=>`<option value="${k.id}">${k.no_plat} - ${k.merk||''} ${k.tipe||''}</option>`).join('');

async function addWOPart(){
  const brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});
  const rowId='part_'+Date.now();
  _woParts.push({rowId,barang_id:'',nama_barang:'',satuan:'pcs',jumlah:1,harga_jual:0,subtotal:0,is_non_gudang:false});
  renderWOParts(brg);
}

function renderWOParts(brg=null){
  const tbody=document.getElementById('body-wo-parts');
  if(!_woParts.length){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:12px;color:var(--text3);font-size:12px">Belum ada part — klik Tambah Part</td></tr>`;return;}
  tbody.innerHTML=_woParts.map((p,i)=>`
    <tr id="row-${p.rowId}">
      <td>
        <select class="form-input" style="font-size:12px;width:100%" onchange="selectWOPart(this,'${p.rowId}')">
          <option value="">-- Pilih dari gudang --</option>
          ${(brg||[]).map(b=>`<option value="${b.id}" data-nama="${b.nama}" data-satuan="${b.satuan}" data-harga="${b.harga_jual}">${b.nama} (${b.stok} ${b.satuan})</option>`).join('')}
          <option value="__manual__">+ Input Manual (Non-Gudang)</option>
        </select>
        <input id="nm-${p.rowId}" type="text" placeholder="Nama part manual" class="form-input" style="font-size:12px;margin-top:3px;display:none" value="${p.nama_barang}" oninput="updateWOPart('${p.rowId}','nama_barang',this.value)"/>
      </td>
      <td><input type="text" class="form-input" id="sat-${p.rowId}" value="${p.satuan}" oninput="updateWOPart('${p.rowId}','satuan',this.value)" style="font-size:12px"/></td>
      <td><input type="number" min="1" class="form-input" value="${p.jumlah}" oninput="updateWOPart('${p.rowId}','jumlah',Number(this.value))" style="font-size:12px"/></td>
      <td><input type="number" min="0" class="form-input" value="${p.harga_jual}" id="hj-${p.rowId}" oninput="updateWOPart('${p.rowId}','harga_jual',Number(this.value))" style="font-size:12px"/></td>
      <td style="font-family:var(--font-display);font-size:13px;color:var(--orange);white-space:nowrap" id="sub-${p.rowId}">${fmt(p.subtotal)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="removeWOPart('${p.rowId}')"><i class="ti ti-trash"></i></button></td>
    </tr>`).join('');
}

function selectWOPart(sel,rowId){
  const p=_woParts.find(x=>x.rowId===rowId);if(!p)return;
  const nmInput=document.getElementById('nm-'+rowId);
  if(sel.value==='__manual__'){
    p.barang_id='';p.is_non_gudang=true;p.nama_barang='';
    nmInput.style.display='block';nmInput.value='';
    document.getElementById('sat-'+rowId).value='pcs';
    document.getElementById('hj-'+rowId).value='0';
  } else if(sel.value){
    const opt=sel.selectedOptions[0];
    p.barang_id=sel.value;p.is_non_gudang=false;
    p.nama_barang=opt.dataset.nama;p.satuan=opt.dataset.satuan;p.harga_jual=Number(opt.dataset.harga);
    nmInput.style.display='none';
    document.getElementById('sat-'+rowId).value=p.satuan;
    document.getElementById('hj-'+rowId).value=p.harga_jual;
  }
  hitungSubtotalWO(rowId);
}

function updateWOPart(rowId,field,val){
  const p=_woParts.find(x=>x.rowId===rowId);if(!p)return;
  p[field]=val;hitungSubtotalWO(rowId);
}

function hitungSubtotalWO(rowId){
  const p=_woParts.find(x=>x.rowId===rowId);if(!p)return;
  p.subtotal=p.jumlah*p.harga_jual;
  const el=document.getElementById('sub-'+rowId);if(el)el.textContent=fmt(p.subtotal);
  hitungTotalWO();
}

function removeWOPart(rowId){
  _woParts=_woParts.filter(p=>p.rowId!==rowId);
  renderWOParts();hitungTotalWO();
}

function hitungTotalWO(){
  const subPart=_woParts.reduce((a,p)=>a+p.subtotal,0);
  const jasa=Number(document.getElementById('f-wo-jasa')?.value)||0;
  const diskon=Number(document.getElementById('f-wo-diskon')?.value)||0;
  const total=subPart+jasa-diskon;
  const bayar=Number(document.getElementById('f-wo-bayar')?.value)||0;
  if(document.getElementById('f-wo-total')) document.getElementById('f-wo-total').value=total;
  if(document.getElementById('wo-subtotal-part')) document.getElementById('wo-subtotal-part').textContent=fmt(subPart);
  if(document.getElementById('wo-biaya-jasa-val')) document.getElementById('wo-biaya-jasa-val').textContent=fmt(jasa);
}

async function saveWO(cetak=false){
  const kendId=document.getElementById('f-wo-kend').value;
  if(!kendId){showToast('Pilih kendaraan','error');return;}
  const id=document.getElementById('f-wo-id').value||uid();
  const subPart=_woParts.reduce((a,p)=>a+p.subtotal,0);
  const jasa=Number(document.getElementById('f-wo-jasa').value)||0;
  const diskon=Number(document.getElementById('f-wo-diskon').value)||0;
  const total=subPart+jasa-diskon;
  const bayar=Number(document.getElementById('f-wo-bayar').value)||0;
  const sisa=Math.max(0,total-bayar);
  const statusBayar=bayar<=0?'belum':sisa<=0?'lunas':'sebagian';
  const no=document.getElementById('f-wo-no').value;

  const payload={
    no_wo:no,tanggal:document.getElementById('f-wo-tgl').value,
    pelanggan_id:document.getElementById('f-wo-pel').value||null,
    kendaraan_id:kendId,mekanik_id:document.getElementById('f-wo-mek').value||null,
    keluhan:document.getElementById('f-wo-keluhan').value,
    diagnosa:document.getElementById('f-wo-diagnosa').value,
    status:document.getElementById('f-wo-status').value,
    biaya_jasa:jasa,subtotal_part:subPart,diskon,total,
    terbayar:bayar,sisa_piutang:sisa,
    metode_bayar:document.getElementById('f-wo-metode').value,
    status_bayar:statusBayar,
    catatan:document.getElementById('f-wo-catatan').value
  };

  showLoading(true);
  try{
    const woData=document.getElementById('f-wo-id').value?await dbOp('work_order','UPDATE',{id,payload}):await dbOp('work_order','INSERT',{id,...payload});
    // Simpan detail parts & update stok
    for(const p of _woParts){
      if(!p.nama_barang&&!p.barang_id) continue;
      const det={id:uid(),wo_id:id,barang_id:p.barang_id||null,nama_barang:p.nama_barang,satuan:p.satuan,jumlah:p.jumlah,harga_jual:p.harga_jual,subtotal:p.subtotal,is_non_gudang:p.is_non_gudang};
      await dbOp('detail_wo_part','INSERT',det);
      // Update stok jika dari gudang
      if(p.barang_id&&!p.is_non_gudang){
        const{data:br}=await db.from('barang').select('stok').eq('id',p.barang_id).single();
        const stokBaru=Math.max(0,(br?.stok||0)-p.jumlah);
        await dbOp('barang','UPDATE',{id:p.barang_id,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:p.barang_id,jenis:'keluar',jumlah:-p.jumlah,stok_sebelum:br?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'service',referensi_id:id,referensi_no:no,keterangan:'Part WO '+no});
      }
    }
    // Update piutang pelanggan
    if(sisa>0&&payload.pelanggan_id){
      const{data:pel}=await db.from('pelanggan').select('saldo_piutang').eq('id',payload.pelanggan_id).single();
      await dbOp('pelanggan','UPDATE',{id:payload.pelanggan_id,payload:{saldo_piutang:(pel?.saldo_piutang||0)+sisa}});
    }
    closeModal('modal-wo');
    showToast('Work Order disimpan');
    await loadWO();
    if(cetak) cetakWO({id,...payload},_woParts);
  }catch(e){showToast('Gagal simpan WO: '+e.message,'error');console.error(e);}
  showLoading(false);
}

  let q=db.from('work_order').select('*,kendaraan(no_plat,merk,tipe),pelanggan(nama),mekanik(nama)').order('tanggal',{ascending:false});
  if(statusFilter&&statusFilter!=='semua') q=q.eq('status',statusFilter);
  const{data}=await q;
  document.getElementById('body-wo').innerHTML=(data||[]).length?(data||[]).map(w=>`<tr>
    <td><code style="color:var(--orange);font-size:12px">${w.no_wo}</code></td>
    <td>${new Date(w.tanggal).toLocaleDateString('id-ID')}</td>
    <td><span style="font-family:var(--font-display);font-size:13px;font-weight:700;background:var(--bg3);padding:2px 7px;border-radius:4px">${w.kendaraan?.no_plat||'-'}</span></td>
    <td>${w.pelanggan?.nama||'Umum'}</td>
    <td>${w.mekanik?.nama||'-'}</td>
    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text3)">${w.keluhan||'-'}</td>
    <td style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--orange)">${fmt(w.total)}</td>
    <td><span class="badge ${w.status==='selesai'?'badge-green':w.status==='proses'?'badge-orange':'badge-gray'}">${w.status}</span></td>
    <td><span class="badge ${w.status_bayar==='lunas'?'badge-green':w.status_bayar==='sebagian'?'badge-yellow':'badge-red'}">${w.status_bayar}</span></td>
    <td><div style="display:flex;gap:3px">
      <button class="btn btn-outline btn-sm" title="Ubah Status" onclick="ubahStatusWO('${w.id}','${w.no_wo}','${w.status}')"><i class="ti ti-edit"></i></button>
      <button class="btn btn-outline btn-sm" title="Cetak Nota" onclick="cetakWOById('${w.id}')"><i class="ti ti-printer"></i></button>
      <button class="btn btn-danger btn-sm" title="Hapus" onclick="delWO('${w.id}','${w.no_wo}')"><i class="ti ti-trash"></i></button>
    </div></td>
  </tr>`).join(''):'<tr><td colspan="10" class="table-empty"><i class="ti ti-engine-off"></i>Tidak ada work order</td></tr>';
}

function filterWO(status,el){
  document.querySelectorAll('#content .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  loadWO(status);
}

async function delWO(id,no){if(!confirm2(`Hapus WO ${no}?`))return;showLoading(true);try{await dbOp('work_order','DELETE',{id});showToast('WO dihapus');await loadWO();}catch(e){showToast('Gagal','error');}showLoading(false);}

    const div = document.createElement('div');
    div.innerHTML = `
    <div class="modal-overlay" id="modal-status-wo" onclick="if(event.target===this)closeModal('modal-status-wo')">
      <div class="modal" style="max-width:400px">
        <div class="modal-header">
          <span class="modal-title">Ubah Status Work Order</span>
          <div class="modal-close" onclick="closeModal('modal-status-wo')"><i class="ti ti-x"></i></div>
        </div>
        <div class="modal-body">
          <div style="margin-bottom:12px">
            <div style="font-size:12px;color:var(--text3);margin-bottom:4px">No. WO</div>
            <div id="sw-no" style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--orange)"></div>
          </div>

          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('modal-status-wo')">Batal</button>
          <button class="btn btn-primary" onclick="simpanStatusWO()"><i class="ti ti-check"></i>Simpan Status</button>
        </div>
      </div>
    </div>`;
    document.body.appendChild(div.firstElementChild);
  }

  window._swId = id;
  document.getElementById('sw-no').textContent = no;

  const badgeMap = {
    antri:   { cls: 'badge-gray',   label: 'Antri' },
    proses:  { cls: 'badge-orange', label: 'Proses' },
    selesai: { cls: 'badge-green',  label: 'Selesai' },
    batal:   { cls: 'badge-red',    label: 'Batal' }
  };
  const cur = badgeMap[statusSaat] || { cls: 'badge-gray', label: statusSaat };
  document.getElementById('sw-current').innerHTML =
    '<span class="badge ' + cur.cls + '" style="font-size:13px;padding:4px 12px">' + cur.label + '</span>';

  const statusList = [
    { val: 'antri',   label: 'Antri',   cls: 'badge-gray',   desc: 'Kendaraan menunggu pengerjaan' },
    { val: 'proses',  label: 'Proses',  cls: 'badge-orange', desc: 'Sedang dikerjakan mekanik' },
    { val: 'selesai', label: 'Selesai', cls: 'badge-green',  desc: 'Service selesai, siap diserahkan' },
    { val: 'batal',   label: 'Batal',   cls: 'badge-red',    desc: 'Work order dibatalkan' },
  ];

  document.getElementById('sw-options').innerHTML = statusList.map(s =>
    '<label style="display:flex;align-items:center;gap:10px;padding:10px 12px;' +
    'background:' + (s.val===statusSaat?'var(--orange-dim)':'var(--bg3)') + ';' +
    'border:1px solid ' + (s.val===statusSaat?'var(--orange)':'var(--border2)') + ';' +
    'border-radius:var(--radius-sm);cursor:pointer">' +
    '<input type="radio" name="sw-status" value="' + s.val + '" ' + (s.val===statusSaat?'checked':'') + ' style="accent-color:var(--orange)"/>' +
    '<span class="badge ' + s.cls + '" style="min-width:64px;justify-content:center">' + s.label + '</span>' +
    '<span style="font-size:12px;color:var(--text2)">' + s.desc + '</span>' +
    '</label>'
  ).join('');

  openModal('modal-status-wo');
}

async function simpanStatusWO() {
  const sel = document.querySelector('input[name="sw-status"]:checked');
  if (!sel) { showToast('Pilih status terlebih dahulu', 'error'); return; }
  const newStatus = sel.value;
  const id = window._swId;
  showLoading(true);
  try {
    await dbOp('work_order', 'UPDATE', { id, payload: { status: newStatus } });
    closeModal('modal-status-wo');
    showToast('Status WO diubah ke "' + newStatus + '"');
    await loadWO();
  } catch(e) {
    showToast('Gagal menyimpan status', 'error');
  }
  showLoading(false);
}

async function getSettings(){
  const{data}=await db.from('pengaturan').select('*').limit(1).single();
  return data||{nama_bengkel:'AutoServ Pro',alamat:'-',telepon:'-',footer_nota:'Terima kasih!'};
}

async function cetakWOById(woId){
  showLoading(true);
  try{
    const{data:wo}=await db.from('work_order').select('*,kendaraan(no_plat,merk,tipe),pelanggan(nama),mekanik(nama)').eq('id',woId).single();
    const{data:parts}=await db.from('detail_wo_part').select('*').eq('wo_id',woId);
    cetakWO(wo,parts||[]);
  }catch(e){showToast('Gagal cetak','error');}
  showLoading(false);
}

async function cetakWO(wo,parts){
  const s=await getSettings();
  const logoHtml=s.logo_base64?`<img src="${s.logo_base64}" style="max-width:80px;max-height:50px;object-fit:contain;margin-bottom:6px"/>`:

    <div class="nota-header">

      <div style="font-size:10px">${s.alamat}</div>
      <div style="font-size:10px">Telp: ${s.telepon}</div>
    </div>
    <hr class="nota-divider"/>
    <div style="text-align:center;font-weight:700;font-size:12px;margin-bottom:6px">NOTA SERVICE</div>
    <div class="nota-row"><span class="label">No. WO</span><span class="val">${wo.no_wo}</span></div>
    <div class="nota-row"><span class="label">Tanggal</span><span class="val">${new Date(wo.tanggal).toLocaleDateString('id-ID')}</span></div>
    <div class="nota-row"><span class="label">Pelanggan</span><span class="val">${wo.pelanggan?.nama||'Umum'}</span></div>

</div>
<div class="form-grid" style="margin-top:12px">
  <div class="form-group"><label class="form-label">Diskon Global</label><input id="f-jl-diskon" class="form-input" type="number" min="0" value="0" oninput="hitungTotalJual()"/></div>
  <div class="form-group"><label class="form-label">Total Bayar</label><input id="f-jl-total" class="form-input" type="number" readonly style="color:var(--orange);font-weight:600"/></div>
  <div class="form-group"><label class="form-label">Dibayar</label><input id="f-jl-bayar" class="form-input" type="number" min="0" value="0" oninput="hitungTotalJual()"/></div>
  <div class="form-group"><label class="form-label">Kembalian / Sisa</label><input id="f-jl-kembali" class="form-input" readonly style="color:var(--green)"/></div>

'modal-xl',`

}

let _jualItems=[];
window.init_penjualan=async function(){await loadPenjualan();};

async function openModalJual(){
  _jualItems=[];
  const[pls,brg]=await Promise.all([loadTable('pelanggan',{order:'nama'}),loadTable('barang',{eq:{aktif:true},order:'nama'})]);
  window._brg=brg;
  document.getElementById('f-jl-pel').innerHTML='<option value="">-- Umum --</option>'+pls.map(p=>`<option value="${p.id}">${p.nama}</option>`).join('');
  const no=await autoNo('JL','penjualan','no_faktur');
  document.getElementById('f-jl-no').value=no;
  document.getElementById('f-jl-tgl').value=today();
  document.getElementById('f-jl-diskon').value='0';
  document.getElementById('f-jl-bayar').value='0';
  document.getElementById('f-jl-catatan').value='';
  renderJualItems();hitungTotalJual();
  openModal('modal-jual');
}

async function addJualItem(){
  if(!window._brg){window._brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});}
  const rId='ji_'+Date.now();
  _jualItems.push({rowId:rId,barang_id:'',nama_barang:'',satuan:'pcs',jumlah:1,harga_jual:0,diskon_item:0,subtotal:0,is_non_gudang:false});
  renderJualItems();
}

function renderJualItems(){
  const tbody=document.getElementById('body-jual-items');
  if(!_jualItems.length){tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:12px;color:var(--text3);font-size:12px">Belum ada item</td></tr>`;return;}
  const brg=window._brg||[];
  tbody.innerHTML=_jualItems.map((p,i)=>`
    <tr id="jrow-${p.rowId}">
      <td>
        <select class="form-input" style="font-size:11px" onchange="selectJualItem(this,'${p.rowId}')">
          <option value="">-- Dari gudang --</option>
          ${brg.map(b=>`<option value="${b.id}" data-nama="${b.nama}" data-satuan="${b.satuan}" data-harga="${b.harga_jual}">${b.nama} (${b.stok})</option>`).join('')}
          <option value="__manual__">+ Input Manual</option>
        </select>
        <input id="jnm-${p.rowId}" type="text" placeholder="Nama manual" class="form-input" style="font-size:11px;margin-top:2px;display:none" oninput="updateJualItem('${p.rowId}','nama_barang',this.value)"/>
      </td>
      <td><input type="text" class="form-input" id="jsat-${p.rowId}" value="${p.satuan}" oninput="updateJualItem('${p.rowId}','satuan',this.value)" style="font-size:11px"/></td>
      <td><input type="number" min="1" class="form-input" value="${p.jumlah}" oninput="updateJualItem('${p.rowId}','jumlah',Number(this.value))" style="font-size:11px"/></td>
      <td><input type="number" min="0" class="form-input" id="jhj-${p.rowId}" value="${p.harga_jual}" oninput="updateJualItem('${p.rowId}','harga_jual',Number(this.value))" style="font-size:11px"/></td>
      <td><input type="number" min="0" class="form-input" value="${p.diskon_item}" oninput="updateJualItem('${p.rowId}','diskon_item',Number(this.value))" style="font-size:11px"/></td>
      <td style="font-size:11px;color:var(--orange);white-space:nowrap" id="jsub-${p.rowId}">${fmt(p.subtotal)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="removeJualItem('${p.rowId}')"><i class="ti ti-x"></i></button></td>
    </tr>`).join('');
}

function selectJualItem(sel,rowId){
  const p=_jualItems.find(x=>x.rowId===rowId);if(!p)return;
  const nm=document.getElementById('jnm-'+rowId);
  if(sel.value==='__manual__'){p.barang_id='';p.is_non_gudang=true;nm.style.display='block';nm.value='';document.getElementById('jhj-'+rowId).value='0';document.getElementById('jsat-'+rowId).value='pcs';}
  else if(sel.value){const opt=sel.selectedOptions[0];p.barang_id=sel.value;p.is_non_gudang=false;p.nama_barang=opt.dataset.nama;p.satuan=opt.dataset.satuan;p.harga_jual=Number(opt.dataset.harga);nm.style.display='none';document.getElementById('jhj-'+rowId).value=p.harga_jual;document.getElementById('jsat-'+rowId).value=p.satuan;}
  hitungSubtotalJual(rowId);
}
function updateJualItem(rowId,field,val){const p=_jualItems.find(x=>x.rowId===rowId);if(!p)return;p[field]=val;hitungSubtotalJual(rowId);}
function hitungSubtotalJual(rowId){const p=_jualItems.find(x=>x.rowId===rowId);if(!p)return;p.subtotal=(p.jumlah*p.harga_jual)-p.diskon_item;const el=document.getElementById('jsub-'+rowId);if(el)el.textContent=fmt(p.subtotal);hitungTotalJual();}
function removeJualItem(rowId){_jualItems=_jualItems.filter(p=>p.rowId!==rowId);renderJualItems();hitungTotalJual();}
function hitungTotalJual(){
  const sub=_jualItems.reduce((a,p)=>a+p.subtotal,0);
  const dis=Number(document.getElementById('f-jl-diskon')?.value)||0;
  const total=sub-dis;
  const bayar=Number(document.getElementById('f-jl-bayar')?.value)||0;
  if(document.getElementById('f-jl-total'))document.getElementById('f-jl-total').value=total;
  if(document.getElementById('jl-total-val'))document.getElementById('jl-total-val').textContent=fmt(total);
  const kembali=bayar-total;
  if(document.getElementById('f-jl-kembali'))document.getElementById('f-jl-kembali').value=kembali>=0?fmt(kembali):'Kurang: '+fmt(Math.abs(kembali));
}

async function saveJual(cetak=false){
  if(!_jualItems.length){showToast('Tambah minimal 1 item','error');return;}
  const id=uid();
  const sub=_jualItems.reduce((a,p)=>a+p.subtotal,0);
  const dis=Number(document.getElementById('f-jl-diskon').value)||0;
  const total=sub-dis;
  const bayar=Number(document.getElementById('f-jl-bayar').value)||0;
  const sisa=Math.max(0,total-bayar);
  const statusBayar=bayar<=0?'belum':sisa<=0?'lunas':'sebagian';
  const no=document.getElementById('f-jl-no').value;
  const payload={no_faktur:no,tanggal:document.getElementById('f-jl-tgl').value,pelanggan_id:document.getElementById('f-jl-pel').value||null,subtotal:sub,diskon:dis,total,terbayar:bayar,sisa_piutang:sisa,metode_bayar:document.getElementById('f-jl-metode').value,status_bayar:statusBayar,catatan:document.getElementById('f-jl-catatan').value};
  showLoading(true);
  try{
    await dbOp('penjualan','INSERT',{id,...payload});
    for(const p of _jualItems){
      if(!p.nama_barang&&!p.barang_id)continue;
      await dbOp('detail_penjualan','INSERT',{id:uid(),penjualan_id:id,barang_id:p.barang_id||null,nama_barang:p.nama_barang,satuan:p.satuan,jumlah:p.jumlah,harga_jual:p.harga_jual,diskon_item:p.diskon_item,subtotal:p.subtotal,is_non_gudang:p.is_non_gudang});
      if(p.barang_id&&!p.is_non_gudang){
        const{data:br}=await db.from('barang').select('stok').eq('id',p.barang_id).single();
        const stokBaru=Math.max(0,(br?.stok||0)-p.jumlah);
        await dbOp('barang','UPDATE',{id:p.barang_id,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:p.barang_id,jenis:'keluar',jumlah:-p.jumlah,stok_sebelum:br?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'penjualan',referensi_id:id,referensi_no:no,keterangan:'Penjualan '+no});
      }
    }
    if(sisa>0&&payload.pelanggan_id){const{data:pel}=await db.from('pelanggan').select('saldo_piutang').eq('id',payload.pelanggan_id).single();await dbOp('pelanggan','UPDATE',{id:payload.pelanggan_id,payload:{saldo_piutang:(pel?.saldo_piutang||0)+sisa}});}
    closeModal('modal-jual');showToast('Penjualan disimpan');await loadPenjualan();
    if(cetak) await cetakPenjualan({id,...payload},_jualItems);
  }catch(e){showToast('Gagal: '+e.message,'error');console.error(e);}
  showLoading(false);
}

async function loadPenjualan(){
  const dari=document.getElementById('f-jual-dari')?.value;
  const sampai=document.getElementById('f-jual-sampai')?.value;
  let q=db.from('penjualan').select('*,pelanggan(nama)').order('tanggal',{ascending:false});
  if(dari)q=q.gte('tanggal',dari);if(sampai)q=q.lte('tanggal',sampai);
  const{data}=await q;
  document.getElementById('body-jual').innerHTML=(data||[]).length?(data||[]).map(j=>`<tr>
    <td><code style="color:var(--orange);font-size:12px">${j.no_faktur}</code></td>
    <td>${new Date(j.tanggal).toLocaleDateString('id-ID')}</td>
    <td>${j.pelanggan?.nama||'Umum'}</td>
    <td>${fmt(j.subtotal)}</td>
    <td>${j.diskon>0?fmt(j.diskon):'-'}</td>
    <td style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--orange)">${fmt(j.total)}</td>
    <td><span class="badge ${j.status_bayar==='lunas'?'badge-green':j.status_bayar==='sebagian'?'badge-yellow':'badge-red'}">${j.status_bayar}</span></td>
    <td>${j.metode_bayar}</td>
    <td><div style="display:flex;gap:3px">
      <button class="btn btn-outline btn-sm" onclick="cetakJualById('${j.id}')"><i class="ti ti-printer"></i></button>
    </div></td>
  </tr>`).join(''):'<tr><td colspan="9" class="table-empty"><i class="ti ti-file-off"></i>Belum ada penjualan</td></tr>';
}

async function cetakJualById(jId){
  showLoading(true);
  const{data:j}=await db.from('penjualan').select('*,pelanggan(nama)').eq('id',jId).single();
  const{data:items}=await db.from('detail_penjualan').select('*').eq('penjualan_id',jId);
  await cetakPenjualan(j,items||[]);showLoading(false);
}

async function cetakPenjualan(j,items){
  const s=await getSettings();
  const logoHtml=s.logo_base64?`<img src="${s.logo_base64}" style="max-width:80px;max-height:50px;object-fit:contain;margin-bottom:6px"/>`:
    `<div style="font-size:20px;font-weight:800">${s.nama_bengkel}</div>`;
  const html=`
    <div class="nota-header">${logoHtml}
      <div class="nama">${s.nama_bengkel}</div>
      <div style="font-size:10px">${s.alamat}</div>
      <div style="font-size:10px">Telp: ${s.telepon}</div>
    </div>
    <hr class="nota-divider"/>
    <div style="text-align:center;font-weight:700;margin-bottom:6px;font-size:12px">NOTA PENJUALAN</div>
    <div class="nota-row"><span class="label">No. Faktur</span><span class="val">${j.no_faktur}</span></div>
    <div class="nota-row"><span class="label">Tanggal</span><span class="val">${new Date(j.tanggal).toLocaleDateString('id-ID')}</span></div>
    <div class="nota-row"><span class="label">Pelanggan</span><span class="val">${j.pelanggan?.nama||'Umum'}</span></div>
    <hr class="nota-divider"/>
    ${(items||[]).map(p=>`
      <div class="nota-row"><span class="label">${p.nama_barang}</span></div>
      <div class="nota-row" style="padding-left:10px"><span class="label">${p.jumlah} x ${fmtNum(p.harga_jual)}</span><span class="val">${fmt(p.subtotal)}</span></div>`).join('')}
    <hr class="nota-divider"/>
    ${j.diskon>0?`<div class="nota-row"><span class="label">Diskon</span><span class="val">- ${fmt(j.diskon)}</span></div>`:''}
    <div class="nota-row nota-total"><span class="label">TOTAL</span><span class="val">${fmt(j.total)}</span></div>
    <div class="nota-row"><span class="label">Terbayar</span><span class="val">${fmt(j.terbayar)}</span></div>
    ${j.sisa_piutang>0?`<div class="nota-row"><span class="label">Sisa</span><span class="val">${fmt(j.sisa_piutang)}</span></div>`:''}
    <hr class="nota-divider"/>
    <div class="nota-footer">${s.footer_nota||'Terima kasih!'}</div>`;
  const pa=document.getElementById('print-area');
  pa.style.display='block';
  pa.innerHTML=`<div class="nota-preview">${html}</div>`;
  setTimeout(()=>{window.print();pa.style.display='none';},300);
}

window.init_pengaturan = async function(){
  const{data}=await db.from('pengaturan').select('*').limit(1).single();
  if(data){
    document.getElementById('s-nama').value=data.nama_bengkel||'';
    document.getElementById('s-alamat').value=data.alamat||'';
    document.getElementById('s-telp').value=data.telepon||'';
    document.getElementById('s-footer').value=data.footer_nota||'';
    if(data.logo_base64)document.getElementById('logo-preview').innerHTML=`<img src="${data.logo_base64}" style="max-height:80px;max-width:200px;object-fit:contain;border-radius:8px;background:#fff;padding:6px"/>`;
    window._settingsId=data.id;
  }
};

function uploadLogo(input){
  const file=input.files[0];if(!file)return;
  if(file.size>200*1024){showToast('Logo maks 200KB','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result;
    document.getElementById('logo-preview').innerHTML=`<img src="${b64}" style="max-height:80px;max-width:200px;object-fit:contain;border-radius:8px;background:#fff;padding:6px"/>`;
    window._logoB64=b64;
  };
  reader.readAsDataURL(file);
}

async function savePengaturan(){
  const payload={nama_bengkel:document.getElementById('s-nama').value,alamat:document.getElementById('s-alamat').value,telepon:document.getElementById('s-telp').value,footer_nota:document.getElementById('s-footer').value};
  if(window._logoB64)payload.logo_base64=window._logoB64;
  showLoading(true);
  try{
    if(window._settingsId)await db.from('pengaturan').update(payload).eq('id',window._settingsId);
    else await db.from('pengaturan').insert({id:uid(),...payload});
    showToast('Pengaturan disimpan');
  }catch(e){showToast('Gagal simpan','error');}
  showLoading(false);
}

let _poItems=[];
window.init_pesanan_beli=async function(){await loadPO();};

async function openModalPO(){
  _poItems=[];
  const sups=await loadTable('supplier',{order:'nama'});
  document.getElementById('f-po-sup').innerHTML='<option value="">-- Pilih --</option>'+sups.map(s=>`<option value="${s.id}">${s.nama}</option>`).join('');
  document.getElementById('f-po-id').value='';
  const no=await autoNo('PO','pesanan_beli','no_po');
  document.getElementById('f-po-no').value=no;
  document.getElementById('f-po-tgl').value=today();
  document.getElementById('f-po-catatan').value='';
  document.getElementById('f-po-status').value='pending';
  renderPOItems();hitungTotalPO();
  openModal('modal-po');
}

async function addPOItem(){
  if(!window._brg) window._brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});
  _poItems.push({rowId:'poi_'+Date.now(),barang_id:'',nama_barang:'',satuan:'pcs',jumlah:1,harga_beli:0,subtotal:0});
  renderPOItems();
}

function renderPOItems(){
  const tbody=document.getElementById('body-po-items');
  const brg=window._brg||[];
  if(!_poItems.length){tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:12px;color:var(--text3);font-size:12px">Belum ada item</td></tr>`;return;}
  tbody.innerHTML=_poItems.map(p=>`<tr id="prow-${p.rowId}">
    <td><select class="form-input" style="font-size:12px" onchange="selectPOItem(this,'${p.rowId}')">
      <option value="">-- Pilih Barang --</option>
      ${brg.map(b=>`<option value="${b.id}" data-nama="${b.nama}" data-satuan="${b.satuan}" data-harga="${b.harga_beli}">${b.nama}</option>`).join('')}
    </select></td>
    <td><input type="text" class="form-input" id="psat-${p.rowId}" value="${p.satuan}" oninput="updatePOItem('${p.rowId}','satuan',this.value)" style="font-size:12px"/></td>
    <td><input type="number" min="1" class="form-input" value="${p.jumlah}" oninput="updatePOItem('${p.rowId}','jumlah',Number(this.value))" style="font-size:12px"/></td>
    <td><input type="number" min="0" class="form-input" id="phb-${p.rowId}" value="${p.harga_beli}" oninput="updatePOItem('${p.rowId}','harga_beli',Number(this.value))" style="font-size:12px"/></td>
    <td style="font-size:12px;color:var(--orange)" id="psub-${p.rowId}">${fmt(p.subtotal)}</td>
    <td><button class="btn btn-danger btn-sm" onclick="removePOItem('${p.rowId}')"><i class="ti ti-x"></i></button></td>
  </tr>`).join('');
}
function selectPOItem(sel,rowId){const p=_poItems.find(x=>x.rowId===rowId);if(!p||!sel.value)return;const opt=sel.selectedOptions[0];p.barang_id=sel.value;p.nama_barang=opt.dataset.nama;p.satuan=opt.dataset.satuan;p.harga_beli=Number(opt.dataset.harga);document.getElementById('psat-'+rowId).value=p.satuan;document.getElementById('phb-'+rowId).value=p.harga_beli;hitungSubPO(rowId);}
function updatePOItem(rowId,field,val){const p=_poItems.find(x=>x.rowId===rowId);if(!p)return;p[field]=val;hitungSubPO(rowId);}
function hitungSubPO(rowId){const p=_poItems.find(x=>x.rowId===rowId);if(!p)return;p.subtotal=p.jumlah*p.harga_beli;const el=document.getElementById('psub-'+rowId);if(el)el.textContent=fmt(p.subtotal);hitungTotalPO();}
function removePOItem(rowId){_poItems=_poItems.filter(x=>x.rowId!==rowId);renderPOItems();hitungTotalPO();}
function hitungTotalPO(){const t=_poItems.reduce((a,p)=>a+p.subtotal,0);const el=document.getElementById('po-total-val');if(el)el.textContent=fmt(t);}

async function savePO(){
  const supId=document.getElementById('f-po-sup').value;if(!supId){showToast('Pilih supplier','error');return;}
  if(!_poItems.length){showToast('Tambah minimal 1 item','error');return;}
  const id=uid();
  const total=_poItems.reduce((a,p)=>a+p.subtotal,0);
  const payload={no_po:document.getElementById('f-po-no').value,tanggal:document.getElementById('f-po-tgl').value,supplier_id:supId,status:document.getElementById('f-po-status').value,total,catatan:document.getElementById('f-po-catatan').value};
  showLoading(true);
  try{
    await dbOp('pesanan_beli','INSERT',{id,...payload});
    for(const p of _poItems){if(!p.barang_id)continue;await dbOp('detail_pesanan_beli','INSERT',{id:uid(),pesanan_beli_id:id,barang_id:p.barang_id,nama_barang:p.nama_barang,satuan:p.satuan,jumlah:p.jumlah,harga_beli:p.harga_beli,subtotal:p.subtotal});}
    closeModal('modal-po');showToast('PO berhasil disimpan');await loadPO();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function loadPO(){
  const sf=document.getElementById('f-po-status-filter')?.value||'';
  let q=db.from('pesanan_beli').select('*,supplier(nama)').order('tanggal',{ascending:false});
  if(sf)q=q.eq('status',sf);
  const{data}=await q;
  document.getElementById('body-po').innerHTML=(data||[]).length?(data||[]).map(p=>`<tr>
    <td><code style="color:var(--orange);font-size:12px">${p.no_po}</code></td>
    <td>${new Date(p.tanggal).toLocaleDateString('id-ID')}</td>
    <td>${p.supplier?.nama||'-'}</td>
    <td style="font-family:var(--font-display);color:var(--orange)">${fmt(p.total)}</td>
    <td><span class="badge ${p.status==='approved'?'badge-green':p.status==='selesai'?'badge-blue':p.status==='ditolak'?'badge-red':'badge-gray'}">${p.status}</span></td>
    <td style="font-size:12px;color:var(--text3)">${p.catatan||'-'}</td>
    <td><div style="display:flex;gap:4px">
      <button class="btn btn-success btn-sm" onclick="prosesPOkePembelian('${p.id}','${p.no_po}')"><i class="ti ti-arrow-right"></i>Beli</button>
      <button class="btn btn-danger btn-sm" onclick="delPO('${p.id}','${p.no_po}')"><i class="ti ti-trash"></i></button>
    </div></td>
  </tr>`).join(''):'<tr><td colspan="7" class="table-empty"><i class="ti ti-file-off"></i>Belum ada PO</td></tr>';
}

async function prosesPOkePembelian(poId,no){
  if(!confirm2('Buat faktur pembelian dari PO '+no+'?'))return;
  window._fromPoId=poId;
  showPage('pembelian');
  setTimeout(()=>openModalBeli(poId),600);
}
async function delPO(id,no){if(!confirm2('Hapus PO '+no+'?'))return;showLoading(true);try{await db.from('detail_pesanan_beli').delete().eq('pesanan_beli_id',id);await dbOp('pesanan_beli','DELETE',{id});showToast('PO dihapus');await loadPO();}catch(e){showToast('Gagal','error');}showLoading(false);}
