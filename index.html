let _jualItems=[];
window.init_penjualan=async function(){await loadPenjualan();};

async function openModalJual(){
  _jualItems=[];
  const[pls,brg]=await Promise.all([loadTable('pelanggan',{order:'nama'}),loadTable('barang',{eq:{aktif:true},order:'nama'})]);
  window._brg=brg;
  openModal('modal-jual');
  createAC({containerId:'ac-jl-pel',placeholder:'Ketik nama pelanggan (kosong = Umum)...',data:pls,searchKeys:['nama','telepon'],renderItem:p=>({icon:'👤',main:p.nama,sub:p.telepon||''}),onSelect:p=>{document.getElementById('f-jl-pel').value=p.id;},onClear:()=>{document.getElementById('f-jl-pel').value='';},initialLabel:''});
  const no=await autoNo('JL','penjualan','no_faktur');
  document.getElementById('f-jl-no').value=no;
  document.getElementById('f-jl-tgl').value=today();
  document.getElementById('f-jl-diskon').value='0';
  document.getElementById('f-jl-bayar').value='0';
  document.getElementById('f-jl-catatan').value='';
  renderJualItems();hitungTotalJual();
  openModal('modal-jual');
}

async function addJualItem(){
  if(!window._brg){window._brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});}
  const rId='ji_'+Date.now();
  _jualItems.push({rowId:rId,barang_id:'',nama_barang:'',satuan:'pcs',jumlah:1,harga_jual:0,diskon_item:0,subtotal:0,is_non_gudang:false});
  renderJualItems();
}

function renderJualItems(){
  const tbody=document.getElementById('body-jual-items');
  if(!_jualItems.length){
    tbody.innerHTML=`<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--text3);font-size:12px">
      <i class="ti ti-shopping-cart" style="font-size:22px;display:block;margin-bottom:6px"></i>
      Belum ada item — klik Tambah Item</td></tr>`;
    return;
  }
  const brg=window._brg||[];

  tbody.innerHTML=_jualItems.map(p=>`
    <tr id="jrow-${p.rowId}">
      <td style="min-width:180px">
        ${p.is_non_gudang
          ? `<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
               <span style="font-size:10px;background:rgba(255,106,0,0.15);color:var(--orange);border:1px solid rgba(255,106,0,0.3);border-radius:4px;padding:1px 6px">✏️ Manual</span>
               <button class="btn btn-outline btn-sm" style="padding:1px 5px;font-size:10px" onclick="gantiKeGudangJual('${p.rowId}')"><i class="ti ti-arrow-back-up" style="font-size:10px"></i></button>
             </div>
             <input id="jnm-${p.rowId}" type="text" placeholder="Nama barang..." class="form-input"
               style="font-size:11px" value="${(p.nama_barang||'').replace(/"/g,'&quot;')}"
               oninput="updateJualItem('${p.rowId}','nama_barang',this.value)"/>`
          : `<div style="display:flex;flex-direction:column;gap:3px">
             <div id="ac-jl-item-${p.rowId}"></div>
             <button type="button" onclick="setManualJual('${p.rowId}')"
               style="font-size:10px;color:var(--orange);background:rgba(255,106,0,0.08);border:1px dashed rgba(255,106,0,0.3);border-radius:4px;padding:2px 8px;cursor:pointer;text-align:left;width:fit-content">
               ✏️ Input manual (non-gudang)
             </button>
             ${p.nama_barang?`<div style="font-size:10px;color:var(--text3)">📦 ${p.nama_barang}</div>`:''}
           </div>`
        }
      </td>
      <td><input type="text" class="form-input" id="jsat-${p.rowId}" value="${p.satuan||'pcs'}" oninput="updateJualItem('${p.rowId}','satuan',this.value)" style="font-size:11px"/></td>
      <td><input type="number" min="1" class="form-input" value="${p.jumlah||1}" oninput="updateJualItem('${p.rowId}','jumlah',Number(this.value))" style="font-size:11px"/></td>
      <td><input type="number" min="0" class="form-input" id="jhj-${p.rowId}" value="${p.harga_jual||0}" oninput="updateJualItem('${p.rowId}','harga_jual',Number(this.value))" style="font-size:11px"/></td>
      <td><input type="number" min="0" class="form-input" value="${p.diskon_item||0}" oninput="updateJualItem('${p.rowId}','diskon_item',Number(this.value))" style="font-size:11px"/></td>
      <td style="font-size:11px;color:var(--orange);white-space:nowrap" id="jsub-${p.rowId}">${fmt(p.subtotal||0)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="removeJualItem('${p.rowId}')"><i class="ti ti-x"></i></button></td>
    </tr>`).join('');

  // Init autocomplete per baris item
  _jualItems.forEach(p=>{
    if(p.is_non_gudang) return;
    if(!document.getElementById(`ac-jl-item-${p.rowId}`)) return;
    createAC({
      containerId:`ac-jl-item-${p.rowId}`,
      placeholder:'Ketik nama barang...',
      data:brg, searchKeys:['nama','kode','satuan'],
      initialLabel:p.nama_barang||'',
      renderItem:b=>({
        icon:'📦', main:b.nama,
        sub:`Harga: ${fmt(b.harga_jual||0)}`,
        badge:`Stok: ${b.stok} ${b.satuan}`
      }),
      onSelect:b=>{
        const item=_jualItems.find(x=>x.rowId===p.rowId); if(!item)return;
        item.barang_id=b.id; item.nama_barang=b.nama;
        item.satuan=b.satuan||'pcs'; item.harga_jual=b.harga_jual||0;
        item.is_non_gudang=false;
        const satEl=document.getElementById('jsat-'+p.rowId); if(satEl)satEl.value=b.satuan||'pcs';
        const hjEl =document.getElementById('jhj-' +p.rowId); if(hjEl) hjEl.value =b.harga_jual||0;
        hitungSubtotalJual(p.rowId);
      },
      onClear:()=>{
        const item=_jualItems.find(x=>x.rowId===p.rowId); if(!item)return;
        item.barang_id=''; item.nama_barang='';
      }
    });
    // Tombol manual
  });
}

function setManualJual(rowId){
  const item=_jualItems.find(x=>x.rowId===rowId); if(!item)return;
  item.is_non_gudang=true; item.barang_id=''; item.nama_barang='';
  renderJualItems();
  setTimeout(()=>document.getElementById('jnm-'+rowId)?.focus(),50);
}

function gantiKeGudangJual(rowId){
  const p=_jualItems.find(x=>x.rowId===rowId); if(!p)return;
  p.is_non_gudang=false; p.barang_id=''; p.nama_barang='';
  renderJualItems();
}

function updateJualItem(rowId,field,val){const p=_jualItems.find(x=>x.rowId===rowId);if(!p)return;p[field]=val;hitungSubtotalJual(rowId);}
function hitungSubtotalJual(rowId){const p=_jualItems.find(x=>x.rowId===rowId);if(!p)return;p.subtotal=(p.jumlah*p.harga_jual)-p.diskon_item;const el=document.getElementById('jsub-'+rowId);if(el)el.textContent=fmt(p.subtotal);hitungTotalJual();}
function removeJualItem(rowId){_jualItems=_jualItems.filter(p=>p.rowId!==rowId);renderJualItems();hitungTotalJual();}
function hitungTotalJual(){
  const sub=_jualItems.reduce((a,p)=>a+p.subtotal,0);
  const dis=Number(document.getElementById('f-jl-diskon')?.value)||0;
  const total=sub-dis;
  const bayar=Number(document.getElementById('f-jl-bayar')?.value)||0;
  if(document.getElementById('f-jl-total'))document.getElementById('f-jl-total').value=total;
  if(document.getElementById('jl-total-val'))document.getElementById('jl-total-val').textContent=fmt(total);
  const kembali=bayar-total;
  if(document.getElementById('f-jl-kembali'))document.getElementById('f-jl-kembali').value=kembali>=0?fmt(kembali):'Kurang: '+fmt(Math.abs(kembali));
}

async function saveJual(cetak=false){
  if(!_jualItems.length){showToast('Tambah minimal 1 item','error');return;}
  const no=document.getElementById('f-jl-no').value.trim();
  if(!no){showToast('No. Faktur tidak boleh kosong','error');document.getElementById('f-jl-no').focus();return;}
  const id=uid();
  const sub=_jualItems.reduce((a,p)=>a+p.subtotal,0);
  const dis=Number(document.getElementById('f-jl-diskon').value)||0;
  const total=sub-dis;
  const bayar=Number(document.getElementById('f-jl-bayar').value)||0;
  const sisa=Math.max(0,total-bayar);
  const statusBayar=bayar<=0?'belum':sisa<=0?'lunas':'sebagian';
  const payload={no_faktur:no,tanggal:document.getElementById('f-jl-tgl').value,pelanggan_id:document.getElementById('f-jl-pel').value||null,subtotal:sub,diskon:dis,total,terbayar:bayar,sisa_piutang:sisa,metode_bayar:document.getElementById('f-jl-metode').value,status_bayar:statusBayar,catatan:document.getElementById('f-jl-catatan').value};
  showLoading(true);
  try{
    await dbOp('penjualan','INSERT',{id,...payload});
    for(const p of _jualItems){
      if(!p.nama_barang&&!p.barang_id)continue;
      await dbOp('detail_penjualan','INSERT',{id:uid(),penjualan_id:id,barang_id:p.barang_id||null,nama_barang:p.nama_barang,satuan:p.satuan,jumlah:p.jumlah,harga_jual:p.harga_jual,diskon_item:p.diskon_item,subtotal:p.subtotal,is_non_gudang:p.is_non_gudang});
      if(p.barang_id&&!p.is_non_gudang){
        const{data:br}=await db.from('barang').select('stok').eq('id',p.barang_id).single();
        const stokBaru=Math.max(0,(br?.stok||0)-p.jumlah);
        await dbOp('barang','UPDATE',{id:p.barang_id,payload:{stok:stokBaru}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:p.barang_id,jenis:'keluar',jumlah:-p.jumlah,stok_sebelum:br?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'penjualan',referensi_id:id,referensi_no:no,keterangan:'Penjualan '+no});
      }
    }
    if(sisa>0&&payload.pelanggan_id){const{data:pel}=await db.from('pelanggan').select('saldo_piutang').eq('id',payload.pelanggan_id).single();await dbOp('pelanggan','UPDATE',{id:payload.pelanggan_id,payload:{saldo_piutang:(pel?.saldo_piutang||0)+sisa}});}
    closeModal('modal-jual');showToast('Penjualan disimpan');await loadPenjualan();
    if(cetak) await cetakPenjualan({id,...payload},_jualItems);
  }catch(e){showToast('Gagal: '+e.message,'error');console.error(e);}
  showLoading(false);
}

async function loadPenjualan(){
  const dari=document.getElementById('f-jual-dari')?.value;
  const sampai=document.getElementById('f-jual-sampai')?.value;
  let q=db.from('penjualan').select('*,pelanggan(nama)').order('tanggal',{ascending:false});
  if(dari)q=q.gte('tanggal',dari);if(sampai)q=q.lte('tanggal',sampai);
  const{data}=await q;
  if(!(data||[]).length){
    document.getElementById('body-jual').innerHTML='<tr><td colspan="10" class="table-empty"><i class="ti ti-file-off"></i>Belum ada penjualan</td></tr>';
    return;
  }
  // Load detail item sekaligus
  const ids=(data||[]).map(j=>j.id);
  const{data:allDet}=await db.from('detail_penjualan').select('penjualan_id,nama_barang,jumlah,satuan').in('penjualan_id',ids);
  const detMap={};(allDet||[]).forEach(d=>{if(!detMap[d.penjualan_id])detMap[d.penjualan_id]=[];detMap[d.penjualan_id].push(d);});

  document.getElementById('body-jual').innerHTML=(data||[]).map(j=>{
    const items=detMap[j.id]||[];
    const namaBarang=items.length
      ?items.map(i=>`<div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">• ${i.nama_barang} <span style="color:var(--text3)">(${i.jumlah} ${i.satuan||'pcs'})</span></div>`).join('')
      :'<div style="font-size:11px;color:var(--text3)">—</div>';
    return `<tr>
      <td><code style="color:var(--orange);font-size:12px">${j.no_faktur}</code></td>
      <td style="white-space:nowrap">${new Date(j.tanggal).toLocaleDateString('id-ID')}</td>
      <td>${j.pelanggan?.nama||'Umum'}</td>
      <td style="min-width:150px">${namaBarang}</td>
      <td>${fmt(j.subtotal)}</td>
      <td>${j.diskon>0?fmt(j.diskon):'-'}</td>
      <td style="font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--orange);white-space:nowrap">${fmt(j.total)}</td>
      <td><span class="badge ${j.status_bayar==='lunas'?'badge-green':j.status_bayar==='sebagian'?'badge-yellow':'badge-red'}">${j.status_bayar}</span></td>
      <td style="font-size:12px">${j.metode_bayar}</td>
      <td><div style="display:flex;gap:3px">
        <button class="btn btn-outline btn-sm" onclick="cetakJualById('${j.id}')"><i class="ti ti-printer"></i></button>
      </div></td>
    </tr>`;
  }).join('');
}

async function cetakJualById(jId){
  showLoading(true);
  const{data:j}=await db.from('penjualan').select('*,pelanggan(nama)').eq('id',jId).single();
  const{data:items}=await db.from('detail_penjualan').select('*').eq('penjualan_id',jId);

}

      <div class="nota-row" style="padding-left:10px"><span class="label">${p.jumlah} ${p.satuan||'pcs'} × Rp ${fmtNum(p.harga_jual)}${p.diskon_item>0?' (diskon '+fmt(p.diskon_item)+')':''}</span><span class="val">${fmt(p.subtotal)}</span></div>`).join(''):'<div style="font-size:10px;color:#999;text-align:center;padding:4px 0">— Tidak ada item —</div>'}

// Tipe printer yang aktif (default: thermal80)
let _printerType = localStorage.getItem('autoserv_printer') || 'thermal80';

const PRINTER_INFO = {
  thermal58: { label:'Thermal 58mm', width:'58mm', pageSize:'58mm auto', fontSize:'10px', padding:'4px' },
  thermal80: { label:'Thermal 80mm', width:'80mm', pageSize:'80mm auto', fontSize:'11px', padding:'6px' },
  dotmatrix: { label:'Dot Matrix (Epson LX)', width:'190mm', pageSize:'A4', fontSize:'11px', padding:'8px', font:'Courier New,monospace' },
  a4:        { label:'Printer Umum / A4', width:'190mm', pageSize:'A4', fontSize:'12px', padding:'12px' },
  a5:        { label:'Printer A5', width:'138mm', pageSize:'A5', fontSize:'11px', padding:'8px' },
};

function setPrinterType(type){
  _printerType = type;
  localStorage.setItem('autoserv_printer', type);
  updatePrinterUI();
}

function updatePrinterUI(){
  const info = PRINTER_INFO[_printerType] || PRINTER_INFO.thermal80;
  // Update border semua opsi
  Object.keys(PRINTER_INFO).forEach(t=>{
    const el=document.getElementById('opt-'+t);
    if(!el) return;
    el.style.border = t===_printerType
      ? '2px solid var(--orange)'
      : '2px solid var(--border2)';
    el.style.background = t===_printerType
      ? 'rgba(255,106,0,0.08)'
      : 'transparent';
  });
  const infoEl=document.getElementById('printer-info-text');
  if(infoEl) infoEl.innerHTML=`Printer aktif: <strong>${info.label}</strong> — Lebar cetak: <strong>${info.width}</strong>`;
}

window.init_pengaturan = async function(){
  const{data}=await db.from('pengaturan').select('*').limit(1).single();

    document.getElementById('s-nama').value=data.nama_bengkel||'';
    document.getElementById('s-alamat').value=data.alamat||'';

      `<img src="${data.logo_base64}" style="max-height:80px;max-width:200px;object-fit:contain;border-radius:8px;background:#fff;padding:6px"/>`;

  }

// ============================================================
// PRINT HELPER — pakai setting printer aktif
// ============================================================
function getPrinterConfig(){
  const type = localStorage.getItem('autoserv_printer')||'thermal80';
  return PRINTER_INFO[type]||PRINTER_INFO.thermal80;
}

function applyPrintArea(content, useA4=false){
  const cfg = getPrinterConfig();
  const pa  = document.getElementById('print-area');
  const isA4Type = useA4 || ['a4','a5','dotmatrix'].includes(localStorage.getItem('autoserv_printer')||'thermal80');
  pa.className = isA4Type ? 'print-a4' : '';
  // Inject page-size CSS
  const pageStyle = `<style>
    @media print {
      @page { size: ${cfg.pageSize}; margin: ${isA4Type?'10mm':'4mm'}; }
      body  { font-family: ${cfg.font||"'Poppins',Arial,sans-serif"} !important; font-size:${cfg.fontSize} !important; }
    }
  </style>`;
  pa.innerHTML = pageStyle + content;
  requestAnimationFrame(()=>{ setTimeout(()=>{ window.print(); pa.className=''; }, 150); });
}

function uploadLogo(input){
  const file=input.files[0];if(!file)return;
  if(file.size>200*1024){showToast('Logo maks 200KB','error');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result;
    document.getElementById('logo-preview').innerHTML=`<img src="${b64}" style="max-height:80px;max-width:200px;object-fit:contain;border-radius:8px;background:#fff;padding:6px"/>`;
    window._logoB64=b64;
  };
  reader.readAsDataURL(file);
}

async function savePengaturan(){
  const payload={nama_bengkel:document.getElementById('s-nama').value,alamat:document.getElementById('s-alamat').value,telepon:document.getElementById('s-telp').value,footer_nota:document.getElementById('s-footer').value};
  if(window._logoB64)payload.logo_base64=window._logoB64;
  showLoading(true);
  try{
    if(window._settingsId)await db.from('pengaturan').update(payload).eq('id',window._settingsId);
    else await db.from('pengaturan').insert({id:uid(),...payload});
    showToast('Pengaturan disimpan');
  }catch(e){showToast('Gagal simpan','error');}
  showLoading(false);
}

  openModal('modal-user');
}

async function saveUser(){
  const id=document.getElementById('f-usr-id').value;
  const isEdit=!!id;
  const username=document.getElementById('f-usr-username').value.trim();
  const nama=document.getElementById('f-usr-nama').value.trim();
  const pw=document.getElementById('f-usr-pw').value;
  const role=document.getElementById('f-usr-role').value;
  const aktif=document.getElementById('f-usr-aktif').value==='true';
  const catatan=document.getElementById('f-usr-catatan').value;

  if(!nama){showToast('Nama lengkap wajib diisi','error');return;}
  if(!isEdit && !username){showToast('Username wajib diisi','error');return;}
  if(!isEdit && !pw){showToast('Password wajib diisi untuk user baru','error');return;}
  if(pw && pw.length<6){showToast('Password minimal 6 karakter','error');return;}

  // Cek duplikat username (hanya saat tambah baru)
  if(!isEdit){
    const{data:cek}=await db.from('app_users').select('id').eq('username',username).maybeSingle();
    if(cek){showToast('Username sudah digunakan, pilih yang lain','error');return;}
  }

  const payload={nama,role,aktif,catatan};
  if(pw) payload.password=pw;

  showLoading(true);
  try{
    if(isEdit){
      await dbOp('app_users','UPDATE',{id,payload});
      // Jika user yang diedit adalah currentUser, update session
      if(currentUser && id===currentUser.id){
        currentUser.nama=nama; currentUser.role=role;
        sessionStorage.setItem('autoserv_user',JSON.stringify(currentUser));
        applyRBAC();
      }
    } else {
      await dbOp('app_users','INSERT',{id:uid(),username,...payload,created_at:new Date().toISOString()});
    }
    closeModal('modal-user');
    showToast(isEdit?'User berhasil diperbarui':'User berhasil ditambahkan','success');
    await loadUsers();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function delUser(id,username){
  if(currentUser && id===currentUser.id){showToast('Tidak bisa hapus akun sendiri','error');return;}
  if(!confirm(`Hapus user "${username}"? Tindakan ini tidak dapat dibatalkan.`))return;
  showLoading(true);
  try{
    await db.from('app_users').delete().eq('id',id);
    showToast('User berhasil dihapus','success');
    await loadUsers();
  }catch(e){showToast('Gagal hapus: '+e.message,'error');}
  showLoading(false);
}

        : `<div style="display:flex;flex-direction:column;gap:3px">

               style="font-size:10px;color:var(--orange);background:rgba(255,106,0,0.08);border:1px dashed rgba(255,106,0,0.3);border-radius:4px;padding:2px 8px;cursor:pointer;text-align:left;width:fit-content">

    <td><input type="number" min="1" class="form-input" value="${p.jumlah||1}" oninput="updatePOItem('${p.rowId}','jumlah',Number(this.value))" style="font-size:12px"/></td>

function setManualPO(rowId){

}
function gantiKeGudangPO(rowId){const p=_poItems.find(x=>x.rowId===rowId);if(!p)return;p.is_manual=false;p.barang_id='';p.nama_barang='';renderPOItems();}

function updatePOItem(rowId,field,val){const p=_poItems.find(x=>x.rowId===rowId);if(!p)return;p[field]=val;hitungSubPO(rowId);}
function hitungSubPO(rowId){const p=_poItems.find(x=>x.rowId===rowId);if(!p)return;p.subtotal=p.jumlah*p.harga_beli;const el=document.getElementById('psub-'+rowId);if(el)el.textContent=fmt(p.subtotal);hitungTotalPO();}
function removePOItem(rowId){_poItems=_poItems.filter(x=>x.rowId!==rowId);renderPOItems();hitungTotalPO();}
function hitungTotalPO(){const t=_poItems.reduce((a,p)=>a+p.subtotal,0);const el=document.getElementById('po-total-val');if(el)el.textContent=fmt(t);}

  if(!_poItems.length){showToast('Tambah minimal 1 item','error');return;}
  const no=document.getElementById('f-po-no').value.trim();
  if(!no){showToast('No. PO tidak boleh kosong','error');document.getElementById('f-po-no').focus();return;}
  const invalid=_poItems.find(p=>!p.nama_barang&&!p.barang_id);
  if(invalid){showToast('Semua item harus diisi nama barang','error');return;}
  const id=uid();
  const total=_poItems.reduce((a,p)=>a+p.subtotal,0);
  const payload={no_po:no,tanggal:document.getElementById('f-po-tgl').value,supplier_id:supId,status:document.getElementById('f-po-status').value,total,catatan:document.getElementById('f-po-catatan').value};
  showLoading(true);
  try{
    await dbOp('pesanan_beli','INSERT',{id,...payload});
    for(const p of _poItems){
      if(!p.nama_barang&&!p.barang_id)continue;
      await dbOp('detail_pesanan_beli','INSERT',{id:uid(),pesanan_beli_id:id,barang_id:p.barang_id||null,nama_barang:p.nama_barang,satuan:p.satuan,jumlah:p.jumlah,harga_beli:p.harga_beli,subtotal:p.subtotal,is_manual:p.is_manual||false});
    }
    closeModal('modal-po');showToast('PO berhasil disimpan');await loadPO();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function loadPO(){
  const sf=document.getElementById('f-po-status-filter')?.value||'';
  let q=db.from('pesanan_beli').select('*,supplier(nama)').order('tanggal',{ascending:false});
  if(sf)q=q.eq('status',sf);
  const{data}=await q;
  if(!(data||[]).length){
    document.getElementById('body-po').innerHTML='<tr><td colspan="8" class="table-empty"><i class="ti ti-file-off"></i>Belum ada PO</td></tr>';
    return;
  }
  // Load semua detail item PO sekaligus
  const poIds=(data||[]).map(p=>p.id);
  const{data:allDetails}=await db.from('detail_pesanan_beli').select('pesanan_beli_id,nama_barang,jumlah,satuan').in('pesanan_beli_id',poIds);
  const detailMap={};
  (allDetails||[]).forEach(d=>{
    if(!detailMap[d.pesanan_beli_id])detailMap[d.pesanan_beli_id]=[];
    detailMap[d.pesanan_beli_id].push(d);
  });

  document.getElementById('body-po').innerHTML=(data||[]).map(p=>{
    const items=detailMap[p.id]||[];
    const namaBarang=items.length
      ? items.map(i=>`<div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">• ${i.nama_barang} <span style="color:var(--text3)">(${i.jumlah} ${i.satuan||'pcs'})</span></div>`).join('')
      : '<div style="font-size:11px;color:var(--text3)">—</div>';
    const statusOpts=['pending','approved','selesai','ditolak'];
    const badgeCls=p.status==='approved'?'badge-green':p.status==='selesai'?'badge-blue':p.status==='ditolak'?'badge-red':'badge-gray';
    return `<tr>
      <td><code style="color:var(--orange);font-size:12px">${p.no_po}</code></td>
      <td style="white-space:nowrap">${new Date(p.tanggal).toLocaleDateString('id-ID')}</td>
      <td>${p.supplier?.nama||'-'}</td>
      <td style="min-width:160px">${namaBarang}</td>
      <td style="font-family:var(--font-display);color:var(--orange);white-space:nowrap">${fmt(p.total)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:5px">
          <span class="badge ${badgeCls}" id="badge-po-${p.id}">${p.status}</span>
          <select class="form-input" style="font-size:11px;padding:2px 4px;height:26px;width:90px;border-color:rgba(255,106,0,0.3)" onchange="updateStatusPO('${p.id}',this.value,this)">
            ${statusOpts.map(s=>`<option value="${s}" ${s===p.status?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
          </select>
        </div>
      </td>
      <td style="font-size:12px;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis">${p.catatan||'-'}</td>
      <td><div style="display:flex;gap:4px">
        <button class="btn btn-success btn-sm" onclick="prosesPOkePembelian('${p.id}','${p.no_po}')" title="Buat Faktur Pembelian"><i class="ti ti-arrow-right"></i>Beli</button>
        <button class="btn btn-danger btn-sm" onclick="delPO('${p.id}','${p.no_po}')" title="Hapus PO"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`;
  }).join('');
}

async function updateStatusPO(id,status,sel){
  try{
    await dbOp('pesanan_beli','UPDATE',{id,payload:{status}});
    const badgeCls=status==='approved'?'badge-green':status==='selesai'?'badge-blue':status==='ditolak'?'badge-red':'badge-gray';
    const badge=document.getElementById('badge-po-'+id);
    if(badge){badge.className='badge '+badgeCls;badge.textContent=status;}
    showToast('Status PO diperbarui: '+status,'success');
  }catch(e){showToast('Gagal update status','error');}
}

async function prosesPOkePembelian(poId,no){
  if(!confirm2('Buat faktur pembelian dari PO '+no+'?'))return;
  window._fromPoId=poId;
  showPage('pembelian');
  setTimeout(()=>openModalBeli(poId),600);
}
async function delPO(id,no){if(!confirm2('Hapus PO '+no+'?'))return;showLoading(true);try{await db.from('detail_pesanan_beli').delete().eq('pesanan_beli_id',id);await dbOp('pesanan_beli','DELETE',{id});showToast('PO dihapus');await loadPO();}catch(e){showToast('Gagal','error');}showLoading(false);}

let _beliItems=[];
window.init_pembelian=async function(){
  const d=today();
  document.getElementById('f-beli-dari').value=d.slice(0,7)+'-01';
  document.getElementById('f-beli-sampai').value=d;
  await loadBeli();
};

async function openModalBeli(fromPoId=null){
  _beliItems=[];
  // Load data pendukung
  const[sups,pos]=await Promise.all([
    loadTable('supplier',{order:'nama'}),
    loadTable('pesanan_beli',{order:'tanggal'})
  ]);
  if(!window._brg) window._brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});

  document.getElementById('f-bl-po').innerHTML='<option value="">-- Tanpa PO --</option>'+pos.map(p=>`<option value="${p.id}" data-sup="${p.supplier_id}">${p.no_po} - ${sups.find(s=>s.id===p.supplier_id)?.nama||''}</option>`).join('');
  document.getElementById('f-bl-id').value='';
  const no=await autoNo('FB','pembelian','no_faktur');
  document.getElementById('f-bl-no').value=no;
  document.getElementById('f-bl-tgl').value=today();
  document.getElementById('f-bl-diskon').value='0';
  document.getElementById('f-bl-bayar').value='0';
  document.getElementById('f-bl-catatan').value='';

  // Buka modal dulu agar DOM tersedia
  openModal('modal-beli');
  createAC({containerId:'ac-bl-sup',placeholder:'Ketik nama supplier...',data:sups,searchKeys:['nama','telepon','kota'],renderItem:s=>({icon:'🏭',main:s.nama,sub:[s.kota,s.telepon].filter(Boolean).join(' | ')}),onSelect:s=>{document.getElementById('f-bl-sup').value=s.id;},onClear:()=>{document.getElementById('f-bl-sup').value='';},initialLabel:''});

  // Setelah modal terbuka, baru isi data
  if(fromPoId){
    document.getElementById('f-bl-po').value=fromPoId;
    await isiDariPO();
  } else {
    renderBeliItems();
    hitungTotalBeli();
  }
}

async function isiDariPO(){
  const poId=document.getElementById('f-bl-po').value;
  if(!poId){ _beliItems=[]; renderBeliItems(); hitungTotalBeli(); return; }

  // Tampilkan loading di dalam tabel
  const tbody=document.getElementById('body-beli-items');
  if(tbody) tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--text3);font-size:12px"><i class="ti ti-loader" style="font-size:20px;display:block;margin-bottom:6px"></i>Memuat item dari PO...</td></tr>`;

  try{
    // Pastikan data barang gudang sudah loaded
    if(!window._brg) window._brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});

    const[{data:details},{data:po}]=await Promise.all([
      db.from('detail_pesanan_beli').select('*').eq('pesanan_beli_id',poId),
      db.from('pesanan_beli').select('*').eq('id',poId).single()
    ]);

    // Set supplier dari PO
    if(po && po.supplier_id){
      document.getElementById('f-bl-sup').value=po.supplier_id;
    }

    if(!details || details.length===0){
      _beliItems=[];
      renderBeliItems();
      hitungTotalBeli();
      showToast('PO ini belum memiliki item','info');
      return;
    }

    // Map detail PO ke _beliItems
    _beliItems=details.map(d=>({
      rowId: 'bi_'+(Date.now()+Math.random()).toString(36),
      barang_id:  d.barang_id  || '',
      nama_barang:d.nama_barang|| '',
      satuan:     d.satuan     || 'pcs',
      jumlah:     Number(d.jumlah)    || 1,
      harga_beli: Number(d.harga_beli)|| 0,
      subtotal:   Number(d.subtotal)  || (Number(d.jumlah||1)*Number(d.harga_beli||0)),
      is_manual:  !d.barang_id        // true jika tidak punya barang_id (item manual)
    }));

    renderBeliItems();
    hitungTotalBeli();
    showToast(`${_beliItems.length} item berhasil dimuat dari PO`,'success');

  }catch(e){
    showToast('Gagal load data PO: '+e.message,'error');
    _beliItems=[];
    renderBeliItems();
  }
}

async function addBeliItem(){
  if(!window._brg)window._brg=await loadTable('barang',{eq:{aktif:true},order:'nama'});
  _beliItems.push({rowId:'bi_'+Date.now(),barang_id:'',nama_barang:'',satuan:'pcs',jumlah:1,harga_beli:0,subtotal:0,is_manual:false});
  renderBeliItems();
}

function renderBeliItems(){
  const tbody=document.getElementById('body-beli-items');
  const brg=window._brg||[];
  if(!_beliItems.length){
    tbody.innerHTML=`<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--text3);font-size:12px"><i class="ti ti-inbox" style="font-size:24px;display:block;margin-bottom:6px"></i>Belum ada item — klik "+ Tambah" atau load dari PO</td></tr>`;
    return;
  }
  tbody.innerHTML=_beliItems.map(p=>{
    const tampilManual = p.is_manual && !p.barang_id;
    return `<tr id="brow-${p.rowId}">
      <td style="min-width:200px">
        ${tampilManual
          ? `<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
               <span style="font-size:10px;background:rgba(255,106,0,0.15);color:var(--orange);border:1px solid rgba(255,106,0,0.3);border-radius:4px;padding:1px 6px">✏️ Manual</span>
               <button class="btn btn-outline btn-sm" style="padding:1px 6px;font-size:10px" onclick="gantiKeGudangBeli('${p.rowId}')"><i class="ti ti-arrow-back-up" style="font-size:10px"></i></button>
             </div>
             <input type="text" class="form-input" id="bnm-${p.rowId}" placeholder="Nama barang manual..."
               value="${(p.nama_barang||'').replace(/"/g,'&quot;')}"
               oninput="updateBeliItem('${p.rowId}','nama_barang',this.value)" style="font-size:12px"/>`
          : `<div style="display:flex;flex-direction:column;gap:3px">
              <div id="ac-bl-item-${p.rowId}"></div>
              <button type="button" onclick="setManualBeli('${p.rowId}')"
                style="font-size:10px;color:var(--orange);background:rgba(255,106,0,0.08);border:1px dashed rgba(255,106,0,0.3);border-radius:4px;padding:2px 8px;cursor:pointer;text-align:left;width:fit-content">
                ✏️ Input manual (non-gudang)
              </button>
              ${p.nama_barang?`<div style="font-size:10px;color:var(--text3)">📦 ${p.nama_barang}</div>`:''}
            </div>`
        }
      </td>
      <td><input type="text" class="form-input" id="bsat-${p.rowId}" value="${p.satuan||'pcs'}" oninput="updateBeliItem('${p.rowId}','satuan',this.value)" style="font-size:12px"/></td>
      <td><input type="number" min="1" class="form-input" value="${p.jumlah||1}" oninput="updateBeliItem('${p.rowId}','jumlah',Number(this.value))" style="font-size:12px"/></td>
      <td><input type="number" min="0" class="form-input" id="bhb-${p.rowId}" value="${p.harga_beli||0}" oninput="updateBeliItem('${p.rowId}','harga_beli',Number(this.value))" style="font-size:12px"/></td>
      <td style="font-size:12px;color:var(--orange);white-space:nowrap" id="bsub-${p.rowId}">${fmt(p.subtotal||0)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="removeBeliItem('${p.rowId}')"><i class="ti ti-x"></i></button></td>
    </tr>`;
  }).join('');

  // Init autocomplete per baris
  _beliItems.forEach(p=>{
    if(p.is_manual) return;
    if(!document.getElementById(`ac-bl-item-${p.rowId}`)) return;
    createAC({
      containerId:`ac-bl-item-${p.rowId}`,
      placeholder:'Ketik nama barang...',
      data:brg, searchKeys:['nama','kode','satuan'],
      initialLabel:p.nama_barang||'',
      renderItem:b=>({icon:'📦',main:b.nama,sub:`Harga Beli: ${fmt(b.harga_beli||0)} | Stok: ${b.stok} ${b.satuan}`,badge:b.satuan}),
      onSelect:b=>{
        const item=_beliItems.find(x=>x.rowId===p.rowId);if(!item)return;
        item.barang_id=b.id;item.nama_barang=b.nama;item.satuan=b.satuan||'pcs';item.harga_beli=b.harga_beli||0;item.is_manual=false;
        const satEl=document.getElementById('bsat-'+p.rowId);if(satEl)satEl.value=b.satuan||'pcs';
        const hbEl=document.getElementById('bhb-'+p.rowId);if(hbEl)hbEl.value=b.harga_beli||0;
        hitungSubBeli(p.rowId);
      },
      onClear:()=>{const item=_beliItems.find(x=>x.rowId===p.rowId);if(item){item.barang_id='';item.nama_barang='';}}
    });
  });
}

function setManualBeli(rowId){
  const item=_beliItems.find(x=>x.rowId===rowId); if(!item)return;
  item.is_manual=true; item.barang_id=''; item.nama_barang='';
  renderBeliItems();
  setTimeout(()=>document.getElementById('bnm-'+rowId)?.focus(),50);
}
function gantiKeGudangBeli(rowId){
  const p=_beliItems.find(x=>x.rowId===rowId);if(!p)return;
  p.is_manual=false;p.barang_id='';p.nama_barang='';renderBeliItems();
}
function updateBeliItem(rowId,field,val){const p=_beliItems.find(x=>x.rowId===rowId);if(!p)return;p[field]=val;hitungSubBeli(rowId);}
function hitungSubBeli(rowId){const p=_beliItems.find(x=>x.rowId===rowId);if(!p)return;p.subtotal=p.jumlah*p.harga_beli;const el=document.getElementById('bsub-'+rowId);if(el)el.textContent=fmt(p.subtotal);hitungTotalBeli();}
function removeBeliItem(rowId){_beliItems=_beliItems.filter(x=>x.rowId!==rowId);renderBeliItems();hitungTotalBeli();}
function hitungTotalBeli(){
  const sub=_beliItems.reduce((a,p)=>a+p.subtotal,0);
  const dis=Number(document.getElementById('f-bl-diskon')?.value)||0;
  const total=sub-dis;
  const bayar=Number(document.getElementById('f-bl-bayar')?.value)||0;
  const sisa=Math.max(0,total-bayar);
  if(document.getElementById('f-bl-total'))document.getElementById('f-bl-total').value=total;
  if(document.getElementById('bl-total-val'))document.getElementById('bl-total-val').textContent=fmt(total);
  if(document.getElementById('f-bl-sisa'))document.getElementById('f-bl-sisa').value=fmt(sisa);
}

async function saveBeli(){
  const supId=document.getElementById('f-bl-sup').value;if(!supId){showToast('Pilih supplier','error');return;}
  if(!_beliItems.length){showToast('Tambah minimal 1 item','error');return;}
  const no=document.getElementById('f-bl-no').value.trim();
  if(!no){showToast('No. Faktur tidak boleh kosong','error');document.getElementById('f-bl-no').focus();return;}
  const invalid=_beliItems.find(p=>!p.nama_barang&&!p.barang_id);
  if(invalid){showToast('Semua item harus diisi nama barang','error');return;}
  const id=uid();
  const sub=_beliItems.reduce((a,p)=>a+p.subtotal,0);
  const dis=Number(document.getElementById('f-bl-diskon').value)||0;
  const total=sub-dis;
  const bayar=Number(document.getElementById('f-bl-bayar').value)||0;
  const sisa=Math.max(0,total-bayar);
  const statusBayar=bayar<=0?'belum':sisa<=0?'lunas':'sebagian';
  const payload={no_faktur:no,tanggal:document.getElementById('f-bl-tgl').value,supplier_id:supId,po_id:document.getElementById('f-bl-po').value||null,subtotal:sub,diskon:dis,total,terbayar:bayar,sisa_hutang:sisa,status_bayar:statusBayar,catatan:document.getElementById('f-bl-catatan').value};
  showLoading(true);
  try{
    await dbOp('pembelian','INSERT',{id,...payload});
    for(const p of _beliItems){
      if(!p.nama_barang&&!p.barang_id)continue;
      // Simpan detail pembelian (baik barang gudang maupun manual)
      await dbOp('detail_pembelian','INSERT',{id:uid(),pembelian_id:id,barang_id:p.barang_id||null,nama_barang:p.nama_barang,satuan:p.satuan,jumlah:p.jumlah,harga_beli:p.harga_beli,subtotal:p.subtotal});
      // Update stok hanya untuk barang gudang (yang punya barang_id)
      if(p.barang_id){
        const{data:br}=await db.from('barang').select('stok').eq('id',p.barang_id).single();
        const stokBaru=(br?.stok||0)+p.jumlah;
        await dbOp('barang','UPDATE',{id:p.barang_id,payload:{stok:stokBaru,harga_beli:p.harga_beli}});
        await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:p.barang_id,jenis:'masuk',jumlah:p.jumlah,stok_sebelum:br?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'pembelian',referensi_id:id,referensi_no:no,keterangan:'Pembelian '+no});
      }
    }
    if(sisa>0){const{data:sp}=await db.from('supplier').select('saldo_hutang').eq('id',supId).single();await dbOp('supplier','UPDATE',{id:supId,payload:{saldo_hutang:(sp?.saldo_hutang||0)+sisa}});}
    closeModal('modal-beli');showToast('Pembelian disimpan & stok diperbarui');await loadBeli();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function loadBeli(){
  const dari=document.getElementById('f-beli-dari')?.value||'';
  const sampai=document.getElementById('f-beli-sampai')?.value||'';
  let q=db.from('pembelian').select('*,supplier(nama)').order('tanggal',{ascending:false});
  if(dari)q=q.gte('tanggal',dari);if(sampai)q=q.lte('tanggal',sampai);
  const{data}=await q;
  if(!(data||[]).length){
    document.getElementById('body-beli').innerHTML='<tr><td colspan="9" class="table-empty"><i class="ti ti-receipt-off"></i>Belum ada pembelian</td></tr>';
    return;
  }
  // Load detail item sekaligus
  const ids=(data||[]).map(b=>b.id);
  const{data:allDet}=await db.from('detail_pembelian').select('pembelian_id,nama_barang,jumlah,satuan').in('pembelian_id',ids);
  const detMap={};(allDet||[]).forEach(d=>{if(!detMap[d.pembelian_id])detMap[d.pembelian_id]=[];detMap[d.pembelian_id].push(d);});

  document.getElementById('body-beli').innerHTML=(data||[]).map(b=>{
    const items=detMap[b.id]||[];
    const namaBarang=items.length
      ?items.map(i=>`<div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">• ${i.nama_barang} <span style="color:var(--text3)">(${i.jumlah} ${i.satuan||'pcs'})</span></div>`).join('')
      :'<div style="font-size:11px;color:var(--text3)">—</div>';
    return `<tr>
      <td><code style="color:var(--orange);font-size:12px">${b.no_faktur}</code></td>
      <td style="white-space:nowrap">${new Date(b.tanggal).toLocaleDateString('id-ID')}</td>
      <td>${b.supplier?.nama||'-'}</td>
      <td style="min-width:160px">${namaBarang}</td>
      <td style="font-family:var(--font-display);color:var(--orange);white-space:nowrap">${fmt(b.total)}</td>
      <td style="color:var(--green);white-space:nowrap">${fmt(b.terbayar)}</td>
      <td style="color:${b.sisa_hutang>0?'var(--red)':'var(--text3)'};white-space:nowrap">${fmt(b.sisa_hutang)}</td>
      <td><span class="badge ${b.status_bayar==='lunas'?'badge-green':b.status_bayar==='sebagian'?'badge-yellow':'badge-red'}">${b.status_bayar}</span></td>
      <td><button class="btn btn-danger btn-sm" onclick="delBeli('${b.id}','${b.no_faktur}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join('');
}

async function loadRiwayatHutang(){

async function openModalBayarHutang(fakturId=null){
  const{data:fks}=await db.from('pembelian').select('*,supplier(nama)').neq('status_bayar','lunas');
  document.getElementById('f-bh-faktur').innerHTML='<option value="">-- Pilih Faktur --</option>'+(fks||[]).map(f=>`<option value="${f.id}" data-sisa="${f.sisa_hutang}" data-sup="${f.supplier_id}">${f.no_faktur} - ${f.supplier?.nama} - Sisa:${fmt(f.sisa_hutang)}</option>`).join('');
  const no=await autoNo('BH','pembayaran_hutang','no_bayar');
  document.getElementById('f-bh-no').value=no;document.getElementById('f-bh-tgl').value=today();
  document.getElementById('f-bh-jumlah').value='';document.getElementById('f-bh-sisa').value='';document.getElementById('f-bh-ket').value='';
  if(fakturId){document.getElementById('f-bh-faktur').value=fakturId;isiInfoHutang();}
  openModal('modal-bayar-hutang');

function isiInfoHutang(){
  const sel=document.getElementById('f-bh-faktur');const opt=sel.selectedOptions[0];
  if(!opt||!opt.value)return;
  document.getElementById('f-bh-sisa').value=fmt(Number(opt.dataset.sisa));
  document.getElementById('f-bh-jumlah').value=opt.dataset.sisa;
  document.getElementById('f-bh-sup-id').value=opt.dataset.sup;
}

async function saveBayarHutang(){
  const fakturId=document.getElementById('f-bh-faktur').value;if(!fakturId){showToast('Pilih faktur','error');return;}
  const jumlah=Number(document.getElementById('f-bh-jumlah').value);if(!jumlah||jumlah<=0){showToast('Jumlah tidak valid','error');return;}
  const no=document.getElementById('f-bh-no').value.trim();
  if(!no){showToast('No. Bayar tidak boleh kosong','error');document.getElementById('f-bh-no').focus();return;}
  const supId=document.getElementById('f-bh-sup-id').value;
  showLoading(true);
  try{
    await dbOp('pembayaran_hutang','INSERT',{id:uid(),no_bayar:no,tanggal:document.getElementById('f-bh-tgl').value,supplier_id:supId,pembelian_id:fakturId,jumlah,metode:document.getElementById('f-bh-metode').value,keterangan:document.getElementById('f-bh-ket').value});
    const{data:fk}=await db.from('pembelian').select('terbayar,sisa_hutang,total').eq('id',fakturId).single();
    const newTerbayar=(fk?.terbayar||0)+jumlah;const newSisa=Math.max(0,(fk?.total||0)-newTerbayar);const newStatus=newSisa<=0?'lunas':newTerbayar>0?'sebagian':'belum';
    await dbOp('pembelian','UPDATE',{id:fakturId,payload:{terbayar:newTerbayar,sisa_hutang:newSisa,status_bayar:newStatus}});
    const{data:sp}=await db.from('supplier').select('saldo_hutang').eq('id',supId).single();
    await dbOp('supplier','UPDATE',{id:supId,payload:{saldo_hutang:Math.max(0,(sp?.saldo_hutang||0)-jumlah)}});
    closeModal('modal-bayar-hutang');showToast('Pembayaran hutang berhasil');await loadHutangList();await loadRiwayatHutang();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

window.init_retur_beli=async function(){await loadReturBeli();};
async function openModalReturBeli(){

async function loadDetailBeliForRetur(){
  const fakturId=document.getElementById('f-rb-faktur').value;if(!fakturId)return;
  const opt=document.getElementById('f-rb-faktur').selectedOptions[0];
  document.getElementById('f-rb-sup-id').value=opt.dataset.sup;
  const{data}=await db.from('detail_pembelian').select('*').eq('pembelian_id',fakturId);
  document.getElementById('retur-beli-items').innerHTML=`
    <table class="trx-items"><thead><tr><th>Barang</th><th>Satuan</th><th>Qty Beli</th><th>Qty Retur</th><th>Harga</th><th>Sub</th></tr></thead>

      <td>${d.nama_barang}</td><td>${d.satuan}</td><td>${d.jumlah}</td>

function hitungTotalReturBeli(){
  let total=0;
  (window._returBeliDetails||[]).forEach(d=>{const qty=Number(document.getElementById('rb-qty-'+d.id)?.value)||0;const sub=qty*d.harga_beli;total+=sub;const el=document.getElementById('rb-sub-'+d.id);if(el)el.textContent=fmt(sub);});
  document.getElementById('rb-total-val').textContent=fmt(total);
}
async function saveReturBeli(){
  const fakturId=document.getElementById('f-rb-faktur').value;if(!fakturId){showToast('Pilih faktur','error');return;}
  const no=document.getElementById('f-rb-no').value.trim();
  if(!no){showToast('No. Retur tidak boleh kosong','error');document.getElementById('f-rb-no').focus();return;}
  const supId=document.getElementById('f-rb-sup-id').value;
  const items=(window._returBeliDetails||[]).filter(d=>Number(document.getElementById('rb-qty-'+d.id)?.value)>0);
  if(!items.length){showToast('Masukkan qty retur','error');return;}
  const total=items.reduce((a,d)=>a+(Number(document.getElementById('rb-qty-'+d.id).value)*d.harga_beli),0);
  showLoading(true);
  try{
    const id=uid();
    await dbOp('retur_beli','INSERT',{id,no_retur:no,tanggal:document.getElementById('f-rb-tgl').value,pembelian_id:fakturId,supplier_id:supId,total,keterangan:document.getElementById('f-rb-ket').value});
    for(const d of items){
      const qty=Number(document.getElementById('rb-qty-'+d.id).value);
      await dbOp('detail_retur_beli','INSERT',{id:uid(),retur_beli_id:id,barang_id:d.barang_id,nama_barang:d.nama_barang,satuan:d.satuan,jumlah:qty,harga_beli:d.harga_beli,subtotal:qty*d.harga_beli});
      const{data:br}=await db.from('barang').select('stok').eq('id',d.barang_id).single();
      const stokBaru=Math.max(0,(br?.stok||0)-qty);
      await dbOp('barang','UPDATE',{id:d.barang_id,payload:{stok:stokBaru}});
      await dbOp('mutasi_stok','INSERT',{id:uid(),barang_id:d.barang_id,jenis:'keluar',jumlah:-qty,stok_sebelum:br?.stok||0,stok_sesudah:stokBaru,referensi_tipe:'retur_beli',referensi_id:id,referensi_no:no,keterangan:'Retur beli '+no});
    }
    closeModal('modal-retur-beli');showToast('Retur pembelian disimpan');await loadReturBeli();
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}
async function loadReturBeli(){
  const{data}=await db.from('retur_beli').select('*,supplier(nama),pembelian(no_faktur)').order('tanggal',{ascending:false});
  document.getElementById('body-rbeli').innerHTML=(data||[]).length?(data||[]).map(r=>`<tr>
    <td><code style="color:var(--orange);font-size:12px">${r.no_retur}</code></td>
    <td>${new Date(r.tanggal).toLocaleDateString('id-ID')}</td>
    <td style="color:var(--text3);font-size:12px">${r.pembelian?.no_faktur||'-'}</td>
    <td>${r.supplier?.nama||'-'}</td>
    <td style="font-family:var(--font-display);color:var(--red)">${fmt(r.total)}</td>
    <td style="font-size:12px;color:var(--text3)">${r.keterangan||'-'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="delReturBeli('${r.id}','${r.no_retur}')"><i class="ti ti-trash"></i></button></td>
  </tr>`).join(''):'<tr><td colspan="7" class="table-empty">Belum ada retur pembelian</td></tr>';
}
async function delReturBeli(id,no){if(!confirm2('Hapus retur '+no+'?'))return;showLoading(true);try{await db.from('detail_retur_beli').delete().eq('retur_beli_id',id);await dbOp('retur_beli','DELETE',{id});showToast('Retur dihapus');await loadReturBeli();}catch(e){showToast('Gagal','error');}showLoading(false);}

function hitungSubSO(rowId){const p=_soItems.find(x=>x.rowId===rowId);if(!p)return;p.subtotal=p.jumlah*p.harga_jual;const el=document.getElementById('sosub-'+rowId);if(el)el.textContent=fmt(p.subtotal);hitungTotalSO();}
function removeSOItem(rowId){_soItems=_soItems.filter(x=>x.rowId!==rowId);renderSOItems();hitungTotalSO();}

async function saveBayarPiutang(cetak=false){
  const refId=document.getElementById('f-bp-ref-id').value;if(!refId){showToast('Pilih tagihan','error');return;}
  const jumlah=Number(document.getElementById('f-bp-jumlah').value);if(!jumlah||jumlah<=0){showToast('Jumlah tidak valid','error');return;}
  const no=document.getElementById('f-bp-no').value.trim();
  if(!no){showToast('No. Terima tidak boleh kosong','error');document.getElementById('f-bp-no').focus();return;}
  const refTipe=document.getElementById('f-bp-ref-tipe').value;
  const pelId=document.getElementById('f-bp-pel-id').value;
  const tgl=document.getElementById('f-bp-tgl').value;
  const metode=document.getElementById('f-bp-metode').value;
  const ket=document.getElementById('f-bp-ket').value;

  // Ambil label tagihan dari dropdown
  const selRef=document.getElementById('f-bp-ref');
  const labelTagihan=selRef.selectedOptions[0]?.text||refId;

  showLoading(true);
  try{
    await dbOp('pembayaran_piutang','INSERT',{id:uid(),no_bayar:no,tanggal:tgl,pelanggan_id:pelId||null,referensi_tipe:refTipe,referensi_id:refId,jumlah,metode,keterangan:ket});
    const tabelAsal=refTipe==='penjualan'?'penjualan':'work_order';
    const{data:dok}=await db.from(tabelAsal).select('terbayar,sisa_piutang,total').eq('id',refId).single();
    const newTerbayar=(dok?.terbayar||0)+jumlah;
    const newSisa=Math.max(0,(dok?.total||0)-newTerbayar);
    const newStatus=newSisa<=0?'lunas':newTerbayar>0?'sebagian':'belum';
    await dbOp(tabelAsal,'UPDATE',{id:refId,payload:{terbayar:newTerbayar,sisa_piutang:newSisa,status_bayar:newStatus}});
    if(pelId){
      const{data:pel}=await db.from('pelanggan').select('saldo_piutang,nama').eq('id',pelId).single();
      await dbOp('pelanggan','UPDATE',{id:pelId,payload:{saldo_piutang:Math.max(0,(pel?.saldo_piutang||0)-jumlah)}});
    }
    closeModal('modal-bayar-piutang');
    showToast('Penerimaan piutang berhasil dicatat','success');
    await loadPiutangList();await loadRiwayatPiutang();

    if(cetak){
      // Ambil nama pelanggan
      let namaPel='-';
      if(pelId){const{data:pl}=await db.from('pelanggan').select('nama').eq('id',pelId).single();namaPel=pl?.nama||'-';}
      cetakTandaTerima({
        no, tgl, namaPel, labelTagihan,
        jumlah, metode, ket,
        sisaSetelah: newSisa,
        statusBayar: newStatus
      });
    }
  }catch(e){showToast('Gagal: '+e.message,'error');}
  showLoading(false);
}

async function loadLapLaba(){
  const tahun=document.getElementById('ll-tahun').value;
  const bulanNama=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  let totalPend=0,totalHPP=0;const rows=[];
  for(let m=1;m<=12;m++){
    const dari=tahun+'-'+String(m).padStart(2,'0')+'-01';
    const akhir=new Date(tahun,m,0).toISOString().slice(0,10);
    const[pj,wo,beli]=await Promise.all([
      db.from('penjualan').select('total').gte('tanggal',dari).lte('tanggal',akhir),
      db.from('work_order').select('total').gte('tanggal',dari).lte('tanggal',akhir),
      db.from('pembelian').select('total').gte('tanggal',dari).lte('tanggal',akhir)
    ]);
    const pendJual=(pj.data||[]).reduce((a,r)=>a+Number(r.total),0);
    const pendService=(wo.data||[]).reduce((a,r)=>a+Number(r.total),0);
    const hpp=(beli.data||[]).reduce((a,r)=>a+Number(r.total),0);
    const pend=pendJual+pendService;const laba=pend-hpp;
    totalPend+=pend;totalHPP+=hpp;
    rows.push({bulan:bulanNama[m-1],pendJual,pendService,pend,hpp,laba});
  }
  const labaTotal=totalPend-totalHPP;
  document.getElementById('ll-stats').innerHTML=`
    <div class="stat-card green"><i class="ti ti-trending-up stat-icon"></i><div class="stat-label">Total Pendapatan ${tahun}</div><div class="stat-value">${fmt(totalPend)}</div></div>

    <div class="stat-card"><i class="ti ti-chart-pie stat-icon" style="color:${labaTotal>=0?'var(--green)':'var(--red)'}"></i><div class="stat-label">Laba Kotor</div><div class="stat-value" style="color:${labaTotal>=0?'var(--green)':'var(--red)'}">${fmt(labaTotal)}</div></div>`;
  document.getElementById('body-laba').innerHTML=rows.map(r=>`<tr>
    <td style="font-weight:600">${r.bulan}</td>
    <td>${fmt(r.pendJual)}</td><td>${fmt(r.pendService)}</td>
    <td style="color:var(--green);font-weight:600">${fmt(r.pend)}</td>
    <td style="color:var(--red)">${fmt(r.hpp)}</td>
    <td style="font-weight:700;color:${r.laba>=0?'var(--green)':'var(--red)'}">${fmt(r.laba)}</td>
  </tr>`).join('');
}

async function loadLabaBersih(){
const tahun = document.getElementById('llb-tahun').value;
const bln = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
let totPend=0, totHPP=0, totOpex=0;
const rows = [];
for(let m=1;m<=12;m++){
const dari = tahun+'-'+String(m).padStart(2,'0')+'-01';
const akhir = new Date(tahun,m,0).toISOString().slice(0,10);
const [pj,wo,beli,opex] = await Promise.all([
db.from('penjualan').select('total').gte('tanggal',dari).lte('tanggal',akhir),
db.from('work_order').select('total').gte('tanggal',dari).lte('tanggal',akhir),
db.from('pembelian').select('total').gte('tanggal',dari).lte('tanggal',akhir),
db.from('pengeluaran').select('nominal').gte('tanggal',dari).lte('tanggal',akhir)
]);
const pend = (pj.data||[]).reduce((a,r)=>a+Number(r.total),0) +
(wo.data||[]).reduce((a,r)=>a+Number(r.total),0);
const hpp  = (beli.data||[]).reduce((a,r)=>a+Number(r.total),0);
const op   = (opex.data||[]).reduce((a,r)=>a+Number(r.nominal),0);
const labaKotor = pend-hpp;
const labaBersih = labaKotor-op;
totPend+=pend; totHPP+=hpp; totOpex+=op;
rows.push({bulan:bln[m-1],pend,hpp,op,labaKotor,labaBersih});
}
const totLabaKotor = totPend-totHPP;
const totLabaBersih = totLabaKotor-totOpex;
document.getElementById('llb-stats').innerHTML = `
<div class="stat-card green"><i class="ti ti-trending-up stat-icon"></i>
<div class="stat-label">Total Pendapatan</div><div class="stat-value">${fmt(totPend)}</div></div>
<div class="stat-card orange"><i class="ti ti-trending-down stat-icon"></i>
<div class="stat-label">HPP + Operasional</div><div class="stat-value">${fmt(totHPP+totOpex)}</div></div>
<div class="stat-card" style="border-color:rgba(245,158,11,0.3)"><i class="ti ti-cash stat-icon" style="color:var(--yellow)"></i>
<div class="stat-label">Total Pengeluaran Op.</div><div class="stat-value" style="color:var(--yellow)">${fmt(totOpex)}</div></div>
<div class="stat-card ${totLabaBersih>=0?'green':''}">
<i class="ti ti-${totLabaBersih>=0?'arrow-up-right':'arrow-down-right'} stat-icon" style="color:${totLabaBersih>=0?'var(--green)':'var(--red)'}"></i>
<div class="stat-label">Laba Bersih ${tahun}</div>
<div class="stat-value" style="color:${totLabaBersih>=0?'var(--green)':'var(--red)'}">${fmt(totLabaBersih)}</div>
</div>`;
document.getElementById('body-lb').innerHTML = rows.map(r=>`<tr>
<td style="font-weight:600">${r.bulan}</td>
<td style="color:var(--green)">${fmt(r.pend)}</td>
<td style="color:var(--red)">${fmt(r.hpp)}</td>
<td style="color:var(--yellow)">${fmt(r.op)}</td>
<td style="font-family:var(--font-display);color:${r.labaKotor>=0?'var(--text2)':'var(--red)'}">${fmt(r.labaKotor)}</td>
<td style="font-family:var(--font-display);font-weight:700;color:${r.labaBersih>=0?'var(--green)':'var(--red)'}">${fmt(r.labaBersih)}</td>
</tr>`).join('');
}

function filterTable(tableId, keyword, colIndexes){
const tbl=document.getElementById(tableId);
if(!tbl)return;
const rows=tbl.querySelectorAll('tbody tr');
const kw=keyword.toLowerCase();
rows.forEach(row=>{
const cells=row.querySelectorAll('td');
const match=colIndexes.some(i=>cells[i]&&cells[i].textContent.toLowerCase().includes(kw));
row.style.display=kw?match?'':'none':'';
});
}

window.init_backup_restore = function(){};

let _restoreData = null;

function logBackup(msg, type='info'){
  const log = document.getElementById('backup-log');
  const wrap = document.getElementById('backup-log-wrap');
  if(!log||!wrap)return;
  wrap.style.display='block';
  const color = type==='ok'?'var(--green)':type==='error'?'var(--red)':type==='warn'?'var(--yellow)':'var(--text3)';
  log.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString('id-ID')}] ${msg}</div>`;
  log.scrollTop=log.scrollHeight;
}

async function jalankanBackup(){
  const checks = document.querySelectorAll('#backup-opts input[type=checkbox]:checked');
  const tables = Array.from(checks).map(c=>c.value);
  if(!tables.length){showToast('Pilih minimal 1 tabel','error');return;}

  const status=document.getElementById('backup-status');
  status.textContent='⏳ Mengambil data...';
  logBackup('Memulai proses backup...');

  const backup = {
    meta: {
      app: 'AutoServ Pro',
      version: '1.0',
      tanggal: new Date().toISOString(),
      tables: tables
    },
    data: {}
  };

  let total=0;
  for(const tbl of tables){
    try{
      logBackup(`Mengambil tabel: ${tbl}...`);
      const{data,error}=await db.from(tbl).select('*');
      if(error)throw error;
      backup.data[tbl]=data||[];
      total+=(data||[]).length;
      logBackup(`✓ ${tbl}: ${(data||[]).length} baris`,'ok');
    }catch(e){
      logBackup(`✗ Gagal ambil ${tbl}: ${e.message}`,'error');
      backup.data[tbl]=[];
    }
  }

  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const tgl = new Date().toISOString().slice(0,10).replace(/-/g,'');
  a.href=url; a.download=`AutoServ_Backup_${tgl}.json`; a.click();
  URL.revokeObjectURL(url);

  status.innerHTML=`<span style="color:var(--green)">✅ Backup selesai! ${total} total baris dari ${tables.length} tabel</span>`;
  logBackup(`Backup selesai! Total ${total} baris dari ${tables.length} tabel.`,'ok');
  showToast(`Backup berhasil — ${total} baris`,'success');
}

function previewRestore(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      _restoreData=data;
      const preview=document.getElementById('restore-preview');
      const content=document.getElementById('restore-preview-content');
      const btn=document.getElementById('btn-restore');
      if(!data.meta||!data.data){
        content.innerHTML='<span style="color:var(--red)">❌ Format file tidak valid</span>';
        preview.style.display='block';btn.disabled=true;return;
      }
      const rows=Object.entries(data.data).map(([t,d])=>`
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);padding:2px 0">
          <span>📁 ${t}</span><span style="color:var(--orange);font-weight:600">${d.length} baris</span>
        </div>`).join('');
      content.innerHTML=`
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">📅 Tanggal Backup: ${new Date(data.meta.tanggal).toLocaleString('id-ID')}</div>
        ${rows}`;
      preview.style.display='block';
      btn.disabled=false;
      logBackup(`File backup dimuat: ${file.name}`);
    }catch(err){
      _restoreData=null;
      document.getElementById('restore-preview-content').innerHTML='<span style="color:var(--red)">❌ File JSON tidak valid: '+err.message+'</span>';
      document.getElementById('restore-preview').style.display='block';
      document.getElementById('btn-restore').disabled=true;
    }
  };
  reader.readAsText(file);
}

async function jalankanRestore(){
  if(!_restoreData){showToast('Upload file backup dulu','error');return;}
  if(!confirm('Lanjutkan restore data? Data dengan ID sama akan dilewati (tidak ditimpa).'))return;

  const status=document.getElementById('restore-status');
  document.getElementById('btn-restore').disabled=true;
  status.textContent='⏳ Memproses restore...';
  logBackup('Memulai proses restore...');

  let totalBerhasil=0, totalGagal=0, totalLewati=0;

  for(const [tbl, rows] of Object.entries(_restoreData.data)){
    if(!rows||!rows.length){logBackup(`${tbl}: kosong, dilewati`,'warn');continue;}
    logBackup(`Restore tabel ${tbl} (${rows.length} baris)...`);
    for(const row of rows){
      try{
        // Gunakan upsert dengan onConflict id agar tidak menimpa data yg ada
        const{error}=await db.from(tbl).upsert(row, {onConflict:'id',ignoreDuplicates:true});
        if(error){
          if(error.code==='23505'){totalLewati++;} // duplicate key
          else{throw error;}
        } else {totalBerhasil++;}
      }catch(e){
        totalGagal++;
        logBackup(`✗ Gagal restore ${tbl} (id:${row.id}): ${e.message}`,'error');
      }
    }
    logBackup(`✓ Selesai ${tbl}`,'ok');
  }

  const msg=`Restore selesai! ✅ ${totalBerhasil} berhasil | ⏭️ ${totalLewati} dilewati | ❌ ${totalGagal} gagal`;
  status.innerHTML=`<span style="color:var(--green)">${msg}</span>`;
  logBackup(msg,'ok');
  showToast('Restore selesai!','success');
  document.getElementById('btn-restore').disabled=false;
}

async function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  buildSidebar();
  applyRBAC();
  await openIDB();
  updateStatus();
  handleResize(); // deteksi mobile segera
  showPage('dashboard');
  startARTimer();
}

async function initApp(){
  // Cek session tersimpan
  try{
    const saved=sessionStorage.getItem('autoserv_user');
    if(saved){
      currentUser=JSON.parse(saved);
      // Verifikasi ulang user masih aktif di DB
      const{data:u}=await db.from('app_users').select('id,aktif,role').eq('id',currentUser.id).single();
      if(u && u.aktif){
        currentUser.role=u.role; // refresh role dari DB
        await startApp();
        return;
      } else {
        sessionStorage.removeItem('autoserv_user');
        currentUser=null;
      }
    }
  }catch(e){ sessionStorage.removeItem('autoserv_user'); }
  // Tampilkan login
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  setTimeout(()=>document.getElementById('login-username').focus(), 300);
}
initApp();
