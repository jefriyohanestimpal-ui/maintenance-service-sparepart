<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoServ Pro — Bengkel Service Mobil</title>
<meta name="theme-color" content="#0f0f0f"/>
<link rel="manifest" id="manifest-link"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
VARIABLES & RESET
============================================================ */
:root {
--bg: #0a0a0a;
--bg2: #111111;
--bg3: #1a1a1a;
--bg4: #222222;
--border: #2a2a2a;
--border2: #333333;
--orange: #ff6a00;
--orange2: #ff8c00;
--orange-dim: rgba(255,106,0,0.15);
--orange-glow: rgba(255,106,0,0.08);
--text: #f0f0f0;
--text2: #aaaaaa;
--text3: #666666;
--green: #22c55e;
--red: #ef4444;
--blue: #3b82f6;
--yellow: #f59e0b;
--sidebar-w: 240px;
--header-h: 56px;
--radius: 10px;
--radius-sm: 6px;
--shadow: 0 4px 24px rgba(0,0,0,0.5);
--font-display: 'Rajdhani', sans-serif;
--font-body: 'Inter', sans-serif;
--transition: 0.18s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;height:100%;overflow:hidden}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;outline:none;font-family:var(--font-body)}
input,select,textarea{font-family:var(--font-body);outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--orange)}
::selection{background:var(--orange-dim);color:var(--orange)}
/* ============================================================
LAYOUT
============================================================ */
#app{display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
#sidebar{
width:var(--sidebar-w);flex-shrink:0;
background:var(--bg2);
border-right:1px solid var(--border);
display:flex;flex-direction:column;
overflow:hidden;transition:width var(--transition);
position:relative;z-index:100;
}
#sidebar.collapsed{width:56px}
.sidebar-header{
height:var(--header-h);
display:flex;align-items:center;gap:10px;
padding:0 14px;border-bottom:1px solid var(--border);
flex-shrink:0;overflow:hidden;
}
.sidebar-logo{
width:32px;height:32px;border-radius:8px;flex-shrink:0;
background:linear-gradient(135deg,var(--orange),var(--orange2));
display:flex;align-items:center;justify-content:center;
font-family:var(--font-display);font-size:16px;font-weight:700;color:#fff;
}
.sidebar-title{
font-family:var(--font-display);font-size:17px;font-weight:700;
color:var(--text);white-space:nowrap;overflow:hidden;
background:linear-gradient(90deg,var(--orange),var(--orange2),var(--text));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#sidebar.collapsed .sidebar-title,
#sidebar.collapsed .nav-label,
#sidebar.collapsed .nav-group-label{display:none}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.nav-group-label{
font-size:10px;font-weight:600;color:var(--text3);
text-transform:uppercase;letter-spacing:0.08em;
padding:12px 16px 4px;white-space:nowrap;overflow:hidden;
}
.nav-item{
display:flex;align-items:center;gap:10px;
padding:9px 14px;cursor:pointer;
border-radius:0;transition:background var(--transition);
position:relative;overflow:hidden;
border-left:3px solid transparent;
white-space:nowrap;
}
.nav-item:hover{background:var(--bg3);border-left-color:var(--border2)}
.nav-item.active{
background:var(--orange-dim);border-left-color:var(--orange);
}
.nav-item.active .nav-icon{color:var(--orange)}
.nav-item.active .nav-label{color:var(--orange);font-weight:600}
.nav-icon{font-size:18px;color:var(--text2);flex-shrink:0;width:24px;text-align:center}
.nav-label{font-size:13px;color:var(--text2)}
.sidebar-toggle{
padding:12px 14px;border-top:1px solid var(--border);
display:flex;align-items:center;justify-content:flex-end;
cursor:pointer;
}
#sidebar.collapsed .sidebar-toggle{justify-content:center}
.sidebar-toggle i{font-size:18px;color:var(--text3);transition:transform var(--transition)}
#sidebar.collapsed .sidebar-toggle i{transform:rotate(180deg)}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* TOPBAR */
#topbar{
height:var(--header-h);flex-shrink:0;
background:var(--bg2);border-bottom:1px solid var(--border);
display:flex;align-items:center;justify-content:space-between;
padding:0 20px;gap:12px;
}
.topbar-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.status-badge{
display:flex;align-items:center;gap:6px;
padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;
background:var(--bg3);border:1px solid var(--border);
}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.btn-icon{
width:34px;height:34px;border-radius:var(--radius-sm);
background:var(--bg3);border:1px solid var(--border);
display:flex;align-items:center;justify-content:center;
color:var(--text2);font-size:18px;transition:all var(--transition);
}
.btn-icon:hover{background:var(--bg4);color:var(--orange);border-color:var(--orange-dim)}
/* CONTENT */
#content{flex:1;overflow-y:auto;padding:20px}
/* ============================================================
PAGES
============================================================ */
.page{display:none}
.page.active{display:block}
/* ============================================================
CARDS & STATS
============================================================ */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}
.stat-card{
background:var(--bg2);border:1px solid var(--border);
border-radius:var(--radius);padding:16px;
display:flex;flex-direction:column;gap:6px;
position:relative;overflow:hidden;
transition:transform var(--transition),border-color var(--transition);
}
.stat-card::before{
content:'';position:absolute;top:0;right:0;
width:80px;height:80px;border-radius:50%;
opacity:0.06;transform:translate(20px,-20px);
}
.stat-card.orange::before{background:var(--orange)}
.stat-card.green::before{background:var(--green)}
.stat-card.blue::before{background:var(--blue)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card:hover{transform:translateY(-2px);border-color:var(--border2)}
.stat-icon{font-size:20px;margin-bottom:2px}
.stat-card.orange .stat-icon{color:var(--orange)}
.stat-card.green .stat-icon{color:var(--green)}
.stat-card.blue .stat-icon{color:var(--blue)}
.stat-card.yellow .stat-icon{color:var(--yellow)}
.stat-label{font-size:12px;color:var(--text3);font-weight:500}
.stat-value{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3)}
/* ============================================================
SECTION HEADER
============================================================ */
.section-hdr{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:14px;gap:10px;flex-wrap:wrap;
}
.section-hdr h2{
font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--text);
display:flex;align-items:center;gap:8px;
}
.section-hdr h2 i{color:var(--orange);font-size:20px}
.section-hdr-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* ============================================================
BUTTONS
============================================================ */
.btn{
display:inline-flex;align-items:center;gap:6px;
padding:8px 16px;border-radius:var(--radius-sm);
font-size:13px;font-weight:500;transition:all var(--transition);
cursor:pointer;border:1px solid transparent;white-space:nowrap;
}
.btn-primary{
background:linear-gradient(135deg,var(--orange),var(--orange2));
color:#fff;border-color:var(--orange);
}
.btn-primary:hover{opacity:0.88;transform:translateY(-1px)}
.btn-outline{
background:transparent;color:var(--text2);border-color:var(--border2);
}
.btn-outline:hover{background:var(--bg3);color:var(--text);border-color:var(--orange-dim)}
.btn-danger{background:rgba(239,68,68,0.15);color:var(--red);border-color:rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn-success{background:rgba(34,197,94,0.15);color:var(--green);border-color:rgba(34,197,94,0.3)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn i{font-size:15px}
/* ============================================================
TABLE
============================================================ */
.table-wrap{
background:var(--bg2);border:1px solid var(--border);
border-radius:var(--radius);overflow:hidden;
}
.table-toolbar{
display:flex;align-items:center;justify-content:space-between;
padding:12px 14px;border-bottom:1px solid var(--border);
gap:10px;flex-wrap:wrap;
}
.search-box{
display:flex;align-items:center;gap:8px;
background:var(--bg3);border:1px solid var(--border2);
border-radius:var(--radius-sm);padding:6px 10px;
min-width:200px;
}
.search-box i{color:var(--text3);font-size:15px;flex-shrink:0}
.search-box input{background:transparent;border:none;color:var(--text);font-size:13px;flex:1;min-width:0}
.search-box input::placeholder{color:var(--text3)}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3)}
th{
padding:10px 12px;text-align:left;
font-size:11px;font-weight:600;color:var(--text3);
text-transform:uppercase;letter-spacing:0.05em;
border-bottom:1px solid var(--border);white-space:nowrap;
}
td{
padding:10px 12px;border-bottom:1px solid var(--border);
font-size:13px;color:var(--text2);vertical-align:middle;
}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child td{border-bottom:none}
.table-empty{
text-align:center;padding:40px;
color:var(--text3);font-size:13px;
}
.table-empty i{font-size:36px;display:block;margin-bottom:8px;color:var(--border2)}
/* ============================================================
BADGES & TAGS
============================================================ */
.badge{
display:inline-flex;align-items:center;gap:4px;
padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;
text-transform:uppercase;letter-spacing:0.03em;
}
.badge-orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,106,0,0.3)}
.badge-green{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
.badge-red{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.badge-blue{background:rgba(59,130,246,0.1);color:var(--blue);border:1px solid rgba(59,130,246,0.25)}
.badge-yellow{background:rgba(245,158,11,0.1);color:var(--yellow);border:1px solid rgba(245,158,11,0.25)}
.badge-gray{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
/* ============================================================
MODAL
============================================================ */
.modal-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.75);
z-index:1000;display:none;align-items:center;justify-content:center;
padding:20px;backdrop-filter:blur(4px);
}
.modal-overlay.active{display:flex}
.modal{
background:var(--bg2);border:1px solid var(--border2);
border-radius:var(--radius);width:100%;max-width:560px;
max-height:90vh;display:flex;flex-direction:column;
box-shadow:var(--shadow);animation:modalIn 0.2s ease;
}
.modal-lg{max-width:780px}
.modal-xl{max-width:1000px}
@keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-header{
display:flex;align-items:center;justify-content:space-between;
padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.modal-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text)}
.modal-close{
width:28px;height:28px;border-radius:var(--radius-sm);
background:var(--bg3);color:var(--text2);font-size:16px;
display:flex;align-items:center;justify-content:center;
transition:all var(--transition);cursor:pointer;
}
.modal-close:hover{background:rgba(239,68,68,0.2);color:var(--red)}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.modal-footer{
padding:12px 18px;border-top:1px solid var(--border);
display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;
}
/* ============================================================
FORMS
============================================================ */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.form-grid-1{display:grid;grid-template-columns:1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:500;color:var(--text2)}
.form-label .req{color:var(--orange)}
.form-input{
background:var(--bg3);border:1px solid var(--border2);
border-radius:var(--radius-sm);padding:8px 10px;
color:var(--text);font-size:13px;width:100%;
transition:border-color var(--transition);
}
.form-input:focus{border-color:var(--orange);background:var(--bg4)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg3)}
.form-hint{font-size:11px;color:var(--text3)}
.form-row{display:flex;gap:10px;align-items:flex-end}
.form-divider{
grid-column:1/-1;border:none;border-top:1px solid var(--border);
margin:4px 0;
}
/* ============================================================
DASHBOARD
============================================================ */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.dash-card-hdr{
padding:12px 14px;border-bottom:1px solid var(--border);
font-family:var(--font-display);font-size:14px;font-weight:600;
display:flex;align-items:center;gap:8px;color:var(--text);
}
.dash-card-hdr i{color:var(--orange)}
.dash-card-body{padding:14px}
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-item{
display:flex;align-items:center;gap:10px;
padding:9px 12px;border-radius:var(--radius-sm);
background:var(--bg3);border-left:3px solid transparent;
}
.alert-item.warn{border-left-color:var(--yellow)}
.alert-item.danger{border-left-color:var(--red)}
.alert-item.info{border-left-color:var(--blue)}
.alert-icon{font-size:16px;flex-shrink:0}
.alert-item.warn .alert-icon{color:var(--yellow)}
.alert-item.danger .alert-icon{color:var(--red)}
.alert-item.info .alert-icon{color:var(--blue)}
.alert-text{font-size:12px;color:var(--text2);flex:1}
.alert-val{font-size:12px;font-weight:600;color:var(--text)}
/* WO Antrian */
.wo-list{display:flex;flex-direction:column;gap:8px}
.wo-item{
display:flex;align-items:center;gap:10px;
padding:10px 12px;border-radius:var(--radius-sm);
background:var(--bg3);cursor:pointer;
transition:background var(--transition);
border:1px solid var(--border);
}
.wo-item:hover{background:var(--bg4);border-color:var(--orange-dim)}
.wo-no{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--orange);min-width:90px}
.wo-info{flex:1;min-width:0}
.wo-plat{font-size:13px;font-weight:600;color:var(--text)}
.wo-mekanik{font-size:11px;color:var(--text3)}
/* ============================================================
NOTA PRINT
============================================================ */
.nota-preview{
background:#fff;color:#111;
padding:16px;border-radius:var(--radius);
font-family:'Courier New',monospace;font-size:12px;
max-width:320px;margin:0 auto;
}
.nota-header{text-align:center;margin-bottom:10px}
.nota-header .nama{font-weight:700;font-size:14px}
.nota-divider{border:none;border-top:1px dashed #aaa;margin:8px 0}
.nota-row{display:flex;justify-content:space-between;gap:4px;margin-bottom:2px;font-size:11px}
.nota-row .label{flex:1}
.nota-row .val{text-align:right;white-space:nowrap}
.nota-total{font-weight:700;font-size:12px;border-top:1px dashed #aaa;padding-top:4px;margin-top:4px}
.nota-footer{text-align:center;margin-top:10px;font-size:10px;color:#666}
@media print{
body * { visibility: hidden !important; }
#print-area, #print-area * { visibility: visible !important; }
#print-area {
position: fixed !important; left: 0; top: 0;
width: 80mm; margin: 0; padding: 8px;
background: #fff !important; color: #000 !important;
}
}
@media print and (min-width: 100mm) {
#print-area { width: 210mm; }
}
/* ============================================================
GUDANG — Stok Cards
============================================================ */
.stok-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.stok-card{
background:var(--bg2);border:1px solid var(--border);
border-radius:var(--radius);padding:12px;
transition:border-color var(--transition),transform var(--transition);
cursor:pointer;
}
.stok-card:hover{border-color:var(--orange-dim);transform:translateY(-2px)}
.stok-card.low{border-color:rgba(239,68,68,0.4)}
.stok-card.ok{border-color:var(--border)}
.stok-nama{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;line-height:1.3}
.stok-num{
font-family:var(--font-display);font-size:26px;font-weight:700;
line-height:1;
}
.stok-card.low .stok-num{color:var(--red)}
.stok-card.ok .stok-num{color:var(--green)}
.stok-satuan{font-size:11px;color:var(--text3)}
.stok-min{font-size:10px;color:var(--text3);margin-top:4px}
/* ============================================================
LOADING / TOAST
============================================================ */
#toast{
position:fixed;bottom:24px;right:24px;z-index:9999;
display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast-item{
background:var(--bg3);border:1px solid var(--border2);
border-radius:var(--radius-sm);padding:10px 14px;
font-size:13px;color:var(--text);
box-shadow:var(--shadow);animation:toastIn 0.2s ease;
display:flex;align-items:center;gap:8px;min-width:200px;
pointer-events:auto;border-left:3px solid;
}
.toast-item.success{border-left-color:var(--green)}
.toast-item.error{border-left-color:var(--red)}
.toast-item.info{border-left-color:var(--blue)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
#loading-overlay{
position:fixed;inset:0;background:rgba(0,0,0,0.7);
z-index:8000;display:none;align-items:center;justify-content:center;
backdrop-filter:blur(2px);
}
#loading-overlay.active{display:flex}
.spinner{
width:40px;height:40px;border-radius:50%;
border:3px solid var(--border2);border-top-color:var(--orange);
animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* ============================================================
OFFLINE INDICATOR
============================================================ */
#offline-bar{
background:linear-gradient(90deg,rgba(239,68,68,0.9),rgba(220,38,38,0.9));
color:#fff;font-size:12px;font-weight:500;
padding:6px 20px;text-align:center;display:none;
align-items:center;justify-content:center;gap:8px;
}
#offline-bar.show{display:flex}
/* ============================================================
TABS
============================================================ */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{
padding:9px 16px;font-size:13px;font-weight:500;color:var(--text3);
cursor:pointer;border-bottom:2px solid transparent;
white-space:nowrap;transition:all var(--transition);
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
/* ============================================================
TRANSAKSI DETAIL TABLE (input item)
============================================================ */
.trx-items{width:100%;margin-bottom:10px}
.trx-items th{background:var(--bg3);padding:7px 8px;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase}
.trx-items td{padding:5px 4px;vertical-align:middle}
.trx-items input,.trx-items select{
background:var(--bg3);border:1px solid var(--border2);
border-radius:var(--radius-sm);padding:5px 7px;
color:var(--text);font-size:12px;width:100%;
}
.trx-items input:focus,.trx-items select:focus{border-color:var(--orange)}
.trx-total-row{
display:flex;justify-content:flex-end;gap:20px;
background:var(--bg3);padding:10px 12px;border-radius:var(--radius-sm);
margin-top:8px;border:1px solid var(--border);
}
.trx-total-label{font-size:12px;color:var(--text3)}
.trx-total-val{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--orange)}
/* ============================================================
RESPONSIVE
============================================================ */
@media(max-width:768px){
:root{--sidebar-w:56px}
#sidebar .sidebar-title,#sidebar .nav-label,#sidebar .nav-group-label{display:none}
.dash-grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.form-grid{grid-template-columns:1fr}
#content{padding:12px}
}
</style>
</head>

// ============================================================
// OFFLINE / INDEXEDDB
// ============================================================
let idbDb;

function openIDB() {
return new Promise((res,rej)=>{
const req = indexedDB.open('autoserv_offline',2);
req.onupgradeneeded = e => {
const d = e.target.result;
const oldVer = e.oldVersion;
if (!d.objectStoreNames.contains('queue')) {
d.createObjectStore('queue',{keyPath:'id'});
}
if (!d.objectStoreNames.contains('cache')) {
d.createObjectStore('cache',{keyPath:'key'});
}
// v2: offline data cache per table
if (!d.objectStoreNames.contains('tbl_cache')) {
const tblStore = d.createObjectStore('tbl_cache',{keyPath:'key'});
tblStore.createIndex('tbl','tbl',{unique:false});
}
};
req.onsuccess = e => { idbDb = e.target.result; res(idbDb); };
req.onerror = ()=>rej(req.error);
});
}

async function idbAdd(store, data) {
return new Promise((res,rej)=>{
const tx = idbDb.transaction(store,'readwrite');
const req = tx.objectStore(store).put(data);
req.onsuccess = ()=>res(req.result);
req.onerror = ()=>rej(req.error);
});
}

async function idbGetAll(store) {
return new Promise((res,rej)=>{
const tx = idbDb.transaction(store,'readonly');
const req = tx.objectStore(store).getAll();
req.onsuccess = ()=>res(req.result);
req.onerror = ()=>rej(req.error);
});
}

async function idbDelete(store, key) {
return new Promise((res,rej)=>{
const tx = idbDb.transaction(store,'readwrite');
const req = tx.objectStore(store).delete(key);
req.onsuccess = ()=>res();
req.onerror = ()=>rej(req.error);
});
}

// Queue offline operation
async function queueOp(tabel, operasi, data) {
await idbAdd('queue', {
id: uid(), tabel, operasi, data,
status:'pending', created_at: nowTs()
});
// Update offline pending count display
try {
const queue = await idbGetAll('queue');
const pending = queue.filter(q=>q.status==='pending').length;
const el = document.getElementById('offline-pending');
if(el) {
el.style.display = pending>0 ? 'inline' : 'none';
el.textContent = pending + ' data pending';
}
updateSyncBadge();
} catch(e){}
}

// Supabase call with offline fallback
async function dbOp(tabel, operasi, data) {
if (isOnline) {
try {
let res;
if (operasi === 'INSERT') res = await db.from(tabel).insert(data).select().single();
else if (operasi === 'UPDATE') res = await db.from(tabel).update(data.payload).eq('id',data.id).select().single();
else if (operasi === 'DELETE') res = await db.from(tabel).delete().eq('id',data.id);
if (res.error) throw res.error;
return res.data;
} catch(e) {
// fallback to queue
await queueOp(tabel, operasi, data);
showToast('Disimpan ke antrian offline','info');
return data.id ? data : {...data, id: uid()};
}
} else {
await queueOp(tabel, operasi, data);
return data.id ? data : {...data, id: uid()};
}
}

async function syncOfflineData() {
if (!isOnline) { showToast('Tidak ada koneksi internet','error'); return; }
const queue = await idbGetAll('queue');
const pending = queue.filter(q=>q.status==='pending');
if (!pending.length) return; // Silent if nothing to sync

// Animate sync button
const syncIcon = document.getElementById('sync-btn')?.querySelector('i');
if(syncIcon) syncIcon.style.animation='spin 0.7s linear infinite';

let ok=0, fail=0;
for (const q of pending) {
try {
if (q.operasi==='INSERT') {
const {error} = await db.from(q.tabel).upsert(q.data, {onConflict:'id',ignoreDuplicates:false});
if(error) throw error;
} else if (q.operasi==='UPDATE') {
const {error} = await db.from(q.tabel).update(q.data.payload).eq('id',q.data.id);
if(error) throw error;
} else if (q.operasi==='DELETE') {
const {error} = await db.from(q.tabel).delete().eq('id',q.data.id);
if(error) throw error;
}
await idbDelete('queue', q.id);
ok++;
} catch(e) {
fail++;
console.warn('Sync failed for', q.tabel, e.message);
}
}

if(syncIcon) syncIcon.style.animation='';
if(ok>0) {
showToast(`✓ ${ok} data tersinkronisasi ke server`, 'success');
// Refresh current page after sync
if(window[`init_${currentPage.replace(/-/g,'_')}`]) {
setTimeout(()=>{ try{ window[`init_${currentPage.replace(/-/g,'_')}`](); } catch(e){} }, 500);
}
}
if(fail>0) showToast(`${fail} data gagal sync — akan dicoba ulang`, 'error');
// Update pending count badge
updateSyncBadge();
}

async function updateSyncBadge() {
try {
const queue = await idbGetAll('queue');
const pending = queue.filter(q=>q.status==='pending').length;
const btn = document.getElementById('sync-btn');
if(!btn) return;
// Remove old badge
const old = btn.querySelector('.sync-badge');
if(old) old.remove();
if(pending > 0) {
const badge = document.createElement('span');
badge.className = 'sync-badge';
badge.style.cssText = 'position:absolute;top:-4px;right:-4px;background:var(--orange);color:#fff;font-size:9px;font-weight:700;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;';
badge.textContent = pending > 9 ? '9+' : pending;
btn.style.position = 'relative';
btn.appendChild(badge);
}
} catch(e){}
}

// Online/offline detection
function updateStatus() {
isOnline = navigator.onLine;

document.getElementById('status-text').textContent = isOnline ? 'Online' : 'Offline';
document.getElementById('offline-bar').classList.toggle('show', !isOnline);

// Delay slightly to ensure connection is stable
setTimeout(async ()=>{
await syncOfflineData();
await updateSyncBadge();
}, 1200);
} else {
updateSyncBadge();
}
}

window.addEventListener('online', updateStatus);
window.addEventListener('offline', updateStatus);

// CRUD HELPERS
// ============================================================
async function loadTable(table, opts={}) {
const cacheKey = table+'_'+JSON.stringify(opts);
if (isOnline) {
try {
let q = db.from(table).select(opts.select||'*');
if (opts.eq) Object.entries(opts.eq).forEach(([k,v])=>{ q=q.eq(k,v); });
if (opts.order) q = q.order(opts.order, {ascending: opts.asc!==false});
if (opts.limit) q = q.limit(opts.limit);
const { data, error } = await q;
if (error) throw error;
const result = data||[];
// Cache to IDB for offline use
try { await idbAdd('tbl_cache',{key:cacheKey,tbl:table,data:result,ts:Date.now()}); } catch(e){}
return result;
} catch(e) {
// Online but query failed - try cache
return await idbGetTblCache(cacheKey) || [];
}
} else {
// Offline - serve from cache
const cached = await idbGetTblCache(cacheKey);
if (cached) return cached;
return [];
}
}

async function idbGetTblCache(key) {
try {
return new Promise((res,rej)=>{
const tx = idbDb.transaction('tbl_cache','readonly');
const req = tx.objectStore('tbl_cache').get(key);
req.onsuccess = ()=> res(req.result ? req.result.data : null);
req.onerror = ()=> res(null);
});
} catch(e) { return null; }
}

<table id="tbl-kend"><thead><tr><th>No. Plat</th><th>Merk</th><th>Tipe</th><th>Tahun</th><th>Warna</th><th>CC</th><th>Bahan Bakar</th><th>Pemilik</th><th>Aksi</th></tr></thead>
<tbody id="body-kend"><tr><td colspan="9" class="table-empty"><i class="ti ti-loader"></i>Memuat...</td></tr></tbody></table>
</div>
${modalHtml('modal-kend','Tambah / Edit Kendaraan',`
<div class="form-grid">
<div class="form-group"><label class="form-label">No. Plat <span class="req">*</span></label><input id="f-kd-plat" class="form-input" placeholder="B 1234 XX" style="text-transform:uppercase"/></div>
<div class="form-group"><label class="form-label">Merk</label><input id="f-kd-merk" class="form-input" placeholder="Toyota, Honda..."/></div>
<div class="form-group"><label class="form-label">Tipe</label><input id="f-kd-tipe" class="form-input" placeholder="Avanza, Civic..."/></div>
<div class="form-group"><label class="form-label">Tahun</label><input id="f-kd-tahun" class="form-input" type="number" min="1990" max="2030"/></div>
<div class="form-group"><label class="form-label">Warna</label><input id="f-kd-warna" class="form-input"/></div>
<div class="form-group"><label class="form-label">CC Kendaraan</label><input id="f-kd-cc" class="form-input" type="number" min="50" max="10000" placeholder="Contoh: 1500"/></div>
<div class="form-group"><label class="form-label">Bahan Bakar</label>
<select id="f-kd-bahan" class="form-input">
<option value="">-- Pilih --</option>
<option value="Bensin">Bensin</option>
<option value="Diesel">Diesel</option>
<option value="Solar">Solar</option>
<option value="LPG">LPG</option>
<option value="Listrik">Listrik</option>
<option value="Hybrid">Hybrid</option>
<option value="CNG">CNG</option>
</select>
</div>
<div class="form-group"><label class="form-label">Pemilik (Pelanggan)</label><select id="f-kd-pel" class="form-input"><option value="">-- Pilih Pelanggan --</option></select></div>
<div class="form-group form-full"><label class="form-label">Catatan</label><textarea id="f-kd-catatan" class="form-input" rows="2"></textarea></div>
</div><input type="hidden" id="f-kd-id"/>`,
'',`<button class="btn btn-outline" onclick="closeModal('modal-kend')">Batal</button>
<button class="btn btn-primary" onclick="saveKend()"><i class="ti ti-device-floppy"></i>Simpan</button>`)}`;

window.init_kendaraan = async function(){await loadKend();};

async function openModalKend(k=null){
const pls=await loadTable('pelanggan',{order:'nama'});
const sel=document.getElementById('f-kd-pel');
sel.innerHTML='<option value="">-- Tanpa Pemilik --</option>'+pls.map(p=>`<option value="${p.id}">${p.nama}</option>`).join('');
if(k){
  document.getElementById('f-kd-id').value=k.id;
  document.getElementById('f-kd-plat').value=k.no_plat;
  document.getElementById('f-kd-merk').value=k.merk||'';
  document.getElementById('f-kd-tipe').value=k.tipe||'';
  document.getElementById('f-kd-tahun').value=k.tahun||'';
  document.getElementById('f-kd-warna').value=k.warna||'';
  document.getElementById('f-kd-cc').value=k.cc_kendaraan||'';
  document.getElementById('f-kd-bahan').value=k.bahan_bakar||'';
  document.getElementById('f-kd-catatan').value=k.catatan||'';
  sel.value=k.pelanggan_id||'';
}else{
  ['f-kd-id','f-kd-plat','f-kd-merk','f-kd-tipe','f-kd-tahun','f-kd-warna','f-kd-cc','f-kd-bahan','f-kd-catatan'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';}); 
  sel.value='';
}
openModal('modal-kend');
}

async function loadKend(){
const data=await loadTable('kendaraan',{select:'*,pelanggan(nama)',order:'no_plat'});
document.getElementById('count-kend').textContent=`${data.length} data`;
document.getElementById('body-kend').innerHTML=data.length?data.map(k=>`<tr>
<td><span style="font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--orange);background:var(--bg3);padding:3px 8px;border-radius:4px">${k.no_plat}</span></td>
<td style="color:var(--text)">${k.merk||'-'}</td>
<td>${k.tipe||'-'}</td>
<td>${k.tahun||'-'}</td>
<td>${k.warna||'-'}</td>
<td><span style="font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--blue)">${k.cc_kendaraan?k.cc_kendaraan+' CC':'-'}</span></td>
<td>${k.bahan_bakar?`<span class="badge badge-blue">${k.bahan_bakar}</span>`:'-'}</td>
<td>${k.pelanggan?.nama||'<span style="color:var(--text3)">Umum</span>'}</td>
<td><div style="display:flex;gap:4px">
<button class="btn btn-outline btn-sm" onclick='openModalKend(${JSON.stringify(k)})'><i class="ti ti-edit"></i></button>
<button class="btn btn-danger btn-sm" onclick="delKend('${k.id}','${k.no_plat}')"><i class="ti ti-trash"></i></button>
</div></td></tr>`).join(''):'<tr><td colspan="9" class="table-empty"><i class="ti ti-car-off"></i>Belum ada kendaraan</td></tr>';
}

async function saveKend(){
const id=document.getElementById('f-kd-id').value;
const plat=document.getElementById('f-kd-plat').value.trim().toUpperCase();
if(!plat){showToast('No. plat wajib','error');return;}
const payload={
  no_plat:plat,
  merk:document.getElementById('f-kd-merk').value,
  tipe:document.getElementById('f-kd-tipe').value,
  tahun:Number(document.getElementById('f-kd-tahun').value)||null,
  warna:document.getElementById('f-kd-warna').value,
  cc_kendaraan:Number(document.getElementById('f-kd-cc').value)||null,
  bahan_bakar:document.getElementById('f-kd-bahan').value||null,
  pelanggan_id:document.getElementById('f-kd-pel').value||null,
  catatan:document.getElementById('f-kd-catatan').value
};
showLoading(true);
try{
  if(id)await dbOp('kendaraan','UPDATE',{id,payload});
  else await dbOp('kendaraan','INSERT',{id:uid(),...payload});
  closeModal('modal-kend');
  showToast('Kendaraan disimpan');
  await loadKend();
}catch(e){showToast('Gagal','error');}
showLoading(false);
}

async function delKend(id,plat){
  if(!confirm2(`Hapus kendaraan ${plat}?`))return;
  showLoading(true);
  try{
    await dbOp('kendaraan','DELETE',{id});
    showToast('Kendaraan dihapus');
    await loadKend();
  }catch(e){showToast('Gagal','error');}
  showLoading(false);
}

// ============================================================
// TABLE FILTER UTILITY
// ============================================================
function filterTable(tableId, keyword, colIndexes){
const tbl=document.getElementById(tableId);
if(!tbl)return;
const rows=tbl.querySelectorAll('tbody tr');
const kw=keyword.toLowerCase();
rows.forEach(row=>{
const cells=row.querySelectorAll('td');
const match=colIndexes.some(i=>cells[i]&&cells[i].textContent.toLowerCase().includes(kw));
row.style.display=kw?match?'':'none':'';
});
}

// ============================================================
// INIT APP
// ============================================================
async function initApp(){
buildSidebar();
await openIDB();
updateStatus();
showPage('dashboard');
}

initApp();
</script>
</body>
</html>
